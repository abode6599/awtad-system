<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نظام الكشافة</title>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

<style>
body{background:#0b1220;color:#e5ecf5;font-family:Cairo;margin:0}
.box{background:#111c33;margin:10px;padding:12px;border-radius:10px}
button{padding:6px 10px;border-radius:8px;border:none;cursor:pointer}
.hidden{display:none}
</style>
</head>

<body>

<div id="login" class="box">
<h2>دخول النظام</h2>
<input id="pin" placeholder="PIN">
<button onclick="login()">دخول</button>
<div id="err"></div>
</div>

<div id="app" class="hidden">

<h3 id="me"></h3>

<div id="content"></div>

</div>

<script>

// 🔥 Firebase
firebase.initializeApp({
apiKey:"YOUR_KEY",
databaseURL:"YOUR_DB"
});

const db = firebase.database().ref("scout_v1");

let data = {users:{},logs:[],alerts:[]};
let user = null;

// 👑 القيادة العليا
const SUPER = {
"1111":"عبدالله العرفه",
"2222":"سلمان الصويلح",
"3333":"معاذ الشنقيطي"
};

// 🧠 توليد PIN
function genPin(){
let used = new Set(Object.values(data.users).map(u=>u.pin));
let p;
do{
p=Math.floor(1000+Math.random()*9000).toString();
}while(used.has(p));
return p;
}

// 👥 بناء النظام أول مرة
function seed(){
if(Object.keys(data.users).length>0) return;

const groups = {
"طليعة 1 - الوليد الحازمي":["صالح حبتور","حسن الشهري","عزام خبراني","يحي شراحيلي","فهد المهيني","زياد العجلاني","يزيد خال","غازي العجمي","ريان جعام"],
"طليعة 2 - حاتم خريزي":["ياسر ابو حيه","محمد عسيري","علي الغامدي","فواز الشهراني","اصيل العتيبي","صالح الخثعمي","غازي العنزي","ابراهيم التليدي","رياض الزهراني"],
"طليعة 3 - راكان شراحيلي":["بسام قرادي","بدر كعبي","حسام الشهراني","عبدالله قشاش","عيسى الرشيدي","عبدالعزيز القحطاني","راشد الراشدي","زايد القحطاني","علي الشهراني"],
"طليعة 4 - وضاح الصويلح":["مشعل القحطاني","ناصر المطيري","مبارك خميس","عبدالله القرني","راكان حوباني","رائد حوباني","فارس العمري","محمد فقيه","مشاري القحطاني"]
};

Object.entries(groups).forEach(([team, members])=>{
members.forEach(m=>{
let id="U"+Math.random();

data.users[id]={
name:m,
team:team,
role:"member",
pts:0,
badges:[],
pin:genPin()
};
});
});

save();
}

// 🔐 دخول
function login(){
let pin=document.getElementById("pin").value.trim();

let found=null;

// 👑 قيادة
if(SUPER[pin]){
found={name:SUPER[pin],role:"super"};
}

// 👥 مستخدمين
Object.entries(data.users).forEach(([id,u])=>{
if(u.pin===pin) found={...u,id};
});

if(!found){
document.getElementById("err").innerText="خطأ";
return;
}

user=found;
log("login",user.name);

document.getElementById("login").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");

render();
}

// ➕ نقاط
function addPts(id){
let v=parseInt(prompt("كم؟"));
if(isNaN(v))return;

data.users[id].pts+=v;

if(v>=30){
data.alerts.unshift({msg:"نشاط عالي",time:new Date().toLocaleString("ar-SA")});
}

save();
}

// 🧾 لوق
function log(action,name){
data.logs.unshift({action,name,time:new Date().toLocaleString("ar-SA")});
}

// 💾 حفظ
function save(){
db.set(data);
}

// 🎨 عرض
function render(){

document.getElementById("me").innerText=user.name+" - "+user.role;

// 👥 عرض
let html="";

Object.entries(data.users).forEach(([id,u])=>{
html+=`
<div class="box">
${u.name}<br>
${u.team}<br>
نقاط: ${u.pts}<br>
PIN: ${user.role==="super"?u.pin:"****"}<br>
<button onclick="addPts('${id}')">نقاط</button>
</div>`;
});

document.getElementById("content").innerHTML=html;

}

// 🔄 تشغيل أول مرة
db.on("value",snap=>{
data=snap.val()||data;
seed();
render();
});

</script>

</body>
</html>
