<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWTAD V11.0 | النظام الشامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --gold: #fbbf24;
            --text: #f8fafc; --sub: #94a3b8; --border: #334155; --danger: #ef4444; --success: #22c55e;
        }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; transition: 0.3s; }
        body { background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        nav { background: var(--card); border-bottom: 2px solid var(--border); display: flex; overflow-x: auto; padding: 10px; gap: 8px; position: sticky; top: 0; z-index: 1000; }
        .nav-btn { padding: 10px 15px; border-radius: 8px; border: none; background: var(--bg); color: var(--sub); cursor: pointer; font-weight: 700; white-space: nowrap; }
        .nav-btn.active { background: var(--accent); color: white; }
        .container { padding: 15px; max-width: 1200px; margin: auto; }
        .member-card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 15px; cursor: pointer; margin-bottom: 10px; }
        .leader-card { border-right: 5px solid var(--gold); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 100%; max-width: 600px; border: 1px solid var(--accent); max-height: 90vh; overflow-y: auto; }
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; }
        .btn { padding: 12px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; width: 100%; margin-top: 5px; }
        .btn-p { background: var(--accent); color: white; }
        .btn-s { background: var(--gold); color: black; }
        .btn-d { background: var(--danger); color: white; }
        .badge-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .badge-item { background: var(--bg); padding: 8px; border-radius: 6px; font-size: 12px; border: 1px solid var(--border); cursor: pointer; text-align: center; }
        .admin-box { border: 1px dashed var(--gold); padding: 15px; border-radius: 12px; margin-top: 15px; background: rgba(251, 191, 36, 0.05); }
        .req-card { background: var(--bg); border: 1px solid var(--gold); padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth-gate" style="position:fixed; inset:0; background:var(--bg); z-index:5000; display:flex; align-items:center; justify-content:center;">
    <div style="width: 320px; text-align: center; padding: 30px; background: var(--card); border-radius: 20px; border: 1px solid var(--accent);">
        <h2 style="color: var(--accent)">AWTAD V11.0</h2>
        <input type="password" id="entry-pin" maxlength="4" placeholder="رمز الدخول الخاص بك" style="text-align:center; letter-spacing:8px;">
        <button class="btn btn-p" onclick="Sys.login()">دخول الحساب</button>
    </div>
</div>

<nav id="main-nav" class="hidden">
    <button class="nav-btn active" onclick="Sys.route('field', this)">👥 الميدان</button>
    <button class="nav-btn" onclick="Sys.route('vote', this)">🗳️ التصويت</button>
    <button class="nav-btn" onclick="Sys.route('requests', this)">📩 الطلبات</button>
    <button class="nav-btn" onclick="Sys.route('logs', this)">📜 السجلات</button>
    <button class="nav-btn" onclick="Sys.route('admin', this)">⚙️ الإدارة</button>
</nav>

<div class="container hidden" id="main-container">
    <div id="content-area"></div>
</div>

<div id="member-modal" class="modal hidden">
    <div class="modal-content" id="member-detail-ui"></div>
</div>

<div id="badge-modal" class="modal hidden">
    <div class="modal-content">
        <h3>🏅 موسوعة الشارات والأوسمة (100+)</h3>
        <input type="text" id="b-search" placeholder="بحث عن شارة..." oninput="Sys.searchBadges()">
        <div id="badge-list" class="badge-grid" style="max-height: 400px; overflow-y: auto;"></div>
        <button class="btn btn-p" onclick="document.getElementById('badge-modal').classList.add('hidden')">إغلاق</button>
    </div>
</div>

<script>
const Sys = (() => {
    const config = { apiKey: "AIzaSyA6P2gbckRDtKUqb8mVZcibXR4soZezFxE", databaseURL: "https://awtad-system-default-rtdb.firebaseio.com" };
    firebase.initializeApp(config);
    const db = firebase.database().ref("awtad_v11");

    let state = { user: null, members: {}, logs: [], votes: {}, reqs: {}, tab: 'field' };
    const ADMIN_PINS = { "7777": "عبدالله العرفه", "9999": "سلمان الصويلح", "8888": "معاذ الشنقيطي" };
    
    // توليد موسوعة 100 شارة
    const BADGES = Array.from({length: 100}, (_, i) => `شارة رقم ${i+1}`);
    const REAL_BADGES = ["المسعف", "المؤذن", "المبرمج", "المصور", "الرسام", "الطهي", "الملاحة", "النيران", "التخييم", "الرحالة", "التسلق", "السباحة", "الخياطة", "النجارة", "الكهرباء", "الزراعة", "البيئة", "الفلك", "الصحافة", "القيادة"];
    const MASTER_BADGES = [...REAL_BADGES, ...BADGES].slice(0, 100);

    return {
        login: async () => {
            const pin = document.getElementById("entry-pin").value;
            const snap = await db.child("members").once("value");
            const members = snap.val() || {};
            
            if(ADMIN_PINS[pin]) {
                state.user = { name: ADMIN_PINS[pin], role: 'ROOT', pin };
            } else {
                const found = Object.entries(members).find(([id, m]) => m.pin === pin);
                if(found) state.user = { ...found[1], id: found[0], role: 'USER' };
            }

            if(state.user) {
                document.getElementById("auth-gate").classList.add("hidden");
                document.getElementById("main-nav").classList.remove("hidden");
                document.getElementById("main-container").classList.remove("hidden");
                Sys.initSync();
            } else alert("الرمز غير مسجل بالنظام");
        },

        initSync: () => {
            db.child("members").on("value", s => { state.members = s.val() || {}; Sys.render(); });
            db.child("logs").limitToLast(50).on("value", s => { state.logs = Object.values(s.val() || {}).reverse(); Sys.render(); });
            db.child("votes").on("value", s => { state.votes = s.val() || {}; Sys.render(); });
            db.child("requests").on("value", s => { state.reqs = s.val() || {}; Sys.render(); });
        },

        route: (t, el) => {
            state.tab = t;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(el) el.classList.add('active');
            Sys.render();
        },

        render: () => {
            const root = document.getElementById("content-area");
            root.innerHTML = "";

            if(state.tab === 'field') {
                ["طليعة 1", "طليعة 2", "طليعة 3", "طليعة 4"].forEach(t => {
                    const group = Object.entries(state.members).filter(([id, m]) => m.team === t);
                    const sorted = [...group.filter(m => m[1].role === 'LEADER'), ...group.filter(m => m[1].role !== 'LEADER').sort((a,b) => b[1].pts - a[1].pts)];
                    let html = `<div style="margin-bottom:20px"><h3>${t}</h3><div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:10px">`;
                    sorted.forEach(([id, m]) => {
                        html += `<div class="member-card ${m.role === 'LEADER' ? 'leader-card' : ''}" onclick="Sys.openDossier('${id}')">
                            <div style="display:flex; justify-content:space-between">
                                <div><b>${m.name}</b><br><small>${m.role === 'LEADER' ? '👑 القائد' : 'كشاف'}</small></div>
                                <div style="font-size:18px; font-weight:900; color:var(--gold)">${m.pts}</div>
                            </div></div>`;
                    });
                    root.innerHTML += html + `</div></div>`;
                });
            }

            if(state.tab === 'vote') {
                const isAdmin = state.user.role === 'ROOT';
                root.innerHTML = `<h3>🗳️ نظام التصويت الإداري</h3>
                <div style="background:var(--card); padding:20px; border-radius:15px">
                    <p id="v-title">الموضوع الحالي: هل تؤيد تحديث الزي الكشفي؟</p>
                    <button class="btn btn-p" onclick="Sys.castVote('نعم')">نعم</button>
                    <button class="btn btn-s" onclick="Sys.castVote('لا')">لا</button>
                    ${isAdmin ? `<hr><div class="admin-box"><h4>نتائج الثلاثي:</h4> نعم (${Object.values(state.votes).filter(v=>v==='نعم').length}) | لا (${Object.values(state.votes).filter(v=>v==='لا').length})
                    <button class="btn btn-d" style="margin-top:10px" onclick="Sys.clearVotes()">تصفير التصويت</button></div>` : ''}
                </div>`;
            }

            if(state.tab === 'requests') {
                if(state.user.role !== 'ROOT') return root.innerHTML = "الصلاحية للمشرفين فقط";
                root.innerHTML = "<h3>📩 طلبات تعديل البيانات</h3>";
                Object.entries(state.reqs).forEach(([rid, r]) => {
                    root.innerHTML += `<div class="req-card">
                        <b>${r.memberName}</b> يطلب تعديل: <br>
                        جوال: ${r.newPhone} | هوية: ${r.newNid}
                        <div style="display:flex; gap:5px; margin-top:10px">
                            <button class="btn btn-p" onclick="Sys.approveReq('${rid}')">موافقة</button>
                            <button class="btn btn-d" onclick="Sys.rejectReq('${rid}')">رفض</button>
                        </div>
                    </div>`;
                });
            }

            if(state.tab === 'admin') {
                if(state.user.role !== 'ROOT') return root.innerHTML = "الصلاحية للمشرفين فقط";
                root.innerHTML = `<h3>⚙️ إدارة النظام</h3>
                <div class="admin-box">
                    <h4>إضافة عضو جديد:</h4>
                    <input id="add-name" placeholder="الاسم الثلاثي">
                    <select id="add-team"><option>طليعة 1</option><option>طليعة 2</option><option>طليعة 3</option><option>طليعة 4</option></select>
                    <button class="btn btn-p" onclick="Sys.addMember()">إضافة للعرض</button>
                </div>`;
            }

            if(state.tab === 'logs') {
                root.innerHTML = "<h3>📜 سجل العمليات</h3>";
                state.logs.forEach(l => {
                    root.innerHTML += `<div class="member-card" style="font-size:12px; border-right:3px solid var(--accent)">
                        ${l.time} | <b>${l.admin}</b>: ${l.action} لـ <b>${l.target}</b> <br> السبب: ${l.reason}
                    </div>`;
                });
            }
        },

        openDossier: (id) => {
            const m = state.members[id];
            const isMe = state.user.id === id;
            const isRoot = state.user.role === 'ROOT';
            const ui = document.getElementById("member-detail-ui");

            ui.innerHTML = `<h2>${m.name}</h2>
            <div style="margin-bottom:15px">
                <label>رقم الجوال:</label>
                <input id="d-phone" value="${m.phone || ''}" ${isMe ? '' : 'disabled'}>
                <label>رقم الهوية:</label>
                <input id="d-nid" value="${m.nid || ''}" ${isMe ? '' : 'disabled'}>
                ${isMe ? `<button class="btn btn-s" onclick="Sys.submitUpdateReq('${id}')">إرسال طلب تعديل للمشرفين</button>` : ''}
            </div>
            <p>النقاط: <b>${m.pts}</b> | العهدة: ${m.inventory}</p>
            <div style="display:flex; flex-wrap:wrap; gap:5px">${(m.badges || []).map(b => `<span style="background:var(--accent); padding:3px 8px; border-radius:10px; font-size:11px">${b}</span>`).join('')}</div>
            
            ${isRoot ? `<div class="admin-box">
                <h4>لوحة التحكم الميدانية (للثلاثي):</h4>
                <input type="number" id="pts-val" placeholder="النقاط">
                <input type="text" id="pts-rsn" placeholder="السبب">
                <div style="display:flex; gap:5px">
                    <button class="btn btn-p" onclick="Sys.modPts('${id}', 1)">+</button>
                    <button class="btn btn-d" onclick="Sys.modPts('${id}', -1)">-</button>
                </div>
                <button class="btn btn-s" onclick="Sys.showBadges('${id}')">🏅 منح أوسمة</button>
                <button class="btn btn-d" style="margin-top:20px" onclick="Sys.deleteMember('${id}')">⚠️ حذف العضو نهائياً</button>
            </div>` : ''}
            <button class="btn btn-p" style="margin-top:10px" onclick="Sys.closeModal()">إغلاق</button>`;
            document.getElementById("member-modal").classList.remove("hidden");
        },

        submitUpdateReq: (id) => {
            const phone = document.getElementById("d-phone").value;
            const nid = document.getElementById("d-nid").value;
            db.child("requests").push({ memberId: id, memberName: state.members[id].name, newPhone: phone, newNid: nid });
            alert("تم إرسال طلب التعديل للمشرفين للموافقة");
        },

        approveReq: (rid) => {
            const r = state.reqs[rid];
            db.child("members").child(r.memberId).update({ phone: r.newPhone, nid: r.newNid });
            db.child("requests").child(rid).remove();
            alert("تم تحديث البيانات");
        },

        rejectReq: (rid) => { db.child("requests").child(rid).remove(); },

        modPts: (id, dir) => {
            const val = parseInt(document.getElementById("pts-val").value);
            const rsn = document.getElementById("pts-rsn").value;
            if(!val || !rsn) return alert("أكمل البيانات");
            const newPts = (state.members[id].pts || 0) + (val * dir);
            db.child("members").child(id).update({ pts: newPts });
            db.child("logs").push({ admin: state.user.name, target: state.members[id].name, action: dir>0?"إضافة":"خصم", reason: rsn, time: new Date().toLocaleString() });
            Sys.closeModal();
        },

        showBadges: (id) => {
            state.activeMember = id;
            document.getElementById("badge-modal").classList.remove("hidden");
            Sys.searchBadges();
        },

        searchBadges: () => {
            const q = document.getElementById("b-search").value;
            const list = document.getElementById("badge-list");
            list.innerHTML = MASTER_BADGES.filter(b => b.includes(q)).map(b => `<div class="badge-item" onclick="Sys.assignBadge('${b}')">${b}</div>`).join('');
        },

        assignBadge: (b) => {
            const id = state.activeMember;
            const cur = state.members[id].badges || [];
            if(!cur.includes(b)) {
                cur.push(b);
                db.child("members").child(id).update({ badges: cur });
            }
            document.getElementById("badge-modal").classList.add("hidden");
        },

        addMember: () => {
            const name = document.getElementById("add-name").value;
            const team = document.getElementById("add-team").value;
            if(!name) return alert("ادخل الاسم");
