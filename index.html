<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام أوتاد - التحكم الكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #3b82f6; --bg: #0f172a; --card: #1e293b; --gold: #fbbf24; --text: #f8fafc; --danger: #ef4444; --success: #10b981; }
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; outline: none; }
        body { margin: 0; background: var(--bg); color: var(--text); direction: rtl; padding: 10px; }
        .container { max-width: 600px; margin: auto; }
        .card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #334155; position: relative; }
        .points-display { font-size: 32px; font-weight: 900; color: var(--gold); }
        .badge-box { background: rgba(251, 191, 36, 0.1); border: 1px dashed var(--gold); border-radius: 10px; padding: 10px; margin-top: 10px; display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .tab { flex: 1; padding: 10px; background: #334155; border: none; color: white; border-radius: 8px; cursor: pointer; white-space: nowrap; font-size: 11px; }
        .tab.active { background: var(--primary); }
        .btn { border: none; color: white; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        input { background: #0f172a; color: white; border: 1px solid #334155; padding: 12px; border-radius: 10px; width: 100%; margin: 10px 0; text-align: center; }
        .admin-only { border: 2px solid var(--gold) !important; }
        .log-item { font-size: 11px; border-bottom: 1px solid #334155; padding: 8px 0; text-align: right; }
    </style>
</head>
<body>

<div id="login-screen" class="container" style="padding-top: 50px; text-align: center;">
    <div class="card">
        <h1 style="color:var(--gold); margin:0;">أوتـاد 🛡️</h1>
        <p>نظام التحقيقات والطلائع</p>
        <input type="password" id="access-pin" placeholder="أدخل رقمك الخاص">
        <button class="btn" style="background:var(--primary); width:100%;" onclick="handleLogin()">دخول</button>
    </div>
</div>

<div id="main-app" class="container" style="display:none;">
    <div class="card admin-only">
        <h2 id="welcome-msg" style="margin:0;"></h2>
        <div style="display: flex; gap: 5px; margin-top: 10px;">
            <button class="btn" style="background:var(--success); flex:1;" onclick="exportToWhatsApp()">تقرير واتساب 📱</button>
            <button class="btn" style="background:var(--danger); flex:1;" id="admin-reset" onclick="resetSystem()">تصفير شامل ⚠️</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab active" id="tab-points" onclick="switchTab('points')">النقاط</button>
        <button class="tab" id="tab-badges" onclick="switchTab('badges')">الأوسمة</button>
        <button class="tab" id="tab-leaders" onclick="switchTab('leaders')">إدارة القادة 👑</button>
        <button class="tab" onclick="switchTab('ranking')">الترتيب</button>
        <button class="tab" onclick="switchTab('logs')">السجل</button>
    </div>

    <div id="content-area"></div>
    <button class="btn" style="background:#334155; width:100%; margin: 20px 0;" onclick="location.reload()">خروج</button>
</div>

<script>
    // تهيئة Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyA6P2gbckRDtKUqb8mVZcibXR4soZezFxE",
      authDomain: "awtad-system.firebaseapp.com",
      databaseURL: "https://awtad-system-default-rtdb.firebaseio.com", 
      projectId: "awtad-system"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const awtadRef = database.ref('awtad_final_v1');

    // بيانات الدخول (أنت تتحكم فيها هنا)
    const ACCESS_LEVELS = {
        "8429": {name:"عبدالله العرفه", role:"admin"}, // أنت "مولاي"
        "5173": {name:"سلمان الصويلح", role:"admin"},
        "9264": {name:"معاذ الشنقيطي", role:"admin"},
        // أرقام القادة (تقدر تغيرها من الكود أو من واجهة الأدمن لاحقاً)
        "3058": {name:"الوليد الحازمي", role:"leader", target: 1},
        "6712": {name:"حاتم خريزي", role:"leader", target: 2},
        "4891": {name:"راكان شراحيلي", role:"leader", target: 3},
        "2537": {name:"وضاح الصويلح", role:"leader", target: 4}
    };

    const PLATOONS = [
        {id:1, name:"طليعة 1", members:["صالح حبتور","حسن الشهري","ريان جعام","غازي العجمي","يزيد خال","زياد العجلاني","فهد المهيني","يحي شراحيلي","عزام خبراني"]},
        {id:2, name:"طليعة 2", members:["ياسر ابو حيه","محمد عسيري","رياض الزهراني","ابراهيم التليدي","غازي العنزي","صالح الخثعمي","اصيل العتيبي","فواز الشهراني","علي الغامدي"]},
        {id:3, name:"طليعة 3", members:["بسام قرادي","علي الشهراني","زايد القحطاني","راشد الراشدي","عبدالعزيز القحطاني","عيسى الرشيدي","بدر كعبي","عبدالله قشاش","حسام الشهراني"]},
        {id:4, name:"طليعة 4", members:["مشعل القحطاني","مشاري القحطاني","محمد فقيه","فارس العمري","رائد حوباني","راكان حوباني","عبدالله القرني","ناصر المطيري","مبارك خميس"]}
    ];

    let liveData = { points: {}, badges: {}, logs: [], leaders: ACCESS_LEVELS };
    let currentTab = 'points';
    let currentUser = null;

    function handleLogin() {
        const pin = document.getElementById('access-pin').value;
        if(ACCESS_LEVELS[pin]) {
            currentUser = ACCESS_LEVELS[pin];
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('welcome-msg').innerText = "أهلاً " + currentUser.name;
            
            // إخفاء تبويب الإدارة لغير الأدمن
            if(currentUser.role !== 'admin') {
                document.getElementById('tab-leaders').style.display = 'none';
                document.getElementById('admin-reset').style.display = 'none';
            }

            awtadRef.on('value', (snap) => {
                const data = snap.val();
                if(data) liveData = data;
                render();
            });
        } else { alert("عفواً، الرقم غير مسجل!"); }
    }

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-'+tab)?.classList.add('active');
        render();
    }

    function updatePoints(name, val, reason) {
        if(!liveData.points) liveData.points = {};
        liveData.points[name] = (liveData.points[name] || 0) + val;
        
        const logEntry = {
            time: new Date().toLocaleTimeString('ar-SA'),
            admin: currentUser.name,
            target: name,
            action: val > 0 ? `+${val}` : `${val}`,
            msg: reason
        };
        if(!liveData.logs) liveData.logs = [];
        liveData.logs.unshift(logEntry);
        awtadRef.set(liveData);
    }

    function render() {
        const area = document.getElementById('content-area');
        area.innerHTML = "";
        const points = liveData.points || {};
        const badges = liveData.badges || {};

        if(currentTab === 'points') {
            PLATOONS.forEach(p => {
                if(currentUser.role !== 'admin' && currentUser.target !== p.id) return;
                let html = `<div class="card"><h3>${p.name}</h3>`;
                p.members.forEach(m => {
                    const pts = points[m] || 0;
                    html += `<div style="padding:10px; border-bottom:1px solid #334155;">
                        <b>${m}</b> <span class="points-display" style="float:left; font-size:20px;">${pts}</span>
                        <div style="display:flex; gap:5px; margin-top:5px;">
                            <button class="btn" style="background:var(--success); flex:1;" onclick="updatePoints('${m}', 10, 'حضور')">+10</button>
                            <button class="btn" style="background:var(--danger); flex:1;" onclick="updatePoints('${m}', -5, 'غياب')">-5</button>
                        </div>
                    </div>`;
                });
                area.innerHTML += html + `</div>`;
            });
        } 
        else if(currentTab === 'leaders') {
            if(currentUser.role !== 'admin') return;
            let html = `<div class="card"><h3>👑 إدارة القادة</h3><p style="font-size:12px;">تعديل صلاحيات قادة الطلائع</p>`;
            for(let pin in ACCESS_LEVELS) {
                const leader = ACCESS_LEVELS[pin];
                if(leader.role === 'leader') {
                    html += `<div style="text-align:right; padding:10px; border-bottom:1px solid #444;">
                        <b>${leader.name}</b> (طليعة ${leader.target})<br>
                        <small>الرقم السري: ${pin}</small>
                        <button class="btn" style="background:var(--danger); padding:2px 8px; font-size:10px; float:left;" onclick="alert('تواصل مع المبرمج لتغيير الكود المصدري للرقم')">تغيير الرقم</button>
                    </div>`;
                }
            }
            area.innerHTML = html + `</div>`;
        }
        else if(currentTab === 'badges') {
            PLATOONS.forEach(p => {
                if(currentUser.role !== 'admin' && currentUser.target !== p.id) return;
                p.members.forEach(m => {
                    const bList = badges[m] || [];
                    area.innerHTML += `<div class="card">
                        <b>${m}</b>
                        <div class="badge-box">${bList.map(b => `<span>${b}</span>`).join('') || 'لا أوسمة'}</div>
                        <button class="btn" style="background:var(--gold); color:black; width:100%; margin-top:5px;" onclick="const s=prompt('أدخل إيموجي الوسام:'); if(s) { if(!liveData.badges)liveData.badges={}; if(!liveData.badges['${m}'])liveData.badges['${m}']=[]; liveData.badges['${m}'].push(s); awtadRef.set(liveData); }">إضافة وسام</button>
                    </div>`;
                });
            });
        }
        else if(currentTab === 'logs') {
            let html = `<div class="card"><h3>السجل</h3>`;
            (liveData.logs || []).slice(0, 20).forEach(l => {
                html += `<div class="log-item"><b>${l.admin}</b> -> ${l.target} (${l.action}) <br> <small>${l.time} - ${l.msg}</small></div>`;
            });
            area.innerHTML = html + `</div>`;
        }
    }

    function exportToWhatsApp() {
        let txt = `*تقرير أوتاد اليومي*\n\n`;
        PLATOONS.forEach(p => {
            txt += `*${p.name}*\n`;
            p.members.forEach(m => txt += `- ${m}: ${liveData.points[m] || 0}\n`);
            txt += `\n`;
        });
        window.open(`https://wa.me/?text=${encodeURIComponent(txt)}`);
    }

    function resetSystem() {
        if(confirm("مولاي، هل أنت متأكد من تصفير جميع البيانات؟")) {
            awtadRef.set({ points: {}, badges: {}, logs: [{time: "الآن", admin: currentUser.name, action: "تصفير", target: "النظام", msg: "مسح شامل"}] });
        }
    }
</script>
</body>
</html>
