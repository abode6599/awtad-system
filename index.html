<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام أوتاد الإداري | AWTAD</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0f172a; --side: #1e293b; --accent: #3b82f6; --gold: #fbbf24; --text: #f8fafc; --sub: #94a3b8; --border: #334155; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        
        nav { background: var(--side); border-bottom: 2px solid var(--border); padding: 10px; display: flex; gap: 8px; sticky; top: 0; z-index: 1000; overflow-x: auto; }
        .nav-btn { padding: 8px 12px; border-radius: 8px; border: none; background: #334155; color: white; cursor: pointer; font-size: 12px; font-weight: 700; white-space: nowrap; }
        .nav-btn.active { background: var(--accent); }

        .container { padding: 15px; max-width: 1200px; margin: auto; }
        .team-box { background: var(--side); border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border); overflow: hidden; }
        .team-title { background: #1e293b; padding: 12px 15px; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; font-weight: 800; }
        
        .member-list { padding: 10px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
        .m-card { background: #0f172a; border: 1px solid var(--border); padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        .m-card.is-leader { border-right: 4px solid var(--gold); background: #1a2236; }
        
        .pts { color: var(--gold); font-weight: 900; font-size: 18px; }
        .badge-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
        .b-tag { font-size: 9px; background: var(--accent); padding: 2px 6px; border-radius: 4px; color: white; }

        #auth-gate { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
        .btn-act { padding: 5px 10px; font-size: 10px; border: none; border-radius: 5px; cursor: pointer; background: var(--accent); color: white; }
    </style>
</head>
<body>

<div id="auth-gate">
    <div style="text-align: center; width: 280px;">
        <h2 style="color: var(--accent)">دخول النظام</h2>
        <input type="password" id="pin-in" maxlength="4" style="width:100%; padding:12px; text-align:center; font-size:20px; background:#1e293b; color:white; border:1px solid var(--border); border-radius:8px;">
        <button onclick="Core.login()" style="width:100%; margin-top:10px; padding:12px; background:var(--accent); border:none; border-radius:8px; color:white; font-weight:700;">دخول</button>
    </div>
</div>

<nav>
    <button class="nav-btn active" onclick="Core.setTab('view')">👥 عرض الطلائع</button>
    <button class="nav-btn" onclick="Core.setTab('rank')">🏆 الترتيب</button>
    <button id="adm-btn" class="nav-btn hidden" style="color: #ef4444;" onclick="Core.reset()">⚠️ تهيئة</button>
</nav>

<div class="container" id="main-ui"></div>

<script>
const Core = (() => {
    const config = {
        apiKey: "AIzaSyA6P2gbckRDtKUqb8mVZcibXR4soZezFxE",
        databaseURL: "https://awtad-system-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(config);
    const db = firebase.database().ref("awtad_v8_stable");

    let state = { user: null, members: {}, tab: 'view' };

    return {
        login: () => {
            const pin = document.getElementById("pin-in").value;
            const admins = {"7777":"عبدالله العرفه", "9999":"سلمان الصويلح", "8888":"معاذ الشنقيطي"};
            if(admins[pin]) {
                state.user = { name: admins[pin], role: 'SUPER' };
            } else {
                const found = Object.values(state.members).find(m => m.pin === pin);
                if(found) state.user = found;
            }

            if(state.user) {
                document.getElementById("auth-gate").classList.add("hidden");
                if(state.user.role === 'SUPER') document.getElementById("adm-btn").classList.remove("hidden");
                Core.render();
            } else { alert("رمز خطأ"); }
        },

        setTab: (t) => { state.tab = t; Core.render(); },

        render: () => {
            const ui = document.getElementById("main-ui");
            ui.innerHTML = "";

            if(state.tab === 'view') {
                const teams = ["طليعة 1", "طليعة 2", "طليعة 3", "طليعة 4"];
                teams.forEach(t => {
                    const tMembers = Object.entries(state.members)
                        .filter(([id, m]) => m.team === t)
                        .sort((a,b) => b[1].pts - a[1].pts);

                    let html = `<div class="team-box">
                        <div class="team-title"><span>${t}</span><small>${tMembers.length} عضو</small></div>
                        <div class="member-list">`;
                    
                    tMembers.forEach(([id, m]) => {
                        html += `
                        <div class="m-card ${m.role === 'LEADER' ? 'is-leader' : ''}">
                            <div>
                                <div style="font-weight:700; font-size:14px;">${m.name} ${m.role === 'LEADER' ? '👑' : ''}</div>
                                <div class="badge-row">${(m.badges || []).map(b => `<span class="b-tag">${b}</span>`).join('')}</div>
                            </div>
                            <div style="text-align:left">
                                <div class="pts">${m.pts}</div>
                                ${state.user.role === 'SUPER' ? `<button class="btn-act" onclick="Core.addPts('${id}')">+</button>` : ''}
                            </div>
                        </div>`;
                    });
                    html += `</div></div>`;
                    ui.innerHTML += html;
                });
            }
        },

        addPts: (id) => {
            const p = parseInt(prompt("النقاط:"));
            if(!isNaN(p)) db.child("members").child(id).update({ pts: (state.members[id].pts || 0) + p });
        },

        reset: () => {
            if(!confirm("تهيئة الهيكل؟")) return;
            const raw = {
                "طليعة 1": ["الوليد الحازمي (ق)", "صالح حبتور", "حسن الشهري", "عزام خبراني", "يحي شراحيلي", "فهد المهيني", "زياد العجلاني", "يزيد خال", "غازي العجمي", "ريان جعام"],
                "طليعة 2": ["حاتم خريزي (ق)", "ياسر ابو حيه", "محمد عسيري", "علي الغامدي", "فواز الشهراني", "اصيل العتيبي", "صالح الخثعمي", "غازي العنزي", "ابراهيم التليدي", "رياض الزهراني"],
                "طليعة 3": ["راكان شراحيلي (ق)", "بسام قرادي", "بدر كعبي", "حسام الشهراني", "عبدالله قشاش", "عيسى الرشيدي", "عبدالعزيز القحطاني", "راشد الراشدي", "زايد القحطاني", "علي الشهراني"],
                "طليعة 4": ["وضاح الصويلح (ق)", "مشعل القحطاني", "ناصر المطيري", "مبارك خميس", "عبدالله القرني", "راكان حوباني", "رائد حوباني", "فارس العمري", "محمد فقيه", "مشاري القحطاني"]
            };
            let data = {};
            Object.entries(raw).forEach(([t, ms]) => {
                ms.forEach(m => {
                    const id = "ID_" + Math.random().toString(36).substr(2, 5).toUpperCase();
                    data[id] = { name: m.replace("(ق)","").trim(), team: t, role: m.includes("(ق)")?'LEADER':'MEMBER', pts: 0, pin: Math.floor(1000+Math.random()*8999).toString(), badges: [] };
                });
            });
            db.child("members").set(data);
        },

        init: () => {
            db.child("members").on("value", snap => {
                state.members = snap.val() || {};
                if(state.user) Core.render();
            });
        }
    };
})();
Core.init();
</script>
</body>
</html>
