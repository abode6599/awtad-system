<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الإدارة الكشفية - مدرسة القاسم بن محمد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --primary: #2563eb; --secondary: #64748b; --success: #16a34a; --danger: #dc2626; --bg: #0f172a; --card: #1e293b; }
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: white; min-height: 100vh; font-size: 14px; }
        .container { padding: 15px; max-width: 900px; margin: auto; }
        .header-official { background: var(--card); padding: 20px; border-radius: 12px; border-right: 6px solid var(--primary); margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2); }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #334155; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .stat-box { background: #1e293b; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #334155; }
        input, select, textarea { background: #334155; color: white; border: 1px solid #475569; padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 10px; font-size: 14px; }
        button { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        .member-row { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 1px solid #334155; flex-wrap: wrap; }
        .name-area { flex: 1; display: flex; flex-direction: column; }
        .badge-list { display: flex; gap: 3px; margin-top: 4px; flex-wrap: wrap; }
        .badge-icon { font-size: 10px; background: #334155; padding: 2px 6px; border-radius: 4px; border: 1px solid var(--primary); }
        .controls { display: flex; gap: 5px; }
        .btn-tool { background: #475569; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; border-radius: 6px; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .official-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .official-table th { text-align: right; color: var(--secondary); font-size: 12px; padding: 8px; }
        .log-entry { font-size: 11px; padding: 5px; background: #0f172a; border-radius: 4px; margin-top: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const OFFICIAL_DATA = {
            admins: [
                { name: "سلمان الصويلح", id: "202021", title: "قائد الوحدة" },
                { name: "معاذ الشنقيطي", id: "202030", title: "مساعد القائد" },
                { name: "عبدالله العرفه", id: "333", title: "عريف أول" }
            ],
            leaders: [
                { name: "الوليد الحازمي", id: "619425", platoon: 1 },
                { name: "حاتم خريزي", id: "442971", platoon: 2 },
                { name: "راكان شراحيلي", id: "992041", platoon: 3 },
                { name: "وضاح الصويلح", id: "883102", platoon: 4 }
            ],
            violations: ["تأخر عن الاصطاف", "هندام غير مكتمل", "مخالفة التعليمات", "إحداث فوضى", "غياب"],
            excellence: ["انضباط مثالي", "مبادرة كشفية", "هندام متكامل", "إتقان عقد", "مساعدة زميل"],
            badges: ["وسام الخدمة", "وسام الهواية", "وسام الرياضي", "وسام المسامر", "وسام البيئة"]
        };

        const PLATOONS = [
            { id: 1, name: "طليعة 1", members: [{n:"صالح حبتور", id:"1-1"}, {n:"حسن الشهري", id:"1-2"}, {n:"ريان جعام", id:"1-3"}, {n:"غازي العجمي", id:"1-4"}, {n:"يزيد خال", id:"1-5"}, {n:"زياد العجلاني", id:"1-6"}, {n:"فهد المهيني", id:"1-7"}, {n:"يحي شراحيلي", id:"1-8"}, {n:"عزام خبراني", id:"1-9"}] },
            { id: 2, name: "طليعة 2", members: [{n:"ياسر ابو حيه", id:"2-1"}, {n:"محمد عسيري", id:"2-2"}, {n:"رياض الزهراني", id:"2-3"}, {n:"ابراهيم التليدي", id:"2-4"}, {n:"غازي العنزي", id:"2-5"}, {n:"صالح الخثعمي", id:"2-6"}, {n:"اصيل العتيبي", id:"2-7"}, {n:"فواز الشهراني", id:"2-8"}, {n:"علي الغامدي", id:"2-9"}] },
            { id: 3, name: "طليعة 3", members: [{n:"بسام قرادي", id:"3-1"}, {n:"علي الشهراني", id:"3-2"}, {n:"زايد القحطاني", id:"3-3"}, {n:"راشد الراشدي", id:"3-4"}, {n:"عبدالعزيز القحطاني", id:"3-5"}, {n:"عيسى الرشيدي", id:"3-6"}, {n:"بدر كعبي", id:"3-7"}, {n:"عبدالله قشاش", id:"3-8"}, {n:"حسام الشهراني", id:"3-9"}] },
            { id: 4, name: "طليعة 4", members: [{n:"مشعل القحطاني", id:"4-1"}, {n:"مشاري القحطاني", id:"4-2"}, {n:"محمد فقيه", id:"4-3"}, {n:"فارس العمري", id:"4-4"}, {n:"رائد حوباني", id:"4-5"}, {n:"راكان حوباني", id:"4-6"}, {n:"عبدالله القرني", id:"4-7"}, {n:"ناصر المطيري", id:"4-8"}, {n:"مبارك خميس", id:"4-9"}] }
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [pass, setPass] = useState("");
            const [date, setDate] = useState(new Date().toISOString().split("T")[0]);
            const [globalDb, setGlobalDb] = useState({});
            const [toolModal, setToolModal] = useState(null);

            useEffect(() => {
                const saved = localStorage.getItem("scout_master_v14");
                if (saved) setGlobalDb(JSON.parse(saved));
            }, []);

            const save = (newDb) => {
                setGlobalDb(newDb);
                localStorage.setItem("scout_master_v14", JSON.stringify(newDb));
            };

            const logAction = (mId, type, value) => {
                const day = globalDb[date] || {};
                const member = day[mId] || { status: "حاضر", score: 5, logs: [], badges: [] };
                
                if (type === 'log') {
                    member.logs.push({ text: value, by: user.name, time: new Date().toLocaleTimeString('ar-SA') });
                } else if (type === 'badge') {
                    if (!member.badges.includes(value)) member.badges.push(value);
                } else {
                    member[type] = value;
                }

                save({ ...globalDb, [date]: { ...day, [mId]: member } });
            };

            if (!user) return (
                <div className="container" style={{marginTop: "20vh", textAlign: "center"}}>
                    <h1 style={{color: var(--primary)}}>نظام الإدارة الكشفية</h1>
                    <div className="card">
                        <input type="password" value={pass} onChange={e => setPass(e.target.value)} placeholder="رمز الدخول الرسمي" />
                        <button onClick={() => {
                            const admin = OFFICIAL_DATA.admins.find(a => a.id === pass);
                            const leader = OFFICIAL_DATA.leaders.find(l => l.id === pass);
                            if (admin) setUser({...admin, role: 'admin'});
                            else if (leader) setUser({...leader, role: 'leader'});
                            else alert("الرمز غير صحيح");
                        }}>دخول النظام</button>
                    </div>
                </div>
            );

            return (
                <div className="container">
                    <div className="header-official">
                        <div style={{display: "flex", justifyContent: "space-between"}}>
                            <div>
                                <h2 style={{margin: 0}}>{user.name}</h2>
                                <span style={{color: "var(--primary)"}}>{user.title || `قائد ${PLATOONS.find(p => p.id === user.platoon).name}`}</span>
                            </div>
                            <button onClick={() => setUser(null)} style={{width: "auto", background: "none", color: var(--danger)}}>تسجيل الخروج</button>
                        </div>
                    </div>

                    {user.role === 'admin' && (
                        <div className="grid">
                            <div className="stat-box"><h4>حالة الانضباط</h4><p>94%</p></div>
                            <div className="stat-box"><h4>المخالفات النشطة</h4><p>3</p></div>
                            <div className="stat-box"><h4>التميز اليومي</h4><p>12</p></div>
                        </div>
                    )}

                    <div className="card"><input type="date" value={date} onChange={e => setDate(e.target.value)} /></div>

                    {/* عرض المسؤولين للإدارة فقط */}
                    {user.role === 'admin' && (
                        <div className="card" style={{borderRight: "4px solid var(--danger)"}}>
                            <h4 style={{margin: "0 0 10px"}}>سجل هيئة القيادة</h4>
                            {OFFICIAL_DATA.admins.map(a => (
                                <div key={a.id} className="member-row">
                                    <span className="member-name">{a.name} <span style={{fontSize: "10px", color: "var(--secondary)"}}>({a.title})</span></span>
                                    <div className="controls">
                                        <button className="btn-tool" onClick={() => setToolModal(a)}>📝</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* عرض الطلايع حسب الصلاحية */}
                    {PLATOONS.map(p => (
                        (user.role === 'admin' || user.platoon === p.id) && (
                            <div key={p.id} className="card">
                                <h3 style={{margin: "0 0 10px", color: var(--primary)}}>{p.name}</h3>
                                {p.members.map(m => {
                                    const data = globalDb[date]?.[m.id] || { status: "حاضر", score: 5, logs: [], badges: [] };
                                    return (
                                        <div key={m.id} className="member-row">
                                            <div className="name-area">
                                                <span className="member-name">{m.n}</span>
                                                <div className="badge-list">
                                                    {data.badges.map(b => <span key={b} className="badge-icon">{b}</span>)}
                                                </div>
                                            </div>
                                            <div className="controls">
                                                <select className="status-select" style={{width: "70px"}} value={data.status} onChange={e => logAction(m.id, 'status', e.target.value)}>
                                                    <option value="حاضر">حاضر</option>
                                                    <option value="غائب">غائب</option>
                                                    <option value="بعذر">بعذر</option>
                                                </select>
                                                <input type="number" className="score-input" style={{width: "45px"}} value={data.score} onChange={e => logAction(m.id, 'score', e.target.value)} />
                                                <button className="btn-tool" onClick={() => setToolModal(m)}>🛠️</button>
                                            </div>
                                            {data.logs.length > 0 && (
                                                <div style={{width: "100%"}}>
                                                    {data.logs.slice(-1).map((l, i) => (
                                                        <div key={i} className="log-entry">📌 {l.text} ({l.by})</div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        )
                    ))}

                    {/* نافذة الإدارة المتقدمة */}
                    {toolModal && (
                        <div className="modal">
                            <div className="card" style={{width: "100%", maxWidth: "450px"}}>
                                <h3 style={{marginTop: 0}}>إدارة الملف: {toolModal.n || toolModal.name}</h3>
                                <div style={{display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px"}}>
                                    <div>
                                        <label style={{fontSize: "12px", color: var(--success)}}>إضافة تميز</label>
                                        <select onChange={e => {logAction(toolModal.id, 'log', `تم التميز في: ${e.target.value}`); setToolModal(null);}}>
                                            <option value="">اختر...</option>
                                            {OFFICIAL_DATA.excellence.map(x => <option key={x} value={x}>{x}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label style={{fontSize: "12px", color: var(--danger)}}>رصد مخالفة</label>
                                        <select onChange={e => {logAction(toolModal.id, 'log', `مخالفة: ${e.target.value}`); setToolModal(null);}}>
                                            <option value="">اختر...</option>
                                            {OFFICIAL_DATA.violations.map(v => <option key={v} value={v}>{v}</option>)}
                                        </select>
                                    </div>
                                </div>
                                <div style={{marginTop: "10px"}}>
                                    <label style={{fontSize: "12px", color: var(--primary)}}>منح وسام رسمي</label>
                                    <select onChange={e => {logAction(toolModal.id, 'badge', e.target.value); setToolModal(null);}}>
                                        <option value="">اختر الوسام...</option>
                                        {OFFICIAL_DATA.badges.map(b => <option key={b} value={b}>{b}</option>)}
                                    </select>
                                </div>
                                <button onClick={() => setToolModal(null)} style={{marginTop: "15px", background: var(--secondary)}}>إغلاق</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
