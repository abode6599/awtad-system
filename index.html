<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWTAD V11.3 | نظام أوتاد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --gold: #fbbf24;
            --text: #f8fafc; --sub: #94a3b8; --border: #334155; --danger: #ef4444; --success: #22c55e;
        }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; transition: 0.3s; }
        body { background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        nav { background: var(--card); border-bottom: 2px solid var(--border); display: flex; overflow-x: auto; padding: 10px; gap: 8px; position: sticky; top: 0; z-index: 1000; }
        .nav-btn { padding: 10px 15px; border-radius: 8px; border: none; background: var(--bg); color: var(--sub); cursor: pointer; font-weight: 700; white-space: nowrap; }
        .nav-btn.active { background: var(--accent); color: white; }
        .container { padding: 15px; max-width: 1200px; margin: auto; }
        .member-card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 15px; cursor: pointer; margin-bottom: 10px; }
        .leader-card { border-right: 5px solid var(--gold); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 100%; max-width: 600px; border: 1px solid var(--accent); max-height: 90vh; overflow-y: auto; }
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); }
        .btn { padding: 12px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; width: 100%; margin-top: 5px; }
        .btn-p { background: var(--accent); color: white; }
        .btn-s { background: var(--gold); color: black; }
        .btn-d { background: var(--danger); color: white; }
        .admin-box { border: 1px dashed var(--gold); padding: 15px; border-radius: 12px; margin-top: 15px; background: rgba(251, 191, 36, 0.05); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth-gate" style="position:fixed; inset:0; background:var(--bg); z-index:5000; display:flex; align-items:center; justify-content:center;">
    <div style="width: 340px; text-align: center; padding: 30px; background: var(--card); border-radius: 20px; border: 1px solid var(--accent);">
        <h2 style="color: var(--accent)">AWTAD V11.3</h2>
        <input type="password" id="entry-pin" maxlength="4" placeholder="رمز الدخول" style="text-align:center; letter-spacing:8px;">
        <button class="btn btn-p" id="login-btn" onclick="Sys.login()">دخول النظام</button>
        <button class="btn" style="background:var(--danger); color:white; font-size:10px; margin-top:20px;" onclick="Sys.factoryReset()">تهيئة النظام (للمشرفين)</button>
    </div>
</div>

<nav id="main-nav" class="hidden">
    <button class="nav-btn active" onclick="Sys.route('field', this)">👥 الميدان</button>
    <button class="nav-btn" onclick="Sys.route('vote', this)">🗳️ التصويت</button>
    <button class="nav-btn" id="req-nav" onclick="Sys.route('requests', this)">📩 الطلبات</button>
    <button class="nav-btn" onclick="Sys.route('logs', this)">📜 السجلات</button>
    <button class="nav-btn" id="adm-nav" onclick="Sys.route('admin', this)">⚙️ الإدارة</button>
</nav>

<div class="container hidden" id="main-container">
    <div id="content-area"></div>
</div>

<div id="member-modal" class="modal hidden">
    <div class="modal-content" id="member-detail-ui"></div>
</div>

<div id="badge-modal" class="modal hidden">
    <div class="modal-content">
