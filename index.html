<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>أوتاد | نظام إدارة الفرقة الكشفية</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg:#060d06; --bg2:#0c160c; --card:#101e10; --card2:#152415;
  --border:#1e3a1e; --border2:#2d522d;
  --green:#4ade80; --green2:#22c55e; --green3:#bbf7d0;
  --gold:#fbbf24; --gold2:#f59e0b;
  --red:#f43f5e; --blue:#60a5fa; --purple:#a78bfa;
  --text:#e2f5e2; --text2:#86b886; --text3:#4a7a4a;
}
.light {
  --bg:#f0f7f0; --bg2:#e4f0e4; --card:#ffffff; --card2:#f5faf5;
  --border:#c8e6c8; --border2:#a5d6a5;
  --text:#1a2e1a; --text2:#3a5a3a; --text3:#6a8a6a;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Cairo',sans-serif;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(74,222,128,0.07) 0%,transparent 70%),
             radial-gradient(ellipse 40% 40% at 90% 90%,rgba(251,191,36,0.04) 0%,transparent 60%)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* LOGIN */
#login-screen{position:fixed;inset:0;z-index:10000;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px}
.login-wrap{width:100%;max-width:380px;text-align:center}
.login-logo{font-size:52px;font-weight:900;color:var(--green);letter-spacing:-2px;line-height:1;text-shadow:0 0 40px rgba(74,222,128,0.4);margin-bottom:4px}
.login-sub{color:var(--text3);font-size:13px;margin-bottom:36px;letter-spacing:3px}
.login-box{background:var(--card);border:1px solid var(--border2);border-radius:24px;padding:32px 28px;box-shadow:0 20px 60px rgba(0,0,0,0.4)}
.pin-display{display:flex;justify-content:center;gap:12px;margin-bottom:28px}
.pin-dot{width:14px;height:14px;border-radius:50%;background:var(--border2);border:2px solid var(--border2);transition:all 0.2s}
.pin-dot.filled{background:var(--green);border-color:var(--green);box-shadow:0 0 10px rgba(74,222,128,0.5)}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.num-btn{background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:18px;font-size:22px;font-weight:700;color:var(--text);cursor:pointer;transition:all 0.15s;font-family:'Cairo',sans-serif}
.num-btn:active{transform:scale(0.93);background:var(--border)}
.num-btn.del{font-size:16px;color:var(--text2)}
.num-btn.enter{background:var(--green2);color:#000;font-size:15px;font-weight:900}
.login-error{color:var(--red);font-size:13px;margin-top:14px;min-height:18px}

/* APP */
#app{display:none;position:relative;z-index:1;padding-bottom:80px}

/* HEADER */
.header{position:sticky;top:0;z-index:100;background:rgba(6,13,6,0.88);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.light .header{background:rgba(240,247,240,0.92)}
.header-user{display:flex;align-items:center;gap:12px}
.avatar{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;flex-shrink:0;border:2px solid currentColor}
.header-name{font-size:15px;font-weight:700}
.header-rank{font-size:11px;color:var(--text2);margin-top:1px}
.header-actions{display:flex;gap:8px}
.icon-btn{height:36px;padding:0 12px;border-radius:10px;background:var(--card2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;color:var(--text2);font-family:'Cairo',sans-serif;font-weight:700;transition:all 0.2s}
.icon-btn:active{transform:scale(0.9)}

/* NAV */
nav{position:fixed;bottom:0;width:100%;z-index:1000;background:var(--card);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;padding:8px 0 14px}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--text3);font-size:10px;font-weight:700;cursor:pointer;padding:4px 8px;border-radius:12px;transition:all 0.2s;min-width:50px}
.nav-icon{font-size:20px;transition:transform 0.2s}
.nav-item.active{color:var(--green)}
.nav-item.active .nav-icon{transform:translateY(-2px)}

/* PAGES */
.page{display:none;padding:16px;max-width:680px;margin:0 auto}
.page.active{display:block}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:18px;margin-bottom:12px;position:relative;overflow:hidden}
.card-title{font-size:12px;color:var(--text2);font-weight:700;letter-spacing:1px;margin-bottom:10px}
.section-title{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:2px;margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* BUTTONS */
.btn{width:100%;padding:15px;border-radius:14px;border:none;font-weight:900;font-size:15px;cursor:pointer;font-family:'Cairo',sans-serif;transition:all 0.2s;margin-top:10px}
.btn:active{transform:scale(0.97)}
.btn-green{background:var(--green2);color:#000}
.btn-gold{background:var(--gold2);color:#000}
.btn-red{background:var(--red);color:#fff}
.btn-ghost{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.btn-sm{padding:10px 16px;font-size:13px;width:auto;margin:0}

/* INPUTS */
input,select,textarea{width:100%;padding:14px 16px;border-radius:13px;border:1px solid var(--border2);background:var(--bg2);color:var(--text);font-size:15px;font-family:'Cairo',sans-serif;margin-top:10px;outline:none;transition:border 0.2s}
input:focus,select:focus,textarea:focus{border-color:var(--green)}
textarea{resize:none;min-height:80px}
select option{background:var(--card)}
label{font-size:13px;color:var(--text2);font-weight:600;display:block;margin-top:14px}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:8px;font-size:11px;font-weight:700}
.badge-green{background:rgba(74,222,128,0.15);color:var(--green)}
.badge-gold{background:rgba(251,191,36,0.15);color:var(--gold)}
.badge-red{background:rgba(244,63,94,0.15);color:var(--red)}
.badge-blue{background:rgba(96,165,250,0.15);color:var(--blue)}
.badge-purple{background:rgba(167,139,250,0.15);color:var(--purple)}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.dot-green{background:var(--green);box-shadow:0 0 8px var(--green)}
.dot-red{background:var(--red);box-shadow:0 0 8px var(--red)}
.hidden{display:none!important}

/* HOME */
.pts-card{text-align:center;padding:28px 20px;background:linear-gradient(135deg,var(--card) 0%,var(--card2) 100%)}
.pts-num{font-size:60px;font-weight:900;color:var(--gold);line-height:1}
.pts-label{font-size:11px;color:var(--text3);margin-top:4px;letter-spacing:2px}
.ann-item{padding:14px 0;border-bottom:1px solid var(--border);display:flex;gap:12px}
.ann-item:last-child{border-bottom:none}
.ann-text{font-size:14px;line-height:1.5}
.ann-time{font-size:11px;color:var(--text3);margin-top:4px}
.ann-author{font-size:11px;color:var(--green);font-weight:700}
.badges-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.badge-item{background:var(--card2);border:1px solid var(--border2);border-radius:12px;padding:8px 14px;font-size:12px;font-weight:700;color:var(--text2);display:flex;align-items:center;gap:6px}
.badge-item.earned{color:var(--gold);border-color:rgba(251,191,36,0.3);background:rgba(251,191,36,0.08)}

/* TASK */
.task-item{padding:14px;border-radius:14px;background:var(--card2);border:1px solid var(--border);margin-bottom:8px}
.task-title{font-size:14px;font-weight:700}
.task-desc{font-size:12px;color:var(--text2);margin-top:4px;line-height:1.4}
.task-footer{display:flex;gap:8px;margin-top:10px;align-items:center;flex-wrap:wrap}
.task-pts{font-size:12px;color:var(--gold);font-weight:700}

/* FIELD */
.team-header{display:flex;align-items:center;gap:10px;padding:14px 0 8px;border-bottom:1px solid var(--border);margin-bottom:8px}
.team-color{width:4px;height:36px;border-radius:4px;flex-shrink:0}
.team-name{font-size:16px;font-weight:900}
.team-count{font-size:12px;color:var(--text3)}
.team-pts-total{font-size:14px;color:var(--gold);font-weight:700;margin-right:auto}
.member-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:14px;background:var(--card2);border:1px solid var(--border);margin-bottom:6px;cursor:pointer;transition:all 0.2s}
.member-row:active{transform:scale(0.98)}
.member-avatar{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;flex-shrink:0}
.member-name{font-size:14px;font-weight:700}
.member-rank{font-size:11px;color:var(--text2);margin-top:2px}
.member-pts{font-size:15px;font-weight:900;color:var(--gold)}

/* LEADERBOARD */
.lb-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:14px;background:var(--card2);border:1px solid var(--border);margin-bottom:6px}
.lb-rank{font-size:20px;font-weight:900;width:32px;text-align:center}
.lb-rank.gold{color:var(--gold)}
.lb-rank.silver{color:#94a3b8}
.lb-rank.bronze{color:#cd7f32}
.lb-info{flex:1;min-width:0}
.lb-name{font-size:14px;font-weight:700}
.lb-team{font-size:11px;color:var(--text2)}
.lb-pts{font-size:18px;font-weight:900;color:var(--gold)}
.lb-bar-wrap{height:3px;background:var(--border);border-radius:3px;margin-top:4px}
.lb-bar{height:3px;border-radius:3px}
.lb-tabs{display:flex;gap:8px;margin-bottom:14px}
.lb-tab{flex:1;text-align:center;padding:10px;border-radius:12px;font-size:13px;font-weight:700;background:var(--card2);border:1px solid var(--border);cursor:pointer;color:var(--text2);transition:all 0.2s;font-family:'Cairo',sans-serif}
.lb-tab.active{background:rgba(74,222,128,0.15);color:var(--green);border-color:rgba(74,222,128,0.3)}

/* DASHBOARD */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px 14px;text-align:center}
.stat-num{font-size:28px;font-weight:900;line-height:1}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:4px}
.chart-wrap{position:relative;height:200px}
.log-item{padding:10px 0;border-bottom:1px solid var(--border);display:flex;gap:10px}
.log-time{font-size:11px;color:var(--green);font-weight:700;white-space:nowrap;margin-top:2px}
.log-txt{font-size:12px;color:var(--text2);line-height:1.4}

/* ATTENDANCE */
.att-session-card{background:var(--card2);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:8px}
.att-session-title{font-size:14px;font-weight:700}
.att-session-date{font-size:11px;color:var(--text3);margin-top:2px}
.att-member-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.att-member-row:last-child{border-bottom:none}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:20px}
.modal-content{background:var(--card);border:1px solid var(--border2);border-radius:24px;padding:24px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.modal-title{font-size:18px;font-weight:900;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.modal-close{margin-top:20px;width:100%;padding:12px;border-radius:12px;background:var(--card2);border:1px solid var(--border);color:var(--text2);font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif}

/* UTILS */
.gps-btn{width:100%;padding:14px;border-radius:14px;background:var(--card2);border:1px solid var(--border);color:var(--text);font-weight:700;display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;font-family:'Cairo',sans-serif}
.gps-pulse{width:10px;height:10px;background:var(--green);border-radius:50%;box-shadow:0 0 0 0 rgba(74,222,128,0.4);animation:pulse 2s infinite}
@keyframes pulse{0%{transform:scale(0.95);box-shadow:0 0 0 0 rgba(74,222,128,0.7)}70%{transform:scale(1);box-shadow:0 0 0 10px rgba(74,222,128,0)}100%{transform:scale(0.95);box-shadow:0 0 0 0 rgba(74,222,128,0)}}

.att-toggle{display:flex;gap:4px;background:var(--bg2);padding:4px;border-radius:12px;margin-top:8px}
.att-btn{flex:1;padding:10px;border-radius:9px;border:none;background:transparent;color:var(--text3);font-size:12px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;transition:all 0.2s}
.att-btn.present-active{background:var(--green2);color:#000}
.att-btn.absent-active{background:var(--red);color:#fff}

.manage-section{margin-top:20px;padding-top:20px;border-top:1px solid var(--border)}
.manage-section-title{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:1px;margin-bottom:10px;text-transform:uppercase}

.archive-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:14px;background:var(--card2);border:1px solid var(--border);margin-bottom:8px}
.archive-name{font-size:14px;font-weight:700}
.archive-meta{font-size:11px;color:var(--text3);margin-top:2px}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--card);border:1px solid var(--border2);padding:12px 24px;border-radius:16px;z-index:20000;font-weight:700;font-size:14px;box-shadow:0 10px 30px rgba(0,0,0,0.3);transition:all 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);display:flex;align-items:center;gap:10px}
.toast.show{transform:translateX(-50%) translateY(0)}

@media (max-width: 400px) {
  .login-logo{font-size:42px}
  .numpad{gap:8px}
  .num-btn{padding:15px;font-size:20px}
}
</style>
</head>
<body class="dark">

<div id="login-screen">
  <div class="login-wrap">
    <div class="login-logo" onclick="App.hardReset()">أوتاد</div>
    <div class="login-sub">نظام إدارة الفرقة الكشفية</div>
    <div class="login-box">
      <div class="pin-display" id="pin-display">
        <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
      </div>
      <div class="numpad">
        <button class="num-btn" onclick="Login.add(1)">1</button>
        <button class="num-btn" onclick="Login.add(2)">2</button>
        <button class="num-btn" onclick="Login.add(3)">3</button>
        <button class="num-btn" onclick="Login.add(4)">4</button>
        <button class="num-btn" onclick="Login.add(5)">5</button>
        <button class="num-btn" onclick="Login.add(6)">6</button>
        <button class="num-btn" onclick="Login.add(7)">7</button>
        <button class="num-btn" onclick="Login.add(8)">8</button>
        <button class="num-btn" onclick="Login.add(9)">9</button>
        <button class="num-btn del" onclick="Login.del()">مسح</button>
        <button class="num-btn" onclick="Login.add(0)">0</button>
        <button class="num-btn enter" onclick="Login.submit()">دخول</button>
      </div>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>
</div>

<div id="app">
  <header class="header">
    <div class="header-user" id="header-user">
      <div class="avatar" style="color:var(--green)">--</div>
      <div><div class="header-name">جاري التحميل...</div><div class="header-rank">الرجاء الانتظار</div></div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="App.toggleTheme()">🌓</button>
      <button class="icon-btn" onclick="App.logout()">خروج</button>
    </div>
  </header>

  <main>
    <div id="page-home" class="page"></div>
    <div id="page-tasks" class="page"></div>
    <div id="page-field" class="page"></div>
    <div id="page-attendance" class="page"></div>
    <div id="page-leaderboard" class="page"></div>
    <div id="page-dashboard" class="page"></div>
    <div id="page-manage" class="page"></div>
  </main>

  <nav>
    <div class="nav-item active" onclick="App.page('home',this)"><span class="nav-icon">🏠</span><span>الرئيسية</span></div>
    <div class="nav-item" onclick="App.page('tasks',this)"><span class="nav-icon">🎯</span><span>المهام</span></div>
    <div class="nav-item" onclick="App.page('field',this)"><span class="nav-icon">🛡️</span><span>الميدان</span></div>
    <div class="nav-item" onclick="App.page('attendance',this)"><span class="nav-icon">📍</span><span>الحضور</span></div>
    <div class="nav-item" onclick="App.page('leaderboard',this)"><span class="nav-icon">🏆</span><span>الترتيب</span></div>
    <div id="nav-admin" class="nav-item hidden" onclick="App.page('dashboard',this)"><span class="nav-icon">⚙️</span><span>الإدارة</span></div>
  </nav>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal-content" id="modal-content"></div>
</div>

<div id="toast" class="toast"></div>

<script>
// ─── CONFIG ───
const firebaseConfig = { databaseURL: "https://awtad-scout-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const DB = firebase.database().ref();

// ─── STATE ───
let S = {
  user: null, members: {}, tasks: [], sessions: [], announcements: [], logs: [],
  inviteCodes: {}, archived: {}, tab: 'home', lbTab: 'global', pin: ''
};

// ─── UTILS ───
const hexRgb = (hex) => {
  const r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
  return `${r},${g},${b}`;
};
const teamColor = (t) => {
  const colors = { 'ليث': '#4ade80', 'صقر': '#fbbf24', 'ذئب': '#60a5fa', 'فهد': '#f43f5e', 'نمر': '#a78bfa', 'طليعة النسر': '#ff9f43' };
  return colors[t] || '#4ade80';
};
const initials = (n) => n.split(' ').map(x=>x[0]).join('').slice(0,2);

// ─── CORE ───
const App = {
  init(){
    DB.on('value', snap => {
      const d = snap.val() || {};
      S.members = d.members || {};
      S.tasks = Object.entries(d.tasks||{}).map(([id,v])=>({id,...v})).sort((a,b)=>b.ts-a.ts);
      S.sessions = Object.values(d.sessions||{}).sort((a,b)=>b.ts-a.ts);
      S.announcements = Object.values(d.announcements||{}).sort((a,b)=>b.ts-a.ts);
      S.logs = Object.values(d.logs||{}).sort((a,b)=>b.ts-a.ts);
      S.inviteCodes = d.inviteCodes || {};
      S.archived = d.archived || {};
      if(S.user) { S.user = S.members[S.user.id]; Render.all(); }
    });
  },
  page(name, el){
    S.tab=name;
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById('page-'+name).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    if(el)el.classList.add('active');
    Render[name]();
  },
  toggleTheme(){ document.body.classList.toggle('light'); localStorage.setItem('awtad_theme',document.body.classList.contains('light')?'light':'dark'); },
  logout(){ UI.confirm('تسجيل الخروج','هل تريد الخروج من النظام؟','خروج',()=>location.reload()); },
  log(txt){ DB.child('logs').push({txt,ts:Date.now(),time:new Date().toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'})}); },
  hardReset: async ()=>{
    const k=prompt('أدخل رمز المالك:'); if(k!=='7777')return;
    const m={};
    [{n:'سلمان الصويلح',r:'قائد الفرقة',p:'1111'},{n:'معاذ الشنقيطي',r:'نائب قائد الفرقة',p:'2222'},{n:'عبدالله العرفه',r:'قائد طليعة',p:'1000'}]

// ─── LOGIN ───
const Login = {
  add(n){ if(S.pin.length<4){ S.pin+=n; this.update(); } },
  del(){ S.pin=S.pin.slice(0,-1); this.update(); },
  update(){ document.querySelectorAll('.pin-dot').forEach((d,i)=>d.className=i<S.pin.length?'pin-dot filled':'pin-dot'); },
  submit(){
    const p=S.pin; if(!S.members[p]){ document.getElementById('login-error').textContent='الرمز غير صحيح'; S.pin=''; this.update(); return; }
    S.user={...S.members[p],id:p}; localStorage.setItem('awtad_pin',p);
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    if(S.user.role==='ROOT'||S.user.role==='LEADER') document.getElementById('nav-admin').classList.remove('hidden');
    App.init(); UI.toast(`أهلاً بك يا ${S.user.name.split(' ')[0]} 👋`);
  },
  auto(){ const p=localStorage.getItem('awtad_pin'); if(p){ S.pin=p; setTimeout(()=>this.submit(),500); } }
};

  setAtt(id,val){ DB.child('members').child(id).update({isPresent:val}); App.log(`${S.user.name} سجّل [${S.members[id].name}] كـ ${val?'حاضر':'غائب'}`); UI.toast(val?'تم تسجيل الحضور ✓':'تم تسجيل الغياب'); UI.closeModal(); },
  pts(id,dir){ const v=parseInt(document.getElementById('pts-v').value); if(!v||v<=0){UI.toast('أدخل عدد صحيح','error');return;} DB.child('members').child(id).update({pts:(S.members[id].pts||0)+v*dir}); App.log(`${S.user.name} ${dir>0?'أضاف':'خصم'} ${v} نقطة لـ ${S.members[id].name}`); UI.toast(dir>0?`+${v} نقطة ✓`:`−${v} نقطة`); UI.closeModal(); },
  badge(id){ const b=document.getElementById('bdg-v').value.trim(); if(!b){UI.toast('اكتب اسم الوسام','error');return;} DB.child('members').child(id).update({badges:[...(S.members[id].badges||[]),b]}); App.log(`${S.user.name} منح وسام [${b}] لـ ${S.members[id].name}`); UI.toast('تم منح الوسام 🏅'); UI.closeModal(); },
  pin(id){ const np=document.getElementById('pin-v').value.trim(); if(!np||np.length<4){UI.toast('الرمز يجب 4 أرقام','error');return;} if(S.members[np]&&np!==id){UI.toast('الرمز مستخدم','error');return;} const old=S.members[id]; DB.child('members').child(np).set({...old, pin:np}); DB.child('members').child(id).remove(); UI.toast('تم تحديث الرمز ✓'); UI.closeModal(); },
  archive(id){ if(!confirm('أرشفة العضو؟'))return; const m=S.members[id]; DB.child('archived').child(id).set({...m, archivedAt:Date.now()}); DB.child('members').child(id).remove(); UI.toast('تمت الأرشفة 🗂️'); UI.closeModal(); }
};

// ─── ATTENDANCE ───
const Attendance = {
  _att:{}, _gps:'',
  newSession(){
    const myM=Object.entries(S.members).filter(([,m])=>m.team===S.user.team); this._att={}; this._gps=''; myM.forEach(([id])=>{this._att[id]=false;});
    UI.openModal(`<div class="modal-title">📋 جلسة حضور جديدة</div><label>عنوان الجلسة</label><input id="s-title" placeholder="اجتماع، رحلة..."><label>تحديد الموقع</label><button class="gps-btn" onclick="Attendance.getGPS()"><div class="gps-pulse"></div>تحديد موقعي</button><div id="gps-res" style="font-size:12px;color:var(--text3);margin-top:6px"></div><label style="margin-top:16px">تسجيل الحضور</label><div id="att-list">${myM.map(([id,m])=>`<div style="display:flex;align-items:center;gap:8px;margin-top:8px"><span style="font-size:13px;flex:1">${m.name}</span><button class="att-btn" id="ap-${id}" onclick="Attendance.toggle('${id}',true)">حاضر</button><button class="att-btn absent-active" id="aa-${id}" onclick="Attendance.toggle('${id}',false)">غائب</button></div>`).join('')}</div><button class="btn btn-green" onclick="Attendance.save()">حفظ الجلسة ✓</button><button class="modal-close" onclick="UI.closeModal()">إغلاق</button>`);
  },
  toggle(id,val){ this._att[id]=val; document.getElementById(`ap-${id}`).className='att-btn'+(val?' present-active':''); document.getElementById(`aa-${id}`).className='att-btn'+(val?'':' absent-active'); },
  getGPS(){ if(!navigator.geolocation){UI.toast('GPS غير مدعوم','error');return;} document.getElementById('gps-res').textContent='جاري التحديد...'; navigator.geolocation.getCurrentPosition(p=>{ this._gps=`${p.coords.latitude.toFixed(5)}, ${p.coords.longitude.toFixed(5)}`; document.getElementById('gps-res').textContent=`📍 ${this._gps}`; UI.toast('تم تحديد الموقع ✓'); },()=>{ UI.toast('تعذّر تحديد الموقع','error'); }); },
  save(){ const title=document.getElementById('s-title').value.trim()||'جلسة', id=Date.now().toString(); DB.child('sessions').child(id).set({id,title,date:new Date().toLocaleDateString('ar-SA'),team:S.user.team,gps:this._gps,attendance:{...this._att},ts:Date.now(),createdBy:S.user.name}); App.log(`${S.user.name} سجّل جلسة [${title}]`); UI.toast('تم الحفظ ✓'); UI.closeModal(); }
};

// ─── TASKS ───
const Tasks = {
  complete(taskId,userId){ const t=S.tasks.find(x=>x.id===taskId); if(!t)return; DB.child('tasks').child(taskId).update({done:true,completedBy:userId,completedAt:Date.now()}); DB.child('members').child(userId).update({pts:(S.members[userId].pts||0)+(t.pts||0)}); App.log(`${S.members[userId].name} أنجز [${t.title}]`); UI.toast(`أحسنت! +${t.pts||0} نقطة 🎉`); }
};

// ─── ADMIN ───
const Admin = {
  sendAnn(){ const txt=document.getElementById('ann-text').value.trim(); if(!txt){UI.toast('اكتب الإعلان','error');return;} DB.child('announcements').push({text:txt,author:S.user.name,ts:Date.now(),time:new Date().toLocaleDateString('ar-SA')}); App.log(`${S.user.name} أرسل إعلاناً`); document.getElementById('ann-text').value=''; UI.toast('تم الإرسال 📢'); },
  showAdd(){ const teams=[...new Set(Object.values(S.members).map(m=>m.team))]; UI.openModal(`<div class="modal-title">➕ إضافة عضو</div><label>الاسم</label><input id="nm-n"><label>الرتبة</label><input id="nm-r"><label>الطليعة</label><select id="nm-t">${teams.map(t=>`<option>${t}</option>`).join('')}<option value="__new__">+ طليعة جديدة</option></select><div id="nm-tn" style="display:none"><input id="nm-tn-v" placeholder="اسم الطليعة"></div><label>الرمز السري</label><input id="nm-p" type="number"><label>الدور</label><select id="nm-role"><option value="USER">كشاف</option><option value="LEADER">قائد طليعة</option></select><button class="btn btn-green" onclick="Admin.addMember()">إضافة ✓</button><button class="modal-close" onclick="UI.closeModal()">إغلاق</button>`); document.getElementById('nm-t').onchange=e=>document.getElementById('nm-tn').style.display=e.target.value==='__new__'?'block':'none'; },
  addMember(){ const name=document.getElementById('nm-n').value.trim(), pin=document.getElementById('nm-p').value.trim(); let team=document.getElementById('nm-t').value; if(team==='__new__')team=document.getElementById('nm-tn-v').value.trim(); if(!name||!pin||pin.length<4){UI.toast('أكمل الحقول (الرمز 4+)','error');return;} if(S.members[pin]){UI.toast('الرمز مستخدم','error');return;} DB.child('members').child(pin).set({name,rank:document.getElementById('nm-r').value.trim()||'كشاف',team,role:document.getElementById('nm-role').value,pts:0,pin,badges:['عضو جديد'],isPresent:false,joinDate:Date.now()}); if(!S.inviteCodes[team])Admin.genCode(team,false); UI.toast('تمت الإضافة ✓'); UI.closeModal(); },
  showAddTask(){ UI.openModal(`<div class="modal-title">📝 مهمة جديدة</div><label>العنوان</label><input id="tk-t"><label>الوصف</label><textarea id="tk-d"></textarea><label>النقاط</label><input id="tk-p" type="number" value="10"><label>تعيين لـ</label><select id="tk-a"><option value="all">الجميع</option>${Object.entries(S.members).map(([id,m])=>`<option value="${id}">${m.name}</option>`).join('')}</select><button class="btn btn-green" onclick="Admin.addTask()">إنشاء ✓</button><button class="modal-close" onclick="UI.closeModal()">إغلاق</button>`); },
  addTask(){ const title=document.getElementById('tk-t').value.trim(), id=Date.now().toString(); if(!title)return; DB.child('tasks').child(id).set({title,desc:document.getElementById('tk-d').value.trim(),pts:parseInt(document.getElementById('tk-p').value)||0,assignedTo:document.getElementById('tk-a').value,done:false,ts:Date.now(),createdBy:S.user.name}); UI.toast('تم الإنشاء ✓'); UI.closeModal(); },
  genCode(team,toast=true){ const c=(team.replace(/\s/g,'').slice(0,3).toUpperCase()+(Math.floor(1000+Math.random()*9000))).toString(); DB.child('inviteCodes').child(team).set(c); if(toast)UI.toast('تم التجديد ✓'); },
  restoreMember(pin){ const m=S.archived[pin]; DB.child('members').child(pin).set({...m,archivedAt:undefined}); DB.child('archived').child(pin).remove(); UI.toast('تمت الاستعادة ✓'); }
};

// ─── INIT ───
window.onload=()=>{
  if(localStorage.getItem('awtad_theme')==='light') document.body.classList.add('light');
  Login.auto();
};
</script>
</body>
