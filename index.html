<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أوتاد V4.2 | مجلس الشورى</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #020617; --card: #1e293b; --accent: #3b82f6; --gold: #fbbf24; --text: #f8fafc; --border: #334155; --danger: #f43f5e; --success: #10b981; }
        .light-mode { --bg: #f1f5f9; --card: #ffffff; --text: #0f172a; --border: #e2e8f0; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; transition: 0.25s; }
        body { background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; }
        
        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-box { width: 90%; max-width: 400px; text-align: center; padding: 45px; background: var(--card); border-radius: 35px; border: 2px solid var(--accent); box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        
        nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 18px; border-top: 2px solid var(--border); z-index: 1000; }
        .nav-item { color: #94a3b8; font-size: 13px; cursor: pointer; font-weight: 800; text-align: center; }
        .nav-item.active { color: var(--accent); transform: translateY(-5px); }

        .container { padding: 20px; max-width: 650px; margin: auto; }
        .card { background: var(--card); border-radius: 25px; padding: 22px; margin-bottom: 15px; border: 1px solid var(--border); }
        .m-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid var(--border); cursor: pointer; }
        
        .status-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-left: 10px; }
        .present { background: var(--success); box-shadow: 0 0 15px var(--success); }
        .absent { background: var(--danger); box-shadow: 0 0 15px var(--danger); }

        input, select { width: 100%; padding: 16px; border-radius: 15px; border: 1px solid var(--border); background: var(--bg); color: var(--text); margin-top: 12px; font-size: 16px; }
        .btn { width: 100%; padding: 16px; border-radius: 15px; border: none; font-weight: 900; cursor: pointer; margin-top: 12px; font-size: 16px; }
        .btn-p { background: var(--accent); color: white; }
        .btn-g { background: var(--gold); color: black; }
        .hidden { display: none !important; }
        
        .log-entry { font-size: 12px; padding: 8px; border-bottom: 1px solid var(--border); color: #cbd5e1; }
        .log-time { color: var(--accent); font-weight: bold; margin-left: 8px; }
        .council-tag { background: var(--gold); color: black; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 900; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h1 style="color:var(--accent); margin:0; font-size:32px;">AWTAD V4.2</h1>
        <p style="color:#64748b; margin-top:5px;">بوابة القيادة العليا</p>
        <input type="password" id="pin-in" placeholder="أدخل رمزك الخاص" style="text-align:center; letter-spacing:10px; font-size:26px;">
        <button class="btn btn-p" onclick="Sys.login()">دخول النظام</button>
        <div onclick="Sys.hardReset()" style="margin-top:50px; color:#334155; font-size:10px; cursor:pointer; font-weight:bold;">RE-INITIALIZE COUNCIL</div>
    </div>
</div>

<div id="app" class="hidden">
    <div style="padding: 25px; text-align: center;">
        <button onclick="Sys.toggleTheme()" style="float:left; border:none; background:none; font-size:24px; cursor:pointer;">🌓</button>
        <h2 id="u-name" style="margin:0; font-size:24px;">---</h2>
        <p id="u-role" style="color:var(--gold); font-size:15px; font-weight:700;"></p>
    </div>

    <div class="container" id="content"></div>

    <nav>
        <div class="nav-item active" onclick="Sys.tab('home', this)">🏠 الرئيسية</div>
        <div class="nav-item" onclick="Sys.tab('field', this)">⚔️ الميدان</div>
        <div id="adm-nav" class="nav-item hidden" onclick="Sys.tab('admin', this)">🛡️ مجلس الشورى</div>
    </nav>
</div>

<div id="modal" class="hidden" style="position:fixed; inset:0; background:rgba(0,0,0,0.96); z-index:11000; display:flex; align-items:center; justify-content:center; padding:25px;">
    <div id="modal-body" class="card" style="width:100%; max-width:500px;"></div>
</div>

<script>
const Sys = (() => {
    const config = { apiKey: "AIzaSyA6P2gbckRDtKUqb8mVZcibXR4soZezFxE", databaseURL: "https://awtad-system-default-rtdb.firebaseio.com" };
    firebase.initializeApp(config);
    const db = firebase.database().ref("awtad_v4_2_council");

    let state = { user: null, members: {}, tab: 'home', logs: [] };

    return {
        hardReset: async () => {
            const k = prompt("أدخل رمز المالك للتهيئة:"); if(k !== "7777") return;
            let m = {};
            const council = [
                {n: "سلمان الصويلح", r: "قائد الوحدة", p: "1111"},
                {n: "معاذ الشنقيطي", r: "نائب قائد الوحدة", p: "2222"},
                {n: "عبدالله العرفه", r: "عريف أول الوحدة", p: "1000"}
            ];
            council.forEach(a => { m[a.p] = { name: a.n, role: 'ROOT', rank: a.r, team: "المجلس الأعلى", pts: 0, pin: a.p, badges: ["تأسيس"], isPresent: true }; });
            
            const p1Names = ["الوليد فيصل الحازمي", "يحي علي شراحيلي", "صالح سعيد حبتور"];
            p1Names.forEach((n, i) => {
                const p = (2000 + i).toString();
                m[p] = { name: n, role: 'USER', rank: i===0?'قائد طليعة':(i===1?'نائب قائد':'كشاف'), team: "طليعة 1", pts: 0, pin: p, badges: ["عضو جديد"], isPresent: false };
            });

            await db.set({ members: m, logs: {init: {txt: "تم تأسيس مجلس الشورى", time: "00:00"}} });
            alert("تمت التهيئة! عبدالله 1000، سلمان 1111، معاذ 2222.");
        },

        login: async () => {
            const p = document.getElementById("pin-in").value;
            const s = await db.child("members").once("value");
            const m = s.val() || {};
            if(m[p]) {
                state.user = { ...m[p], id: p };
                document.getElementById("login-screen").classList.add("hidden");
                document.getElementById("app").classList.remove("hidden");
                if(state.user.role === 'ROOT') document.getElementById("adm-nav").classList.remove("hidden");
                Sys.log(`دخل [${state.user.name}] إلى النظام`);
                Sys.sync();
            } else alert("الرمز غير صحيح");
        },

        sync: () => {
            db.on("value", s => {
                const d = s.val() || {};
                state.members = d.members || {};
                state.logs = Object.values(d.logs || {}).reverse();
                Sys.render();
            });
        },

        tab: (t, el) => {
            state.tab = t;
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            Sys.render();
        },

        render: () => {
            const root = document.getElementById("content");
            const me = state.members[state.user.id];
            document.getElementById("u-name").innerText = me.name;
            document.getElementById("u-role").innerText = `${me.rank} | ${me.team}`;
            root.innerHTML = "";

            if(state.tab === 'home') {
                root.innerHTML = `<div class="card" style="text-align:center;"><h3>نقاطي الحالية: <span style="color:var(--gold); font-size:32px;">${me.pts}</span></h3></div>
                <h3>أوسمتي المستلمة</h3><div class="card">${me.badges.map(b=>`<span style="background:rgba(59,130,246,0.2); padding:6px 12px; border-radius:10px; margin:4px; display:inline-block; font-size:12px;">${b}</span>`).join('')}</div>`;
            }

            if(state.tab === 'field') {
                const groups = ["المجلس الأعلى", "طليعة 1"];
                groups.forEach(t => {
                    const list = Object.entries(state.members).filter(m => m[1].team === t);
                    root.innerHTML += `<h3 style="margin-top:20px; color:var(--accent)">${t}</h3>`;
                    list.forEach(([id, m]) => {
                        root.innerHTML += `<div class="card m-row" onclick="Sys.manage('${id}')">
                            <span><span class="status-dot ${m.isPresent?'present':'absent'}"></span> ${m.name} ${m.role==='ROOT'?'<span class="council-tag">شورى</span>':''}</span>
                            <b style="color:var(--gold)">${m.pts}</b>
                        </div>`;
                    });
                });
            }

            if(state.tab === 'admin' && state.user.role === 'ROOT') {
                root.innerHTML = `<h3>سجل العمليات السري</h3><div class="card" style="max-height:450px; overflow:auto;">
                    ${state.logs.map(l=>`<div class="log-entry"><span class="log-time">[${l.time}]</span> ${l.txt}</div>`).join('')}
                </div>`;
            }
        },

        manage: (id) => {
            // التحقق من أن المستخدم هو من القيادة
            if(state.user.role !== 'ROOT') return;
            const m = state.members[id];
            
            document.getElementById("modal-body").innerHTML = `
                <h2 style="margin:0">${m.name}</h2>
                <p style="color:var(--gold)">${m.rank}</p>
                <div style="display:flex; gap:12px; margin-top:20px;">
                    <button class="btn" style="background:var(--success); color:white" onclick="Sys.setAtt('${id}', true)">حاضر ✅</button>
                    <button class="btn" style="background:var(--danger); color:white" onclick="Sys.setAtt('${id}', false)">غائب ❌</button>
                </div>
                <input type="number" id="amt" placeholder="أدخل عدد النقاط">
                <div style="display:flex; gap:12px">
                    <button class="btn btn-p" onclick="Sys.modPts('${id}', 1)">إضافة</button>
                    <button class="btn btn-p" style="background:#4b5563" onclick="Sys.modPts('${id}', -1)">خصم</button>
                </div>
                <input type="text" id="new-p" value="${m.pin}" placeholder="تغيير الرمز السري">
                <button class="btn btn-g" onclick="Sys.changePin('${id}')">تحديث الرمز</button>
                <button class="btn" style="background:#1e293b; margin-top:20px" onclick="Sys.close()">إغلاق</button>
            `;
            document.getElementById("modal").classList.remove("hidden");
        },

        setAtt: (id, val) => {
            db.child("members").child(id).update({ isPresent: val });
            Sys.log(`قام [${state.user.name}] بتحضير [${state.members[id].name}] كـ ${val?'حاضر':'غائب'}`);
            Sys.close();
        },

        modPts: (id, d) => {
            const v = parseInt(document.getElementById("amt").value);
            if(!v) return;
            const current = state.members[id].pts || 0;
            db.child("members").child(id).update({ pts: current + (v * d) });
            Sys.log(`عدل [${state.user.name}] نقاط [${state.members[id].name}] بـ (${v*d})`);
            Sys.close();
        },

        changePin: (id) => {
            const newP = document.getElementById("new-p").value;
            const oldP = state.members[id].pin;
            db.child("members").child(id).update({ pin: newP });
            Sys.log(`قام [${state.user.name}] بتغيير رمز [${state.members[id].name}] من (${oldP}) إلى (${newP})`);
            Sys.close();
        },

        log: (t) => {
            const now = new Date();
            const time = now.toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });
            db.child("logs").push({ txt: t, time: time });
        },

        toggleTheme: () => document.body.classList.toggle("light-mode"),
        close: () => document.getElementById("modal").classList.add("hidden")
    };
})();
</script>
</body>
</html>
