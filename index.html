<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام أوتاد الكشفي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #1e3a8a; --bg: #0f172a; --card: #1e293b; --gold: #eab308; --text: #f8fafc; --danger: #e11d48; --success: #10b981; }
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); direction: rtl; margin: 0; padding: 15px; }
        .container { max-width: 800px; margin: auto; }
        .card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #334155; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .header { text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 15px; margin-bottom: 20px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; }
        .tab { flex: 1; padding: 12px; background: #334155; border: none; color: white; border-radius: 10px; cursor: pointer; font-weight: bold; white-space: nowrap; }
        .tab.active { background: var(--primary); border: 1px solid var(--gold); }
        .btn { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 13px; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-danger { background: var(--danger); color: white; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #0f172a; color: white; border: 1px solid #334155; border-radius: 8px; }
        .student-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #334155; }
        .pts-display { font-size: 28px; font-weight: 900; color: var(--gold); }
        .badge-tag { background: rgba(234, 179, 8, 0.1); color: var(--gold); padding: 3px 10px; border-radius: 5px; font-size: 12px; margin-left: 5px; border: 1px solid var(--gold); }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: var(--card); margin: 15% auto; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; border: 1px solid var(--gold); }
    </style>
</head>
<body>

<div id="login-screen" class="container" style="padding-top: 10vh; max-width: 400px;">
    <div class="card" style="text-align: center;">
        <h1 style="color:var(--gold); margin:0;">أوتـاد 🛡️</h1>
        <p>نظام الإدارة الكشفية الرسمي</p>
        <input type="password" id="access-pin" placeholder="أدخل رمز الدخول">
        <button class="btn btn-primary" style="width: 100%; margin-top: 10px;" onclick="handleLogin()">تسجيل الدخول</button>
    </div>
</div>

<div id="main-app" class="container" style="display:none;">
    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3 id="user-display" style="margin:0;"></h3>
            <button class="btn btn-danger" onclick="location.reload()">خروج</button>
        </div>
        <div id="admin-controls" style="display:none; margin-top:15px; padding-top:10px; border-top:1px solid #444; gap:10px; display:flex;">
            <button class="btn btn-gold" onclick="exportWhatsApp()">تقرير شامل 📱</button>
            <button class="btn btn-danger" onclick="fullReset()">تصفير العام ⚠️</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="switchTab('list')">كشف الطلائع</button>
        <button class="tab" onclick="switchTab('ranking')">الترتيب العام</button>
        <button class="tab" onclick="switchTab('logs')">السجل التاريخي</button>
    </div>

    <div id="content-area"></div>
</div>

<div id="infoModal" class="modal">
    <div class="modal-content">
        <h3 id="modalName" style="color:var(--gold)"></h3>
        <p id="modalBody"></p>
        <button class="btn btn-danger" style="width:100%" onclick="closeModal()">إغلاق</button>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyA6P2gbckRDtKUqb8mVZcibXR4soZezFxE",
      authDomain: "awtad-system.firebaseapp.com",
      databaseURL: "https://awtad-system-default-rtdb.firebaseio.com", 
      projectId: "awtad-system"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const awtadRef = database.ref('awtad_v4_official');

    const USERS = {
        "8429": {name:"عبدالله العرفه", role:"admin"},
        "5173": {name:"سلمان الصويلح", role:"admin"},
        "9264": {name:"معاذ الشنقيطي", role:"admin"},
        "3058": {name:"الوليد الحازمي", role:"leader", pid: 1},
        "6712": {name:"حاتم خريزي", role:"leader", pid: 2},
        "4891": {name:"راكان شراحيلي", role:"leader", pid: 3},
        "2537": {name:"وضاح الصويلح", role:"leader", pid: 4}
    };

    const PLATOONS = [
        {id:1, name:"طليعة 1", members:["صالح حبتور","حسن الشهري","ريان جعام","غازي العجمي","يزيد خال","زياد العجلاني","فهد المهيني","يحي شراحيلي","عزام خبراني"]},
        {id:2, name:"طليعة 2", members:["ياسر ابو حيه","محمد عسيري","رياض الزهراني","ابراهيم التليدي","غازي العنزي","صالح الخثعمي","اصيل العتيبي","فواز الشهراني","علي الغامدي"]},
        {id:3, name:"طليعة 3", members:["بسام قرادي","علي الشهراني","زايد القحطاني","راشد الراشدي","عبدالعزيز القحطاني","عيسى الرشيدي","بدر كعبي","عبدالله قشاش","حسام الشهراني"]},
        {id:4, name:"طليعة 4", members:["مشعل القحطاني","مشاري القحطاني","محمد فقيه","فارس العمري","رائد حوباني","راكان حوباني","عبدالله القرني","ناصر المطيري","مبارك خميس"]}
    ];

    const BADGE_OPTIONS = ["وسام الحضور", "وسام الانضباط", "وسام القيادة", "وسام التميز"];
    let liveData = { students: {}, logs: [] };
    let currentUser = null;

    function handleLogin() {
        const pin = document.getElementById('access-pin').value;
        if(USERS[pin]) {
            currentUser = USERS[pin];
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('user-display').innerText = `المسؤول: ${currentUser.name}`;
            if(currentUser.role === 'admin') document.getElementById('admin-controls').style.display = 'flex';
            
            awtadRef.on('value', snap => {
                liveData = snap.val() || { students: {}, logs: [] };
                render();
            });
        } else alert("الرمز خطأ");
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        render(tab);
    }

    function render(tab = 'list') {
        const area = document.getElementById('content-area');
        area.innerHTML = "";

        if(tab === 'list') {
            PLATOONS.forEach(p => {
                if(currentUser.role !== 'admin' && currentUser.pid !== p.id) return;
                let html = `<div class="card"><h3 style="color:var(--gold); border-bottom:1px solid #334155; padding-bottom:5px;">${p.name}</h3>`;
                p.members.forEach(m => {
                    const s = liveData.students[m] || {pts:0, badges:[], phone:"غير مسجل", s_id:"-"};
                    html += `<div class="student-item">
                        <div>
                            <b style="font-size:16px;">${m}</b><br>
                            <button class="btn btn-gold" style="padding:2px 8px; font-size:10px; margin-top:5px;" onclick="showInfo('${m}')">عرض المعلومات</button>
                            <div style="margin-top:5px">${(s.badges||[]).map(b => `<span class="badge-tag">${b}</span>`).join('')}</div>
                        </div>
                        <div class="pts-display">${s.pts}</div>
                        <div style="display:flex; flex-direction:column; gap:5px;">
                            <button class="btn btn-primary btn-sm" onclick="addPoints('${m}')">إضافة/خصم</button>
                            <button class="btn btn-gold btn-sm" onclick="editData('${m}')">تعديل/أوسمة</button>
                            <button class="btn btn-danger btn-sm" style="padding:5px;" onclick="resetOne('${m}')">تصفير</button>
                        </div>
                    </div>`;
                });
                area.innerHTML += html + `</div>`;
            });
        } else if(tab === 'ranking') {
            let list = [];
            for(let n in liveData.students) list.push({name:n, pts:liveData.students[n].pts});
            list.sort((a,b) => b.pts - a.pts);
            let html = `<div class="card"><h3>🏆 الترتيب العام</h3>`;
            list.slice(0, 20).forEach((st, i) => {
                html += `<div class="student-item"><span>${i+1}. ${st.name}</span><b>${st.pts} نقطة</b></div>`;
            });
            area.innerHTML = html + `</div>`;
        } else if(tab === 'logs') {
            let html = `<div class="card"><h3>📄 سجل العمليات</h3>`;
            (liveData.logs || []).slice(0, 40).forEach(l => {
                html += `<div style="padding:8px; border-bottom:1px solid #334155; font-size:12px;">
                    <b>${l.admin}</b> عدل <b>${l.target}</b> (${l.val}) <br> <small style="color:var(--gold)">السبب: ${l.reason} | ${l.time}</small>
                </div>`;
            });
            area.innerHTML += html + `</div>`;
        }
    }

    function addPoints(name) {
        const pts = parseInt(prompt(`أدخل النقاط (مثلاً 10 أو -5) لـ ${name}:`));
        if(isNaN(pts)) return;
        const reason = prompt("ما هو سبب تعديل النقاط؟ (إجباري)");
        if(!reason) { alert("يجب ذكر السبب!"); return; }

        if(!liveData.students[name]) liveData.students[name] = {pts:0, badges:[], phone:"-", s_id:"-"};
        liveData.students[name].pts += pts;
        
        if(!liveData.logs) liveData.logs = [];
        liveData.logs.unshift({admin: currentUser.name, target: name, val: pts > 0 ? `+${pts}` : pts, reason: reason, time: new Date().toLocaleString('ar-SA')});
        awtadRef.set(liveData);
    }

    function showInfo(name) {
        const s = liveData.students[name] || {pts:0, badges:[], phone:"غير مسجل", s_id:"-"};
        document.getElementById('modalName').innerText = name;
        document.getElementById('modalBody').innerHTML = `
            <b>رقم الطالب:</b> ${s.s_id} <br><br>
            <b>رقم الجوال:</b> ${s.phone} <br><br>
            <b>إجمالي النقاط:</b> ${s.pts} <br><br>
            <b>الأوسمة:</b> ${s.badges?.join(', ') || 'لا يوجد'}
        `;
        document.getElementById('infoModal').style.display = 'block';
    }

    function editData(name) {
        if(!liveData.students[name]) liveData.students[name] = {pts:0, badges:[], phone:"-", s_id:"-"};
        const s = liveData.students[name];
        const newID = prompt("رقم الطالب الجديد:", s.s_id);
        const newPH = prompt("رقم الجوال الجديد:", s.phone);
        const b = prompt("أدخل اسم الوسام (أو اتركه فارغاً):\n" + BADGE_OPTIONS.join(" - "));
        
        if(newID) s.s_id = newID;
        if(newPH) s.phone = newPH;
        if(b && BADGE_OPTIONS.includes(b)) {
            if(!s.badges) s.badges = [];
            s.badges.push(b);
        }
        awtadRef.set(liveData);
    }

    function resetOne(name) {
        if(confirm(`هل أنت متأكد من تصفير بيانات ${name} بالكامل؟`)) {
            if(liveData.students[name]) {
                liveData.students[name].pts = 0;
                liveData.students[name].badges = [];
                awtadRef.set(liveData);
            }
        }
    }

    function fullReset() {
        if(confirm("تنبيه: سيتم مسح نقاط جميع الطلاب وسجل العمليات! هل أنت متأكد؟")) {
            awtadRef.set({ students: {}, logs: [{admin: currentUser.name, target: "النظام", val: "تصفير", reason: "تصفير عام", time: new Date().toLocaleString()}] });
        }
    }

    function closeModal() { document.getElementById('infoModal').style.display = 'none'; }
    function exportWhatsApp() {
        let t = `*🛡️ تقرير أوتاد الكشفي 🛡️*\n`;
        PLATOONS.forEach(p => {
            t += `\n*${p.name}*\n`;
            p.members.forEach(m => t += `- ${m}: ${liveData.students[m]?.pts || 0} ن\n`);
        });
        window.open(`https://wa.me/?text=${encodeURIComponent(t)}`);
    }
</script>
</body>
</html>
