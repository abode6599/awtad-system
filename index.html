<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWTAD | المنصة السيادية للكشافة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg-primary: #0B1220; --bg-secondary: #111C33; --border: #1E2A44;
            --gold: #D4A017; --text-main: #E5E7EB; --text-sub: #94A3B8;
            --danger: #DC2626; --success: #16A34A; --accent: #D4A017;
        }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; transition: all 0.2s ease; }
        body { background: var(--bg-primary); color: var(--text-main); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar Style */
        #sidebar { width: 260px; background: var(--bg-secondary); border-left: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; z-index: 1000; }
        .logo { font-size: 24px; font-weight: 900; color: var(--gold); text-align: center; margin-bottom: 40px; letter-spacing: 2px; }
        .nav-item { padding: 12px 15px; border-radius: 10px; cursor: pointer; color: var(--text-sub); margin-bottom: 8px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .nav-item:hover, .nav-item.active { background: var(--border); color: var(--gold); }

        /* Main Content area */
        #wrapper { flex: 1; display: flex; flex-direction: column; overflow-y: auto; background: radial-gradient(circle at top right, #16203a 0%, #0B1220 100%); }
        header { padding: 20px 40px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(17, 28, 51, 0.8); backdrop-filter: blur(10px); sticky; top: 0; }

        /* Cards and Grids */
        .content-padding { padding: 30px 40px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 15px; padding: 20px; position: relative; overflow: hidden; }
        .card:hover { transform: translateY(-5px); border-color: var(--gold); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .card::before { content: ""; position: absolute; top: 0; right: 0; width: 4px; height: 100%; background: var(--gold); opacity: 0; transition: 0.3s; }
        .card:hover::before { opacity: 1; }

        /* Leaderboard Specific */
        .rank-badge { background: var(--gold); color: #000; padding: 2px 10px; border-radius: 50px; font-size: 12px; font-weight: 900; }
        .pts-huge { font-size: 28px; font-weight: 900; color: var(--gold); }

        /* Auth Screen */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg-primary); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: var(--bg-secondary); padding: 40px; border-radius: 20px; border: 1px solid var(--gold); text-align: center; width: 350px; }
        input { width: 100%; background: var(--bg-primary); border: 1px solid var(--border); color: white; padding: 15px; border-radius: 10px; margin: 20px 0; text-align: center; font-size: 1.5rem; letter-spacing: 5px; }
        input:focus { border-color: var(--gold); outline: none; }

        /* Buttons */
        .btn { padding: 10px 25px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; background: var(--gold); color: #000; }
        .btn-danger { background: var(--danger); color: white; }

        /* Logs Timeline */
        .log-item { border-right: 2px solid var(--border); padding: 0 15px 15px 0; position: relative; margin-right: 10px; }
        .log-item::after { content: ""; position: absolute; top: 0; right: -6px; width: 10px; height: 10px; background: var(--gold); border-radius: 50%; }

        @media (max-width: 768px) { #sidebar { display: none; } .content-padding { padding: 20px; } }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-box">
        <div class="logo">AWTAD</div>
        <p style="color: var(--text-sub)">نظام الإدارة السيادي</p>
        <input type="password" id="pin-input" maxlength="4" placeholder="••••">
        <button class="btn" style="width: 100%" onclick="Logic.login()">دخول الهيئة</button>
        <p id="auth-err" style="color: var(--danger); margin-top: 15px; font-size: 13px;"></p>
    </div>
</div>

<aside id="sidebar">
    <div class="logo">أوتاد</div>
    <div id="nav-list">
        <div class="nav-item active" onclick="Logic.switchTab('dashboard')">🏠 لوحة التحكم</div>
        <div class="nav-item" onclick="Logic.switchTab('members')">👥 الأعضاء والطلايع</div>
        <div class="nav-item" onclick="Logic.switchTab('ranks')">🏆 سلم الترتيب</div>
        <div id="admin-only-nav" class="hidden">
            <div class="nav-item" onclick="Logic.switchTab('logs')">📜 سجل العمليات</div>
            <div class="nav-item" style="color: var(--danger)" onclick="Logic.systemReset()">⚠️ تصفير النظام</div>
        </div>
    </div>
    <div style="margin-top: auto; padding: 10px; border-top: 1px solid var(--border);">
        <div id="user-info-name" style="font-weight: 900; color: var(--gold);"></div>
        <div id="user-info-role" style="font-size: 11px; color: var(--text-sub);"></div>
    </div>
</aside>

<main id="wrapper">
    <header>
        <div id="page-title" style="font-weight: 900; font-size: 20px;">لوحة التحكم</div>
        <div id="header-actions"></div>
    </header>

    <div id="main-content" class="content-padding">
        </div>
</main>

<script>
/** 🧠 النواة المركزية لنظام أوتاد **/
const Logic = (() => {
    const firebaseConfig = {
        apiKey: "AIzaSyA6P2gbckRDtKUqb8mVZcibXR4soZezFxE",
        databaseURL: "https://awtad-system-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("awtad_sovereign_v5");

    let state = { user: null, users: {}, logs: [], activeTab: 'dashboard' };
    const SUPER_PINS = { "7777": "عبدالله العرفه", "9999": "سلمان الصويلح", "8888": "معاذ الشنقيطي" };

    return {
        init: () => {
            db.on("value", snap => {
                const data = snap.val() || {};
                state.users = data.users || {};
                state.logs = Object.values(data.logs || {}).reverse();
                if (state.user) Logic.render();
            });
        },

        login: () => {
            const pin = document.getElementById("pin-input").value;
            const err = document.getElementById("auth-err");
            
            if (SUPER_PINS[pin]) {
                state.user = { name: SUPER_PINS[pin], role: 'SUPER', id: 'ADMIN' };
            } else {
                const found = Object.entries(state.users).find(([id, u]) => u.pin === pin);
                if (found) state.user = { ...found[1], id: found[0] };
            }

            if (state.user) {
                document.getElementById("auth-overlay").classList.add("hidden");
                document.getElementById("user-info-name").innerText = state.user.name;
                document.getElementById("user-info-role").innerText = state.user.role === 'SUPER' ? "القيادة العليا" : state.user.team;
                if(state.user.role === 'SUPER') document.getElementById("admin-only-nav").classList.remove("hidden");
                Logic.log("تسجيل دخول", state.user.name);
                Logic.render();
            } else {
                err.innerText = "فشل التحقق: الرمز غير مصرح به";
            }
        },

        switchTab: (tab) => {
            state.activeTab = tab;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            Logic.render();
        },

        render: () => {
            const container = document.getElementById("main-content");
            const title = document.getElementById("page-title");
            container.innerHTML = "";

            if (state.activeTab === 'dashboard') {
                title.innerText = "لوحة التحكم الاستراتيجية";
                container.innerHTML = `
                    <div class="stats-grid">
                        <div class="card">
                            <div style="color:var(--text-sub)">إجمالي الأعضاء</div>
                            <div class="pts-huge">${Object.keys(state.users).length}</div>
                        </div>
                        <div class="card">
                            <div style="color:var(--text-sub)">متصدر الترتيب</div>
                            <div class="pts-huge" style="font-size:18px">${Logic.getTopMember()?.name || 'لا يوجد'}</div>
                        </div>
                    </div>
                    <div class="box" style="margin-top:20px">
                        ${state.user.role === 'SUPER' && Object.keys(state.users).length === 0 ? 
                        `<button class="btn" onclick="Logic.seed()">🔄 تفعيل هيكل الطلايع (36 عضو)</button>` : ''}
                    </div>
                `;
            }

            if (state.activeTab === 'members') {
                title.innerText = "إدارة الطلايع والأعضاء";
                let html = `<div class="stats-grid">`;
                Object.entries(state.users).forEach(([id, u]) => {
                    html += `
                        <div class="card">
                            <div class="flex-between">
                                <span class="rank-badge">${u.team}</span>
                                <span class="pts-huge">${u.pts}</span>
                            </div>
                            <h3 style="margin:10px 0 5px 0">${u.name}</h3>
                            <div style="font-size:12px; color:var(--text-sub)">PIN: ${state.user.role === 'SUPER' ? u.pin : '****'}</div>
                            ${state.user.role === 'SUPER' || (state.user.role === 'LEADER' && state.user.team === u.team) ? 
                            `<button class="btn" style="width:100%; margin-top:15px" onclick="Logic.addPts('${id}')">إدارة النقاط</button>` : ''}
                        </div>`;
                });
                container.innerHTML = html + `</div>`;
            }

            if (state.activeTab === 'logs') {
                title.innerText = "سجل العمليات السيادي";
                let html = `<div class="card">`;
                state.logs.slice(0, 30).forEach(l => {
                    html += `
                        <div class="log-item">
                            <span style="color:var(--gold)">[${l.time}]</span> <b>${l.actor}</b> ${l.action}
                        </div>`;
                });
                container.innerHTML = html + `</div>`;
            }

            if (state.activeTab === 'ranks') {
                title.innerText = "سلم الترتيب العام";
                const sorted = Object.values(state.users).sort((a,b) => b.pts - a.pts);
                let html = `<div class="card" style="padding:0">`;
                sorted.forEach((u, i) => {
                    html += `
                        <div class="list-item" style="padding:15px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between">
                            <span><b>#${i+1}</b> ${u.name} (${u.team})</span>
                            <b style="color:var(--gold)">${u.pts} نقطة</b>
                        </div>`;
                });
                container.innerHTML = html + `</div>`;
            }
        },

        addPts: (id) => {
            const val = parseInt(prompt("أدخل عدد النقاط (إضافة/خصم):"));
            if (isNaN(val)) return;
            const u = state.users[id];
            db.child("users").child(id).update({ pts: (u.pts || 0) + val });
            Logic.log(`عدل نقاط ${u.name} بمقدار (${val})`, state.user.name);
        },

        log: (action, actor) => {
            db.child("logs").push({ action, actor, time: new Date().toLocaleTimeString('ar-SA') });
        },

        getTopMember: () => Object.values(state.users).sort((a,b) => b.pts - a.pts)[0],

        seed: () => {
            const data = {
                "طليعة 1": ["الوليد الحازمي (ق)", "صالح حبتور", "حسن الشهري", "عزام خبراني", "يحي شراحيلي", "فهد المهيني", "زياد العجلاني", "يزيد خال", "غازي العجمي", "ريان جعام"],
                "طليعة 2": ["حاتم خريزي (ق)", "ياسر ابو حيه", "محمد عسيري", "علي الغامدي", "فواز الشهراني", "اصيل العتيبي", "صالح الخثعمي", "غازي العنزي", "ابراهيم التليدي", "رياض الزهراني"],
                "طليعة 3": ["راكان شراحيلي (ق)", "بسام قرادي", "بدر كعبي", "حسام الشهراني", "عبدالله قشاش", "عيسى الرشيدي", "عبدالعزيز القحطاني", "راشد الراشدي", "زايد القحطاني", "علي الشهراني"],
                "طليعة 4": ["وضاح الصويلح (ق)", "مشعل القحطاني", "ناصر المطيري", "مبارك خميس", "عبدالله القرني", "راكان حوباني", "رائد حوباني", "فارس العمري", "محمد فقيه", "مشاري القحطاني"]
            };
            let users = {};
            Object.entries(data).forEach(([team, members]) => {
                members.forEach(m => {
                    const isL = m.includes("(ق)");
                    const id = "U_" + Math.random().toString(36).substr(2, 7);
                    users[id] = {
                        name: m.replace("(ق)", "").trim(),
                        team: team,
                        role: isL ? 'LEADER' : 'MEMBER',
                        pts: 0,
                        pin: Math.floor(1000 + Math.random()*9000).toString()
                    };
                });
            });
            db.child("users").set(users);
        },

        systemReset: () => {
            if(confirm("سيتم تصفير كافة البيانات.. هل أنت متأكد؟")) db.set({users:{}, logs:{}});
        }
    };
})();

Logic.init();
</script>
</body>
</html>
