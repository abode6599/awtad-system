<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أوتاد V2.0 | النظام الرسمي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #050810; --card: #111827; --accent: #3b82f6; --gold: #fbbf24; --text: #f9fafb; --border: #1f2937; --danger: #ef4444; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; }
        nav { background: var(--card); border-top: 1px solid var(--border); display: flex; justify-content: space-around; position: fixed; bottom: 0; width: 100%; padding: 15px; z-index: 1000; }
        .nav-btn { color: #94a3b8; font-size: 13px; font-weight: 700; cursor: pointer; text-align: center; }
        .nav-btn.active { color: var(--accent); }
        .container { padding: 20px; max-width: 600px; margin: auto; }
        .m-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 12px; }
        .badge { background: rgba(59, 130, 246, 0.1); color: var(--accent); padding: 4px 10px; border-radius: 8px; font-size: 11px; margin: 3px; display: inline-block; }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: #0c111d; color: white; margin-bottom: 10px; }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; transition: 0.2s; }
        .btn-p { background: var(--accent); color: white; }
        .btn-d { background: var(--danger); color: white; }
        .btn-g { background: var(--gold); color: black; }
        .hidden { display: none !important; }
        .dash-top { text-align: center; padding: 40px 20px; background: linear-gradient(to bottom, #111827, #050810); }
    </style>
</head>
<body>

<div id="login-screen" style="position:fixed; inset:0; background:var(--bg); z-index:9999; display:flex; align-items:center; justify-content:center;">
    <div style="width: 320px; text-align: center;">
        <h1 style="color:var(--accent); font-weight:900;">AWTAD V2.0</h1>
        <p style="color:#64748b; font-size:14px;">نظام قيادة فرقة أوتاد</p>
        <input type="password" id="pin-in" placeholder="أدخل رمزك الخاص" style="text-align:center; letter-spacing:8px; font-size:20px;">
        <button class="btn btn-p" onclick="Sys.login()">دخول</button>
        <button onclick="Sys.hardReset()" style="margin-top:20px; background:none; border:none; color:#1f2937; font-size:10px;">RESET SYSTEM</button>
    </div>
</div>

<div id="main-app" class="hidden">
    <div class="dash-top" id="user-header"></div>
    <div class="container" id="view-area"></div>
    <nav>
        <div class="nav-btn active" onclick="Sys.go('main', this)">🏠 الأساسية</div>
        <div class="nav-btn" onclick="Sys.go('field', this)">🛡️ الميدان</div>
        <div class="nav-btn" onclick="Sys.go('vote', this)">🗳️ التصويت</div>
        <div id="adm-nav" class="nav-btn hidden" onclick="Sys.go('admin', this)">⚙️ التحكم</div>
    </nav>
</div>

<div id="modal" class="hidden" style="position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:5000; display:flex; align-items:center; justify-content:center; padding:20px;">
    <div id="modal-content" class="m-card" style="width:100%; max-width:450px;"></div>
</div>

<script>
const Sys = (() => {
    const config = { apiKey: "AIzaSyA6P2gbckRDtKUqb8mVZcibXR4soZezFxE", databaseURL: "https://awtad-system-default-rtdb.firebaseio.com" };
    firebase.initializeApp(config);
    const db = firebase.database().ref("awtad_pro_v2");

    let state = { user: null, members: {}, tab: 'main', votes: {}, logs: [], requests: {} };
    const MASTER_KEY = "7777"; // رمز التهيئة الخاص بك
    const ALL_BADGES = ["المسعف", "المؤذن", "المصور", "التقني", "صديق البيئة", "السباح", "القارئ", "الرسام", "المتحدث", "المنقذ"];
    const NAMES = ["عبدالله العرفه", "سلمان الصويلح", "معاذ الشنقيطي", "عزام خبراني", "الوليد الحازمي", "وضاح الصويلح", "راكان شراحيلي", "حاتم خريزي"];

    return {
        hardReset: async () => {
            const k = prompt("أدخل رمز المالك للتهيئة:");
            if(k !== MASTER_KEY) return alert("غير مصرح لك!");
            let data = {};
            for(let i=0; i<40; i++) {
                const id = "M" + (1000 + i);
                data[id] = {
                    name: NAMES[i] || `كشاف ${i+1}`,
                    team: `طليعة ${(i%4)+1}`,
                    pts: 0,
                    role: i < 3 ? 'ROOT' : 'MEMBER',
                    pin: (1000 + i).toString(),
                    badges: ["عضو جديد"]
                };
            }
            await db.set({ members: data, vote_title: "هل البرنامج الحالي ممتاز؟", logs: {init: "نظام مشغل"} });
            alert("تمت التهيئة بنجاح! الرموز 1000-1039");
        },

        login: async () => {
            const p = document.getElementById("pin-in").value;
            const s = await db.child("members").once("value");
            const m = s.val() || {};
            const found = Object.entries(m).find(([id, u]) => u.pin === p);

            if(found) {
                state.user = { ...found[1], id: found[0] };
                document.getElementById("login-screen").classList.add("hidden");
                document.getElementById("main-app").classList.remove("hidden");
                if(state.user.role === 'ROOT') document.getElementById("adm-nav").classList.remove("hidden");
                Sys.sync();
            } else alert("الرمز غير صحيح");
        },

        sync: () => {
            db.on("value", s => {
                const d = s.val() || {};
                state.members = d.members || {};
                state.votes = d.votes || {};
                state.logs = Object.values(d.logs || {}).reverse();
                state.requests = d.requests || {};
                state.voteTitle = d.vote_title;
                Sys.render();
            });
        },

        go: (t, el) => {
            state.tab = t;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            Sys.render();
        },

        render: () => {
            const root = document.getElementById("view-area");
            const head = document.getElementById("user-header");
            const u = state.members[state.user.id];
            
            head.innerHTML = `<h1>${u.name}</h1><p style="color:var(--gold)">النقاط: ${u.pts} | الطليعة: ${u.team}</p>`;
            root.innerHTML = "";

            if(state.tab === 'main') {
                root.innerHTML = `<h3>أوسمتي</h3><div class="m-card">${u.badges.map(b=>`<span class="badge">${b}</span>`).join('')}</div>
                <h3>سجل الطلبات</h3>`;
                Object.entries(state.requests).forEach(([rid, req]) => {
                    if(state.user.role === 'ROOT') {
                        root.innerHTML += `<div class="m-card" style="font-size:13px"><b>${req.name}</b> يطلب: ${req.txt}
                        <button class="btn btn-p" onclick="Sys.resolveReq('${rid}')" style="padding:5px; margin-top:10px;">إتمام</button></div>`;
                    }
                });
                root.innerHTML += `<button class="btn btn-g" onclick="Sys.ask()">ارسال طلب للمشرفين</button>`;
            }

            if(state.tab === 'field') {
                const sorted = Object.entries(state.members).sort((a,b) => b[1].pts - a[1].pts);
                sorted.forEach(([id, m]) => {
                    root.innerHTML += `<div class="m-card" onclick="Sys.open('${id}')" style="display:flex; justify-content:space-between">
                        <span>${m.name} <small style="color:#4b5563">(${m.team})</small></span>
                        <b style="color:var(--gold)">${m.pts}</b>
                    </div>`;
                });
            }

            if(state.tab === 'vote') {
                root.innerHTML = `<div class="m-card" style="text-align:center"><h3>${state.voteTitle}</h3>
                <button class="btn btn-p" onclick="Sys.vote('نعم')">نعم</button><br><br>
                <button class="btn btn-d" onclick="Sys.vote('لا')">لا</button></div>`;
            }

            if(state.tab === 'admin' && state.user.role === 'ROOT') {
                root.innerHTML = `<h3>إدارة النظام</h3><input id="new-vt" placeholder="موضوع تصويت جديد">
                <button class="btn btn-p" onclick="Sys.setVT()">تحديث التصويت</button>
                <div class="m-card" style="margin-top:20px">نعم: ${Object.values(state.votes).filter(v=>v==='نعم').length} | لا: ${Object.values(state.votes).filter(v=>v==='لا').length}</div>`;
            }
        },

        open: (id) => {
            if(state.user.role !== 'ROOT') return;
            const m = state.members[id];
            document.getElementById("modal-content").innerHTML = `
                <h2>${m.name}</h2>
                <input type="number" id="pts-amt" placeholder="المقدار">
                <div style="display:flex; gap:10px">
                    <button class="btn btn-p" onclick="Sys.mod('${id}', 1)">إضافة</button>
                    <button class="btn btn-d" onclick="Sys.mod('${id}', -1)">خصم</button>
                </div>
                <select id="bg-sel">${ALL_BADGES.map(b=>`<option>${b}</option>`).join('')}</select>
                <button class="btn btn-g" onclick="Sys.give('${id}')">منح الوسام</button>
                <button class="btn" style="background:#374151; margin-top:10px" onclick="Sys.close()">إغلاق</button>
            `;
            document.getElementById("modal").classList.remove("hidden");
        },

        mod: (id, d) => {
            const a = parseInt(document.getElementById("pts-amt").value);
            if(!a) return;
            const newPts = (state.members[id].pts || 0) + (a * d);
            db.child("members").child(id).update({ pts: newPts });
            db.child("logs").push({ txt: `${state.user.name} قام بتعديل نقاط ${state.members[id].name}` });
            Sys.close();
        },

        give: (id) => {
            const b = document.getElementById("bg-sel").value;
            let current = state.members[id].badges || [];
            if(!current.includes(b)) {
                current.push(b);
                db.child("members").child(id).update({ badges: current });
                alert("تم منح الوسام");
            }
            Sys.close();
        },

        ask: () => {
            const t = prompt("ماذا تريد أن تطلب؟");
            if(t) db.child("requests").push({ name: state.user.name, txt: t });
        },
        resolveReq: (rid) => db.child("requests").child(rid).remove(),
        vote: (v) => db.child("votes").child(state.user.id).set(v),
        setVT: () => { db.child("vote_title").set(document.getElementById("new-vt").value); db.child("votes").remove(); },
        close: () => document.getElementById("modal").classList.add("hidden")
    };
})();
</script>
</body>
</html>
