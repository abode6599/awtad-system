<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام أوتاد الإداري | التقني</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --p-dark: #0f172a; --p-border: #1e293b; --p-accent: #3b82f6;
            --p-gold: #fbbf24; --p-success: #22c55e; --p-danger: #ef4444;
            --p-text: #f8fafc; --p-sub: #94a3b8;
        }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--p-dark); color: var(--p-text); margin: 0; padding: 0; overflow-x: hidden; }

        /* ✅ حل مشكلة الانهيار: نظام الحاويات المرن */
        .app-container { display: flex; height: 100vh; flex-direction: row; }
        @media (max-width: 900px) { .app-container { flex-direction: column; } }

        /* Sidebar - القائمة الجانبية (للشاشات الكبيرة) */
        aside { width: 280px; background: #0c111d; border-left: 1px solid var(--p-border); display: flex; flex-direction: column; padding: 20px; transition: 0.3s; }
        @media (max-width: 900px) { 
            aside { width: 100%; height: auto; border-left: none; border-bottom: 1px solid var(--p-border); padding: 10px; flex-direction: row; justify-content: space-around; position: fixed; bottom: 0; z-index: 1000; background: rgba(12, 17, 29, 0.95); backdrop-filter: blur(10px); }
            .sys-name, .user-brief { display: none; }
        }

        .nav-link { padding: 12px 15px; border-radius: 10px; cursor: pointer; color: var(--p-sub); font-weight: 600; font-size: 14px; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; }
        .nav-link:hover, .nav-link.active { background: var(--p-accent); color: white; }

        /* Main View - منطقة العرض الأساسية */
        main { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        header { padding: 20px 30px; border-bottom: 1px solid var(--p-border); background: rgba(15, 23, 42, 0.8); display: flex; justify-content: space-between; align-items: center; sticky; top: 0; z-index: 900; }

        /* Grid System */
        .content-padding { padding: 20px; max-width: 1200px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .card { background: #1e293b; border-radius: 15px; padding: 20px; border: 1px solid var(--p-border); transition: 0.2s; }
        .card:hover { border-color: var(--p-accent); transform: translateY(-3px); }

        /* Auth Screen */
        #auth-gate { position: fixed; inset: 0; background: var(--p-dark); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { width: 100%; max-width: 400px; background: #1e293b; padding: 30px; border-radius: 20px; text-align: center; border: 1px solid var(--p-border); }
        input { width: 100%; background: #0f172a; border: 1px solid var(--p-border); color: white; padding: 15px; border-radius: 10px; margin: 15px 0; font-size: 20px; text-align: center; letter-spacing: 5px; }
        .btn { border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: 700; width: 100%; transition: 0.2s; }
        .btn-p { background: var(--p-accent); color: white; }
        .btn-s { background: #334155; color: white; margin-top: 10px; font-size: 12px; }

        .hidden { display: none !important; }
        .badge { font-size: 10px; padding: 2px 8px; border-radius: 4px; background: var(--p-accent); font-weight: 800; }
    </style>
</head>
<body>

<div id="auth-gate">
    <div class="auth-box">
        <h2 style="color: var(--p-accent); margin:0;">نظام أوتاد</h2>
        <p style="color: var(--p-sub); font-size: 13px;">المصادقة المؤسسية المطلوبة</p>
        <input type="password" id="pin-code" maxlength="4" placeholder="••••">
        <button class="btn btn-p" onclick="App.validate()">دخول النظام</button>
        <p id="auth-err" style="color: var(--p-danger); margin-top: 10px; font-size: 12px;"></p>
    </div>
</div>

<div class="app-container">
    <aside id="main-nav">
        <div class="sys-name" style="font-weight: 900; color: var(--p-accent); font-size: 22px; margin-bottom: 30px; text-align: center;">AWTAD SYS</div>
        <div class="nav-link active" onclick="App.route('home', this)">📊 المعلومات</div>
        <div class="nav-link" onclick="App.route('members', this)">👥 الأعضاء</div>
        <div class="nav-link" onclick="App.route('ranking', this)">🏆 الترتيب</div>
        <div id="admin-links" class="hidden">
            <div class="nav-link" onclick="App.route('audit', this)">📜 السجلات</div>
            <div class="nav-link" style="color: var(--p-danger)" onclick="App.clearData()">⚠️ تهيئة</div>
        </div>
        <div class="user-brief" style="margin-top: auto; padding-top: 20px; border-top: 1px solid var(--p-border);">
            <div id="u-name" style="font-weight: 700; font-size: 14px;"></div>
            <div id="u-role" style="font-size: 11px; color: var(--p-sub);"></div>
        </div>
    </aside>

    <main>
        <header>
            <div id="view-title" style="font-weight: 700;">لوحة المعلومات</div>
            <button class="btn btn-s" style="width: auto;" onclick="location.reload()">خروج</button>
        </header>

        <div id="render-target" class="content-padding">
            </div>
    </main>
</div>

<script>
/**
 * Core Logic - الإصدار السابع المؤسسي
 * معالجة الأخطاء ومنع الانهيار
 */
const App = (() => {
    const firebaseConfig = {
        apiKey: "AIzaSyA6P2gbckRDtKUqb8mVZcibXR4soZezFxE",
        databaseURL: "https://awtad-system-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("awtad_sys_v7");

    let state = { user: null, users: {}, logs: [], tab: 'home' };
    const ADMIN_KEYS = { "7777": "عبدالله العرفه", "9999": "سلمان الصويلح", "8888": "معاذ الشنقيطي" };

    return {
        init: () => {
            db.on("value", snap => {
                const data = snap.val() || {};
                state.users = data.users || {};
                state.logs = Object.values(data.logs || {}).reverse();
                if (state.user) App.render();
            });
        },

        validate: () => {
            const pin = document.getElementById("pin-code").value;
            const err = document.getElementById("auth-err");
            
            if (ADMIN_KEYS[pin]) {
                state.user = { name: ADMIN_KEYS[pin], role: 'ADMIN', team: 'الإدارة العليا' };
            } else {
                const found = Object.entries(state.users).find(([id, u]) => u.pin === pin);
                if (found) state.user = { ...found[1], id: found[0] };
            }

            if (state.user) {
                document.getElementById("auth-gate").classList.add("hidden");
                document.getElementById("u-name").innerText = state.user.name;
                document.getElementById("u-role").innerText = state.user.team;
                if(state.user.role === 'ADMIN') document.getElementById("admin-links").classList.remove("hidden");
                App.log("دخول للنظام", state.user.name);
                App.render();
            } else {
                err.innerText = "الرمز غير صحيح أو غير مفعل";
            }
        },

        route: (t, el) => {
            state.tab = t;
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            if(el) el.classList.add('active');
            App.render();
        },

        render: () => {
            const target = document.getElementById("render-target");
            const title = document.getElementById("view-title");
            target.innerHTML = "";

            if (state.tab === 'home') {
                title.innerText = "الملخص العام";
                target.innerHTML = `
                    <div class="grid">
                        <div class="card">
                            <div style="color:var(--p-sub); font-size:12px">إجمالي المسجلين</div>
                            <div style="font-size:26px; font-weight:800; color:var(--p-accent)">${Object.keys(state.users).length}</div>
                        </div>
                        <div class="card">
                            <div style="color:var(--p-sub); font-size:12px">حالة النظام</div>
                            <div style="font-size:18px; font-weight:800; color:var(--p-success)">متصل ومؤمن</div>
                        </div>
                    </div>
                    ${state.user.role === 'ADMIN' && Object.keys(state.users).length === 0 ? 
                    `<button class="btn btn-p" style="margin-top:20px" onclick="App.seed()">توليد الهيكل التنظيمي الأول</button>` : ''}
                `;
            }

            if (state.tab === 'members') {
                title.innerText = "إدارة شؤون الطلايع";
                let html = `<div class="grid">`;
                Object.entries(state.users).forEach(([id, u]) => {
                    const isAdmin = state.user.role === 'ADMIN' || (state.user.role === 'LEADER' && state.user.team === u.team);
                    html += `
                        <div class="card">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <span class="badge">${u.team}</span>
                                <b style="color:var(--p-gold)">${u.pts} نقطة</b>
                            </div>
                            <h3 style="margin:15px 0 5px 0; font-size:16px">${u.name}</h3>
                            <div style="font-size:11px; color:var(--p-sub)">الرتبة: ${u.role === 'LEADER' ? 'قائد طليعة' : 'عضو'}</div>
                            ${state.user.role === 'ADMIN' ? `<div style="font-size:10px; color:var(--p-accent); margin-top:5px">PIN: ${u.pin}</div>` : ''}
                            ${isAdmin ? `<button class="btn btn-s" style="margin-top:15px; background:var(--p-accent)" onclick="App.updatePts('${id}')">تعديل النقاط</button>` : ''}
                        </div>`;
                });
                target.innerHTML = html + `</div>`;
            }

            if (state.tab === 'ranking') {
                title.innerText = "ترتيب الأداء العام";
                const sorted = Object.values(state.users).sort((a,b) => b.pts - a.pts);
                let html = `<div class="card" style="padding:0">`;
                sorted.forEach((u, i) => {
                    html += `<div style="padding:15px; border-bottom:1px solid var(--p-border); display:flex; justify-content:space-between">
                        <span><b style="color:var(--p-accent)">#${i+1}</b> ${u.name}</span>
                        <b>${u.pts}</b>
                    </div>`;
                });
                target.innerHTML = html + `</div>`;
            }

            if (state.tab === 'audit') {
                title.innerText = "سجل تدقيق العمليات";
                let html = `<div class="card" style="padding:0">`;
                state.logs.slice(0, 40).forEach(l => {
                    html += `<div style="padding:10px 15px; border-bottom:1px solid var(--p-border); font-size:13px">
                        <span style="color:var(--p-sub)">[${l.time}]</span> <b>${l.actor}</b>: ${l.action}
                    </div>`;
                });
                target.innerHTML = html + `</div>`;
            }
        },

        updatePts: (id) => {
            const p = parseInt(prompt("أدخل قيمة التعديل (موجب أو سالب):"));
            if (isNaN(p)) return;
            const u = state.users[id];
            db.child("users").child(id).update({ pts: (u.pts || 0) + p });
            App.log(`تعديل رصيد ${u.name} بـ (${p})`, state.user.name);
        },

        log: (action, actor) => {
            db.child("logs").push({ action, actor, time: new Date().toLocaleTimeString('ar-SA') });
        },

        seed: () => {
            const data = {
                "طليعة 1": ["الوليد الحازمي (ق)", "صالح حبتور", "حسن الشهري", "عزام خبراني", "يحي شراحيلي", "فهد المهيني", "زياد العجلاني", "يزيد خال", "غازي العجمي", "ريان جعام"],
                "طليعة 2": ["حاتم خريزي (ق)", "ياسر ابو حيه", "محمد عسيري", "علي الغامدي", "فواز الشهراني", "اصيل العتيبي", "صالح الخثعمي", "غازي العنزي", "ابراهيم التليدي", "رياض الزهراني"],
                "طليعة 3": ["راكان شراحيلي (ق)", "بسام قرادي", "بدر كعبي", "حسام الشهراني", "عبدالله قشاش", "عيسى الرشيدي", "عبدالعزيز القحطاني", "راشد الراشدي", "زايد القحطاني", "علي الشهراني"],
                "طليعة 4": ["وضاح الصويلح (ق)", "مشعل القحطاني", "ناصر المطيري", "مبارك خميس", "عبدالله القرني", "راكان حوباني", "رائد حوباني", "فارس العمري", "محمد فقيه", "مشاري القحطاني"]
            };
            let batch = {};
            Object.entries(data).forEach(([t, m]) => {
                m.forEach(name => {
                    const id = "U_" + Math.random().toString(36).substr(2, 8);
                    batch[id] = {
                        name: name.replace("(ق)", "").trim(),
                        team: t,
                        role: name.includes("(ق)") ? 'LEADER' : 'MEMBER',
                        pts: 0,
                        pin: Math.floor(1000 + Math.random()*9000).toString()
                    };
                });
            });
            db.child("users").set(batch);
        },

        clearData: () => {
            if(confirm("سيتم حذف كافة البيانات المسجلة نهائياً. هل أنت متأكد؟")) db.set({users:{}, logs:{}});
        }
    };
})();

App.init();
</script>
</body>
</html>
