<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام الكشافة المطور</title>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

<style>
body{margin:0;background:#0b1220;color:#e6eefc;font-family:Cairo}
.box{background:#111c33;margin:10px;padding:12px;border-radius:10px}
button,input{padding:8px;border-radius:8px;border:none}
button{cursor:pointer}
.hidden{display:none}
h3{margin:5px 0}
</style>
</head>

<body>

<div id="login" class="box">
<h2>دخول النظام</h2>
<input id="pin" placeholder="PIN">
<button onclick="login()">دخول</button>
<div id="err"></div>
</div>

<div id="app" class="hidden">

<h3 id="me"></h3>

<div id="controls"></div>

<div id="content"></div>

</div>

<script>

// 🔥 Firebase (حط بياناتك)
firebase.initializeApp({
apiKey:"YOUR_KEY",
databaseURL:"YOUR_DB"
});

const db = firebase.database().ref("scout_system_v2");

// 🧠 بيانات آمنة دائمًا
let data = {users:{},logs:[],alerts:[]};
let user = null;

// 👑 القيادة العليا
const SUPER = {
"1111":"عبدالله العرفه",
"2222":"سلمان الصويلح",
"3333":"معاذ الشنقيطي"
};

// 🔢 PIN آمن 4 أرقام بدون تكرار
function genPin(){
let used = new Set(Object.values(data.users||{}).map(u=>u.pin));
let p;
do{
p = Math.floor(1000 + Math.random()*9000).toString();
}while(used.has(p));
return p;
}

// 👥 بناء الطلايع أول مرة فقط
function seed(){

if(Object.keys(data.users||{}).length>0) return;

const groups = {
"طليعة 1 - الوليد الحازمي":["صالح حبتور","حسن الشهري","عزام خبراني","يحي شراحيلي","فهد المهيني","زياد العجلاني","يزيد خال","غازي العجمي","ريان جعام"],
"طليعة 2 - حاتم خريزي":["ياسر ابو حيه","محمد عسيري","علي الغامدي","فواز الشهراني","اصيل العتيبي","صالح الخثعمي","غازي العنزي","ابراهيم التليدي","رياض الزهراني"],
"طليعة 3 - راكان شراحيلي":["بسام قرادي","بدر كعبي","حسام الشهراني","عبدالله قشاش","عيسى الرشيدي","عبدالعزيز القحطاني","راشد الراشدي","زايد القحطاني","علي الشهراني"],
"طليعة 4 - وضاح الصويلح":["مشعل القحطاني","ناصر المطيري","مبارك خميس","عبدالله القرني","راكان حوباني","رائد حوباني","فارس العمري","محمد فقيه","مشاري القحطاني"]
};

Object.entries(groups).forEach(([team,members])=>{
members.forEach(name=>{
let id="U"+Math.random();

data.users[id]={
name,
team,
role:"member",
pts:0,
badges:[],
pin:genPin()
};
});
});

save();
}

// 🔐 تسجيل دخول قوي
function login(){

let pin=document.getElementById("pin").value.trim();

// 👑 قائد
let found=null;
if(SUPER[pin]){
found={name:SUPER[pin],role:"super"};
}

// 👥 مستخدمين
Object.entries(data.users||{}).forEach(([id,u])=>{
if(u.pin===pin){
found={...u,id};
}
});

if(!found){
document.getElementById("err").innerText="PIN غلط";
return;
}

user=found;

log("login",user.name);

document.getElementById("login").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");

render();
}

// ➕ نقاط
function addPts(id){

let v=parseInt(prompt("كم نقطة؟"));
if(!v || v<=0) return;

if(!data.users[id].pts) data.users[id].pts=0;

data.users[id].pts+=v;

// 🏅 أوسمة تلقائية
if(data.users[id].pts>=50 && !data.users[id].badges.includes("التميز")){
data.users[id].badges.push("التميز");
}

if(data.users[id].pts>=100 && !data.users[id].badges.includes("الأسطورة")){
data.users[id].badges.push("الأسطورة");
}

// 🚨 كشف نشاط عالي
if(v>=30){
data.alerts.unshift({
msg:"نشاط عالي على "+data.users[id].name,
time:new Date().toLocaleString("ar-SA")
});
}

save();
}

// 🧾 سجل
function log(action,name){
data.logs.unshift({
action,name,
time:new Date().toLocaleString("ar-SA")
});
}

// 💾 حفظ
function save(){
db.set(data);
}

// 🎨 عرض آمن 100%
function render(){

document.getElementById("me").innerText =
(user.name||"") + " - " + (user.role||"");

// 👥 عرض المستخدمين
let html="";

Object.entries(data.users||{}).forEach(([id,u])=>{
html+=`
<div class="box">
<b>${u.name}</b><br>
${u.team}<br>
نقاط: ${u.pts||0}<br>
PIN: ${user.role==="super"?u.pin:"****"}<br>
${(u.badges||[]).join(", ")}<br>

<button onclick="addPts('${id}')">إضافة نقاط</button>
</div>
`;
});

document.getElementById("content").innerHTML=html;

// 👑 أزرار العليا
if(user.role==="super"){
document.getElementById("controls").innerHTML=`
<button onclick="seed()">إعادة بناء</button>
<button onclick="data.users={};save()">تصفير كامل</button>
`;
}else{
document.getElementById("controls").innerHTML="";
}

}

// 🔄 تشغيل آمن جدًا
db.on("value",snap=>{

let val=snap.val();

if(!val){
data={users:{},logs:[],alerts:[]};
}else{
data=val;
}

try{
seed();
}catch(e){
console.log(e);
}

render();
});

</script>

</body>
</html>
