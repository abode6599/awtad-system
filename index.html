<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام أوتاد - السيادة المطلقة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --primary: #3b82f6; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: var(--text); direction: rtl; }
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .official-header { background: var(--card); padding: 20px; border-radius: 15px; border-bottom: 4px solid var(--primary); text-align: center; margin-bottom: 20px; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #334155; }
        .member-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #334155; }
        input, select { background: #334155; color: white; border: 1px solid #475569; padding: 8px; border-radius: 6px; margin-bottom: 10px; width: 100%; }
        button { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
        .platoon-title { color: var(--primary); border-right: 4px solid var(--primary); padding-right: 10px; margin: 10px 0; }
        .badge-tag { font-size: 10px; background: #2563eb; padding: 2px 5px; border-radius: 4px; margin-left: 3px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const DATA = {
            admins: [
                { name: "سلمان الصويلح", id: "202021", title: "قائد الوحدة" },
                { name: "معاذ الشنقيطي", id: "202030", title: "مساعد القائد" },
                { name: "عبدالله العرفه", id: "333", title: "عريف أول" }
            ],
            violations: ["تأخر", "هندام", "فوضى"],
            excellence: ["انضباط", "مبادرة"],
            badges: ["وسام الخدمة", "وسام المهارة"]
        };

        const PLATOONS = [
            { id: 1, name: "طليعة 1", members: ["صالح حبتور", "عزام خبراني", "الوليد الحازمي"] },
            { id: 4, name: "طليعة 4", members: ["وضاح الصويلح", "مبارك خميس"] }
        ];

        function App() {
            const [isAuth, setIsAuth] = useState(false);
            const [pass, setPass] = useState("");
            const [user, setUser] = useState(null);

            if (!isAuth) {
                return (
                    <div className="container" style={{paddingTop: "100px"}}>
                        <div className="official-header">
                            <h2>نظام أوتاد الكشفي</h2>
                            <p>مدرسة القاسم بن محمد</p>
                        </div>
                        <div className="card">
                            <input type="password" placeholder="أدخل رمز الدخول" value={pass} onChange={e => setPass(e.target.value)} />
                            <button onClick={() => {
                                const found = DATA.admins.find(a => a.id === pass);
                                if(found) { setUser(found); setIsAuth(true); }
                                else { alert("الرمز خطأ"); }
                            }}>دخول</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="container">
                    <div className="official-header">
                        <h3>{user.title}: {user.name}</h3>
                        <p>{new Date().toLocaleDateString('ar-SA')}</p>
                    </div>

                    {PLATOONS.map(p => (
                        <div key={p.id} className="card">
                            <h3 className="platoon-title">{p.name}</h3>
                            {p.members.map(m => (
                                <div key={m} className="member-row">
                                    <span>{m}</span>
                                    <div style={{display: 'flex', gap: '5px'}}>
                                        <select style={{width: '80px', margin: 0}}>
                                            <option>حاضر</option>
                                            <option>غائب</option>
                                        </select>
                                        <button style={{width: '40px'}} onClick={() => alert('تم فتح سجل ' + m)}>🛠️</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    ))}
                    <button onClick={() => setIsAuth(false)} style={{background: '#dc2626'}}>خروج</button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
