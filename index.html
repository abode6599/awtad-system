<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة أوتاد الكشفية | النسخة المتكاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --success: #22c55e; --danger: #ef4444; --bg: #0f172a; --card: #1e293b; --gold: #fbbf24; --text: #f8fafc; }
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: var(--text); direction: rtl; padding: 10px; }
        .container { max-width: 800px; margin: auto; }
        .card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #334155; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .header-main { text-align: center; border-bottom: 4px solid var(--gold); padding-bottom: 10px; margin-bottom: 20px; }
        .leaderboard { display: flex; overflow-x: auto; gap: 10px; padding: 10px 0; margin-bottom: 15px; scrollbar-width: none; }
        .top-scout { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); min-width: 120px; padding: 10px; border-radius: 12px; border: 1px solid var(--gold); text-align: center; }
        .top-scout span { display: block; font-size: 10px; color: var(--gold); }
        .member-row { display: flex; align-items: center; justify-content: space-between; background: #ffffff05; padding: 12px; border-radius: 10px; margin-bottom: 8px; border: 1px solid #334155; }
        .points-badge { background: var(--gold); color: #000; padding: 2px 10px; border-radius: 20px; font-weight: 900; }
        .btn { border: none; color: white; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 13px; }
        .btn-primary { background: var(--primary); }
        .btn-success { background: var(--success); }
        .btn-danger { background: var(--danger); }
        .btn-report { background: #6366f1; width: 100%; margin-top: 5px; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 100; padding: 15px; }
        .modal-content { background: var(--card); width: 100%; max-width: 600px; padding: 25px; border-radius: 20px; max-height: 90vh; overflow-y: auto; }
        .report-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 12px; }
        .report-table th, .report-table td { border: 1px solid #334155; padding: 8px; text-align: center; }
        .report-table th { background: #0f172a; color: var(--gold); }
        @media print { .btn, #login-screen { display: none !important; } .modal { position: relative; display: block; } body { background: white; color: black; } }
    </style>
</head>
<body>

<div id="login-screen" class="container" style="padding-top: 80px;">
    <div class="card" style="text-align:center;">
        <h1 style="color:var(--gold); margin:0;">أوتـاد 🛡️</h1>
        <p>نظام القيادة والرقابة المتكامل</p>
        <input type="password" id="pin-input" placeholder="أدخل رمز الدخول المشفر" style="width:80%; padding:12px; margin:20px 0; border-radius:10px; border:1px solid #475569; background:#1e293b; color:white; text-align:center;">
        <button class="btn btn-primary" style="width:80%;" onclick="login()">دخول القادة</button>
    </div>
</div>

<div id="main-screen" class="container" style="display:none;">
    <div class="header-main">
        <h2 id="user-display" style="margin:0;"></h2>
        <p id="user-role" style="color:var(--gold); font-size:14px; margin:0;"></p>
    </div>

    <h4 style="margin:0 0 10px;">🏆 لوحة الشرف (Top 5)</h4>
    <div id="leaderboard" class="leaderboard"></div>

    <div id="admin-reports" style="display:none; margin-bottom:15px;" class="card">
        <h4 style="margin:0 0 10px; color:var(--primary);">📊 مركز التقارير والرقابة</h4>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <button class="btn btn-report" onclick="showFullReport()">تقرير الوحدة كاملة</button>
            <button class="btn btn-report" onclick="showLogsReport()">سجل العمليات الأخير</button>
        </div>
    </div>

    <div id="platoons-area"></div>
    <button class="btn btn-danger" style="width:100%;" onclick="location.reload()">خروج آمن</button>
</div>

<div id="report-modal" class="modal">
    <div class="modal-content">
        <div id="report-body"></div>
        <button class="btn btn-primary" style="margin-top:20px; width:100%;" onclick="window.print()">طباعة التقرير 🖨️</button>
        <button class="btn btn-danger" style="margin-top:10px; width:100%;" onclick="closeReport()">إغلاق</button>
    </div>
</div>

<div id="scout-modal" class="modal">
    <div class="modal-content">
        <h2 id="scout-name"></h2>
        <p id="scout-badge" style="text-align:center; color:var(--gold); font-weight:bold;"></p>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <input type="text" id="id-num" placeholder="الهوية">
            <input type="text" id="phone-num" placeholder="الجوال">
        </div>
        <textarea id="notes" placeholder="ملاحظات سرية..."></textarea>
        <div style="background:#0f172a; padding:15px; border-radius:12px; text-align:center; border:2px solid var(--gold); margin:10px 0;">
            الرصيد: <span id="scout-points" style="font-size:24px; font-weight:900;">0</span>
        </div>
        <div style="border:1px solid #475569; padding:10px; border-radius:12px;">
            <input type="text" id="log-txt" placeholder="السبب">
            <input type="number" id="log-val" placeholder="النقاط +/-">
            <button class="btn btn-success" style="width:100%" onclick="executeAction()">تنفيذ العملية</button>
        </div>
        <div id="reset-section" style="display:none; margin-top:10px;">
            <input type="text" id="confirm-box" placeholder="اكتب CONFIRM للتصفير">
            <button class="btn btn-danger" style="width:100%" onclick="confirmReset()">تصفير السجل</button>
        </div>
        <button class="btn btn-primary" style="margin-top:15px; width:100%;" onclick="saveScout()">حفظ وإغلاق</button>
    </div>
</div>

<script>
    const PINS = {"8429":"abdullah","5173":"salman","9264":"moath","3058":"p1","6712":"p2","4891":"p3","2537":"p4"};
    const USERS = {
        "abdullah":{name:"عبدالله العرفه",role:"عريف أول الوحدة",isAdmin:true, target:"ALL"},
        "salman":{name:"سلمان الصويلح",role:"مساعد عريف أول",isAdmin:true, target:"ALL"},
        "moath":{name:"معاذ الشنقيطي",role:"مساعد عريف أول",isAdmin:true, target:"ALL"},
        "p1":{name:"الوليد الحازمي",role:"قائد طليعة 1",target:1},
        "p2":{name:"حاتم خريزي",role:"قائد طليعة 2",target:2},
        "p3":{name:"راكان شراحيلي",role:"قائد طليعة 3",target:3},
        "p4":{name:"وضاح الصويلح",role:"قائد طليعة 4",target:4}
    };
    const PLATOONS = [
        {id:1, name:"طليعة 1", members:["صالح حبتور","حسن الشهري","ريان جعام","غازي العجمي","يزيد خال","زياد العجلاني","فهد المهيني","يحي شراحيلي","عزام خبراني"]},
        {id:2, name:"طليعة 2", members:["ياسر ابو حيه","محمد عسيري","رياض الزهراني","ابراهيم التليدي","غازي العنزي","صالح الخثعمي","اصيل العتيبي","فواز الشهراني","علي الغامدي"]},
        {id:3, name:"طليعة 3", members:["بسام قرادي","علي الشهراني","زايد القحطاني","راشد الراشدي","عبدالعزيز القحطاني","عيسى الرشيدي","بدر كعبي","عبدالله قشاش","حسام الشهراني"]},
        {id:4, name:"طليعة 4", members:["مشعل القحطاني","مشاري القحطاني","محمد فقيه","فارس العمري","رائد حوباني","راكان حوباني","عبدالله القرني","ناصر المطيري","مبارك خميس"]}
    ];

    let db = JSON.parse(localStorage.getItem('awtad_pro_db')) || {};
    let globalLogs = JSON.parse(localStorage.getItem('awtad_logs')) || [];
    let currentUser = null, activeScout = null;

    function login() {
        const pin = document.getElementById('pin-input').value;
        if(PINS[pin]) {
            currentUser = USERS[PINS[pin]];
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-screen').style.display = 'block';
            document.getElementById('user-display').innerText = currentUser.name;
            document.getElementById('user-role').innerText = currentUser.role;
            if(currentUser.isAdmin) document.getElementById('admin-reports').style.display = 'block';
            updateLeaderboard();
            renderPlatoons();
        } else { alert("الرمز غير صحيح!"); }
    }

    function updateLeaderboard() {
        const all = [];
        for(let s in db) all.push({name:s, pts:db[s].points});
        all.sort((a,b) => b.pts - a.pts);
        const top5 = all.slice(0,5);
        document.getElementById('leaderboard').innerHTML = top5.map(s => `
            <div class="top-scout"><span>${s.pts} ن</span><b>${s.name}</b></div>
        `).join('');
    }

    function renderPlatoons() {
        const area = document.getElementById('platoons-area');
        area.innerHTML = '';
        PLATOONS.forEach(p => {
            if(!currentUser.isAdmin && currentUser.target !== p.id) return;
            let html = `<div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <h3 style="color:var(--primary); margin:0;">${p.name}</h3>
                    <button class="btn btn-primary" style="padding:4px 10px; font-size:11px;" onclick="showPlatoonReport(${p.id})">تقرير الطليعة</button>
                </div>`;
            p.members.forEach(m => {
                if(!db[m]) db[m] = {status:'غائب', points:0, logs:[]};
                html += `<div class="member-row">
                    <span>${m}</span>
                    <div style="display:flex; gap:8px; align-items:center;">
                        <span class="points-badge">${db[m].points}</span>
                        <select onchange="quickStatus('${m}', this.value)" style="width:50px; font-size:10px; padding:2px;">
                            <option value="غائب" ${db[m].status==='غائب'?'selected':''}>غ</option>
                            <option value="حاضر" ${db[m].status==='حاضر'?'selected':''}>ح</option>
                        </select>
                        <button class="btn btn-primary" style="padding:5px;" onclick="openScout('${m}')">⚙️</button>
                    </div></div>`;
            });
            area.innerHTML += html + `</div>`;
        });
    }

    function quickStatus(m, s) {
        const pts = (s === 'حاضر' ? 10 : -5);
        db[m].status = s;
        db[m].points += pts;
        const entry = {d:new Date().toLocaleString(), t:`حالة: ${s}`, p:pts, by:currentUser.name, scout:m};
        db[m].logs.unshift(entry);
        globalLogs.unshift(entry);
        save(); renderPlatoons(); updateLeaderboard();
    }

    function openScout(m) {
        activeScout = m;
        const s = db[m];
        document.getElementById('scout-name').innerText = m;
        document.getElementById('scout-points').innerText = s.points;
        document.getElementById('id-num').value = s.idnum || '';
        document.getElementById('phone-num').value = s.phone || '';
        document.getElementById('notes').value = s.notes || '';
        document.getElementById('reset-section').style.display = currentUser.isAdmin ? 'block' : 'none';
        document.getElementById('scout-modal').style.display = 'flex';
    }

    function executeAction() {
        const txt = document.getElementById('log-txt').value, val = parseInt(document.getElementById('log-val').value);
        if(!txt || isNaN(val)) return alert("أكمل البيانات");
        db[activeScout].points += val;
        const entry = {d:new Date().toLocaleString(), t:txt, p:val, by:currentUser.name, scout:activeScout};
        db[activeScout].logs.unshift(entry);
        globalLogs.unshift(entry);
        document.getElementById('scout-points').innerText = db[activeScout].points;
        document.getElementById('log-txt').value = ''; document.getElementById('log-val').value = '';
        save();
    }

    function showPlatoonReport(pid) {
        const p = PLATOONS.find(x => x.id === pid);
        let h = `<h2>تقرير ${p.name}</h2><table class="report-table"><tr><th>الكشاف</th><th>النقاط</th><th>الحالة</th><th>ملاحظات</th></tr>`;
        p.members.forEach(m => {
            h += `<tr><td>${m}</td><td>${db[m].points}</td><td>${db[m].status}</td><td>${db[m].notes || '-'}</td></tr>`;
        });
        h += `</table>`;
        openReport(h);
    }

    function showFullReport() {
        let h = `<h2>تقرير وحدة أوتاد الشامل</h2>`;
        PLATOONS.forEach(p => {
            h += `<h4>${p.name}</h4><table class="report-table"><tr><th>الكشاف</th><th>النقاط</th><th>الهوية</th></tr>`;
            p.members.forEach(m => {
                h += `<tr><td>${m}</td><td>${db[m].points}</td><td>${db[m].idnum || '-'}</td></tr>`;
            });
            h += `</table>`;
        });
        openReport(h);
    }

    function showLogsReport() {
        let h = `<h2>سجل العمليات الأخير (بصمة القادة)</h2><table class="report-table"><tr><th>الوقت</th><th>القائد</th><th>الطالب</th><th>الإجراء</th><th>نقط</th></tr>`;
        globalLogs.slice(0,20).forEach(l => {
            h += `<tr><td>${l.d}</td><td>${l.by}</td><td>${l.scout}</td><td>${l.t}</td><td style="color:${l.p>=0?'green':'red'}">${l.p}</td></tr>`;
        });
        h += `</table>`;
        openReport(h);
    }

    function saveScout() {
        db[activeScout].idnum = document.getElementById('id-num').value;
        db[activeScout].phone = document.getElementById('phone-num').value;
        db[activeScout].notes = document.getElementById('notes').value;
        save(); document.getElementById('scout-modal').style.display = 'none'; renderPlatoons(); updateLeaderboard();
    }

    function confirmReset() {
        if(document.getElementById('confirm-box').value === "CONFIRM") {
            db[activeScout] = {status:'غائب', points:0, logs:[]};
            save(); alert("تم التصفير"); location.reload();
        }
    }

    function save() { 
        localStorage.setItem('awtad_pro_db', JSON.stringify(db)); 
        localStorage.setItem('awtad_logs', JSON.stringify(globalLogs));
    }
    function openReport(html) { document.getElementById('report-body').innerHTML = html; document.getElementById('report-modal').style.display = 'flex'; }
    function closeReport() { document.getElementById('report-modal').style.display = 'none'; }
    function closeModal() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
</script>
</body>
</html>
