<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام أوتاد التقني | كشافة أوتاد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --primary: #0f172a; --secondary: #1e293b; --accent: #3b82f6;
            --success: #22c55e; --error: #ef4444; --text-p: #f8fafc; --text-s: #94a3b8;
            --border: #334155;
        }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--primary); color: var(--text-p); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar - القائمة الجانبية */
        #sidebar { width: 280px; background: var(--secondary); border-left: 1px solid var(--border); display: flex; flex-direction: column; padding: 25px 15px; }
        .sys-title { font-size: 20px; font-weight: 800; color: var(--accent); text-align: center; margin-bottom: 30px; border-bottom: 2px solid var(--border); padding-bottom: 15px; }
        .nav-link { padding: 12px 15px; border-radius: 8px; cursor: pointer; color: var(--text-s); margin-bottom: 5px; font-weight: 600; display: flex; align-items: center; gap: 10px; font-size: 14px; }
        .nav-link:hover, .nav-link.active { background: var(--accent); color: white; }

        /* Main Wrapper - منطقة العمل */
        #main { flex: 1; display: flex; flex-direction: column; background: #0c111d; overflow-y: auto; }
        header { padding: 15px 30px; background: var(--secondary); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .content-area { padding: 25px 30px; }

        /* Grid & Cards - النظام الشبكي */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .data-card { background: var(--secondary); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
        .data-card:hover { border-color: var(--accent); }
        .badge { font-size: 11px; padding: 3px 10px; border-radius: 5px; font-weight: 700; text-transform: uppercase; }
        .badge-leader { background: #1e40af; color: white; }
        .badge-member { background: #334155; color: white; }

        /* Forms & Inputs */
        #auth-gate { position: fixed; inset: 0; background: var(--primary); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .auth-form { width: 360px; text-align: center; }
        input { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid var(--border); background: #0f172a; color: white; text-align: center; margin-bottom: 15px; font-size: 18px; }
        .btn { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: 700; font-size: 14px; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: white; width: 100%; }
        .btn-action { background: #334155; color: white; font-size: 12px; }

        /* Tables & Logs */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: right; color: var(--text-s); font-size: 13px; padding: 10px; border-bottom: 1px solid var(--border); }
        td { padding: 12px 10px; font-size: 14px; border-bottom: 1px solid #1e293b; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth-gate">
    <div class="auth-form">
        <div class="sys-title">نظام الإدارة الموحد</div>
        <p style="color: var(--text-s); font-size: 13px;">يرجى إدخال رمز الوصول للمتابعة</p>
        <input type="password" id="auth-pin" maxlength="4" placeholder="••••">
        <button class="btn btn-primary" onclick="Core.validate()">تسجيل الدخول</button>
        <p id="auth-msg" style="color: var(--error); margin-top: 10px; font-size: 12px;"></p>
    </div>
</div>

<aside id="sidebar">
    <div class="sys-title">كشافة أوتاد</div>
    <div id="nav-container">
        <div class="nav-link active" onclick="Core.tab('home')">📊 لوحة المعلومات</div>
        <div class="nav-link" onclick="Core.tab('users')">👥 إدارة المستخدمين</div>
        <div class="nav-link" onclick="Core.tab('ranking')">📈 تقرير الترتيب</div>
        <div id="admin-panel" class="hidden">
            <div class="nav-link" onclick="Core.tab('audit')">📜 سجل العمليات</div>
            <div class="nav-link" style="color: var(--error)" onclick="Core.reset()">🚫 تهيئة النظام</div>
        </div>
    </div>
    <div style="margin-top: auto; padding: 15px; border-top: 1px solid var(--border);">
        <div id="user-name" style="font-weight: 700; color: var(--text-p);"></div>
        <div id="user-role" style="font-size: 11px; color: var(--text-s);"></div>
    </div>
</aside>

<main id="main">
    <header>
        <div id="tab-title" style="font-weight: 700;">لوحة المعلومات</div>
        <button class="btn btn-action" onclick="location.reload()">تسجيل الخروج</button>
    </header>

    <div id="view-port" class="content-area">
        </div>
</main>

<script>
/**
 * Core Engine - نظام أوتاد المؤسسي V6
 * إدارة البيانات والتحقق من الصلاحيات
 */
const Core = (() => {
    const config = {
        apiKey: "AIzaSyA6P2gbckRDtKUqb8mVZcibXR4soZezFxE",
        databaseURL: "https://awtad-system-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(config);
    const db = firebase.database().ref("awtad_sys_v6");

    let state = { me: null, users: {}, logs: [], activeTab: 'home' };
    const ADMINS = { "7777": "عبدالله العرفه", "9999": "سلمان الصويلح", "8888": "معاذ الشنقيطي" };

    return {
        init: () => {
            db.on("value", snap => {
                const data = snap.val() || {};
                state.users = data.users || {};
                state.logs = Object.values(data.logs || {}).reverse();
                if (state.me) Core.render();
            });
        },

        validate: () => {
            const p = document.getElementById("auth-pin").value;
            const msg = document.getElementById("auth-msg");
            
            if (ADMINS[p]) {
                state.me = { name: ADMINS[p], role: 'ADMIN', team: 'الإدارة العامة' };
            } else {
                const u = Object.entries(state.users).find(([id, user]) => user.pin === p);
                if (u) state.me = { ...u[1], id: u[0] };
            }

            if (state.me) {
                document.getElementById("auth-gate").classList.add("hidden");
                document.getElementById("user-name").innerText = state.me.name;
                document.getElementById("user-role").innerText = state.me.team;
                if(state.me.role === 'ADMIN') document.getElementById("admin-panel").classList.remove("hidden");
                Core.log("تم تسجيل الدخول", state.me.name);
                Core.render();
            } else {
                msg.innerText = "فشل المصادقة: الرمز غير صحيح";
            }
        },

        tab: (t) => {
            state.activeTab = t;
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            Core.render();
        },

        render: () => {
            const vp = document.getElementById("view-port");
            const tt = document.getElementById("tab-title");
            vp.innerHTML = "";

            if (state.activeTab === 'home') {
                tt.innerText = "نظرة عامة على النظام";
                vp.innerHTML = `
                    <div class="grid">
                        <div class="data-card">
                            <div style="color:var(--text-s); font-size:12px">إجمالي القوى البشرية</div>
                            <div style="font-size:24px; font-weight:800">${Object.keys(state.users).length} عضو</div>
                        </div>
                        <div class="data-card">
                            <div style="color:var(--text-s); font-size:12px">آخر عملية مسجلة</div>
                            <div style="font-size:14px; margin-top:5px">${state.logs[0]?.action || 'لا يوجد'}</div>
                        </div>
                    </div>
                    ${state.me.role === 'ADMIN' && Object.keys(state.users).length === 0 ? 
                    `<div style="margin-top:30px"><button class="btn btn-primary" onclick="Core.seed()">إنشاء الهيكل التنظيمي الأول</button></div>` : ''}
                `;
            }

            if (state.activeTab === 'users') {
                tt.innerText = "إدارة شؤون الأعضاء";
                let html = `<div class="grid">`;
                Object.entries(state.users).forEach(([id, u]) => {
                    const canEdit = state.me.role === 'ADMIN' || (state.me.role === 'LEADER' && state.me.team === u.team);
                    html += `
                        <div class="data-card">
                            <div style="display:flex; justify-content:space-between">
                                <span class="badge ${u.role === 'LEADER' ? 'badge-leader' : 'badge-member'}">${u.role}</span>
                                <b style="color:var(--accent)">${u.pts} نقطة</b>
                            </div>
                            <h3 style="margin:12px 0 5px 0; font-size:16px">${u.name}</h3>
                            <div style="font-size:12px; color:var(--text-s)">الطليعة: ${u.team}</div>
                            ${state.me.role === 'ADMIN' ? `<div style="font-size:11px; color:var(--accent); margin-top:5px">الرمز: ${u.pin}</div>` : ''}
                            ${canEdit ? `<button class="btn btn-action" style="width:100%; margin-top:15px" onclick="Core.update('${id}')">تعديل الرصيد</button>` : ''}
                        </div>`;
                });
                vp.innerHTML = html + `</div>`;
            }

            if (state.activeTab === 'ranking') {
                tt.innerText = "تقرير ترتيب المستويات";
                const sorted = Object.values(state.users).sort((a,b) => b.pts - a.pts);
                let html = `<div class="data-card"><table><tr><th>الاسم</th><th>الطليعة</th><th>الرصيد</th></tr>`;
                sorted.forEach(u => {
                    html += `<tr><td>${u.name}</td><td>${u.team}</td><td><b>${u.pts}</b></td></tr>`;
                });
                vp.innerHTML = html + `</table></div>`;
            }

            if (state.activeTab === 'audit') {
                tt.innerText = "سجل التدقيق والعمليات";
                let html = `<div class="data-card"><table><tr><th>الوقت</th><th>المسؤول</th><th>الإجراء</th></tr>`;
                state.logs.slice(0, 50).forEach(l => {
                    html += `<tr><td style="color:var(--text-s)">${l.time}</td><td>${l.actor}</td><td>${l.action}</td></tr>`;
                });
                vp.innerHTML = html + `</table></div>`;
            }
        },

        update: (id) => {
            const val = parseInt(prompt("أدخل القيمة المراد إضافتها أو خصمها:"));
            if (isNaN(val)) return;
            const u = state.users[id];
            db.child("users").child(id).update({ pts: (u.pts || 0) + val });
            Core.log(`تعديل رصيد ${u.name} بقيمة (${val})`, state.me.name);
        },

        log: (action, actor) => {
            db.child("logs").push({ action, actor, time: new Date().toLocaleTimeString('ar-SA') });
        },

        seed: () => {
            const data = {
                "طليعة 1": ["الوليد الحازمي (ق)", "صالح حبتور", "حسن الشهري", "عزام خبراني", "يحي شراحيلي", "فهد المهيني", "زياد العجلاني", "يزيد خال", "غازي العجمي", "ريان جعام"],
                "طليعة 2": ["حاتم خريزي (ق)", "ياسر ابو حيه", "محمد عسيري", "علي الغامدي", "فواز الشهراني", "اصيل العتيبي", "صالح الخثعمي", "غازي العنزي", "ابراهيم التليدي", "رياض الزهراني"],
                "طليعة 3": ["راكان شراحيلي (ق)", "بسام قرادي", "بدر كعبي", "حسام الشهراني", "عبدالله قشاش", "عيسى الرشيدي", "عبدالعزيز القحطاني", "راشد الراشدي", "زايد القحطاني", "علي الشهراني"],
                "طليعة 4": ["وضاح الصويلح (ق)", "مشعل القحطاني", "ناصر المطيري", "مبارك خميس", "عبدالله القرني", "راكان حوباني", "رائد حوباني", "فارس العمري", "محمد فقيه", "مشاري القحطاني"]
            };
            let batch = {};
            Object.entries(data).forEach(([t, m]) => {
                m.forEach(name => {
                    const id = "U_" + Math.random().toString(36).substr(2, 8);
                    batch[id] = {
                        name: name.replace("(ق)", "").trim(),
                        team: t,
                        role: name.includes("(ق)") ? 'LEADER' : 'MEMBER',
                        pts: 0,
                        pin: Math.floor(1000 + Math.random()*9000).toString()
                    };
                });
            });
            db.child("users").set(batch);
        },

        reset: () => {
            if(confirm("سيتم مسح كافة البيانات المسجلة، هل أنت متأكد؟")) db.set({users:{}, logs:{}});
        }
    };
})();

Core.init();
</script>
</body>
</html>
