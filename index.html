<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>أوتاد | نظام إدارة الفرقة الكشفية</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
:root {
  --bg:#060d06; --bg2:#0c160c; --card:#101e10; --card2:#152415;
  --border:#1e3a1e; --border2:#2d522d;
  --green:#4ade80; --green2:#22c55e; --green3:#bbf7d0;
  --gold:#fbbf24; --gold2:#f59e0b;
  --red:#f43f5e; --blue:#60a5fa; --purple:#a78bfa;
  --text:#e2f5e2; --text2:#86b886; --text3:#4a7a4a;
}
.light {
  --bg:#f0f7f0; --bg2:#e4f0e4; --card:#ffffff; --card2:#f5faf5;
  --border:#c8e6c8; --border2:#a5d6a5;
  --text:#1a2e1a; --text2:#3a5a3a; --text3:#6a8a6a;
}
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Cairo', sans-serif;
  -webkit-tap-highlight-color: transparent;
}
body {
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(74,222,128,0.07) 0%, transparent 70%),
              radial-gradient(ellipse 40% 40% at 90% 90%, rgba(251,191,36,0.04) 0%, transparent 60%);
}
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

/* LOGIN */
#login-screen {
  position: fixed;
  inset: 0;
  z-index: 10000;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.login-wrap { width: 100%; max-width: 380px; text-align: center; }
.login-logo {
  font-size: 52px;
  font-weight: 900;
  color: var(--green);
  letter-spacing: -2px;
  line-height: 1;
  text-shadow: 0 0 40px rgba(74,222,128,0.4);
  margin-bottom: 4px;
}
.login-sub {
  color: var(--text3);
  font-size: 13px;
  margin-bottom: 36px;
  letter-spacing: 3px;
}
.login-box {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 24px;
  padding: 32px 28px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}
.pin-display {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-bottom: 28px;
}
.pin-dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--border2);
  border: 2px solid var(--border2);
  transition: all 0.2s;
}
.pin-dot.filled {
  background: var(--green);
  border-color: var(--green);
  box-shadow: 0 0 10px rgba(74,222,128,0.5);
}
.numpad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.num-btn {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px;
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'Cairo', sans-serif;
}
.num-btn:active { transform: scale(0.93); background: var(--border); }
.num-btn.del { font-size: 16px; color: var(--text2); }
.num-btn.enter {
  background: var(--green2);
  color: #000;
  font-size: 15px;
  font-weight: 900;
}
.login-error {
  color: var(--red);
  font-size: 13px;
  margin-top: 14px;
  min-height: 18px;
}

/* APP */
#app {
  display: none;
  position: relative;
  z-index: 1;
  padding-bottom: 80px;
}

/* HEADER */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(6,13,6,0.88);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.light .header { background: rgba(240,247,240,0.92); }
.header-user { display: flex; align-items: center; gap: 12px; }
.avatar {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 900;
  flex-shrink: 0;
  border: 2px solid currentColor;
}
.header-name { font-size: 15px; font-weight: 700; }
.header-rank { font-size: 11px; color: var(--text2); margin-top: 1px; }
.header-actions { display: flex; gap: 8px; }
.icon-btn {
  height: 36px;
  padding: 0 12px;
  border-radius: 10px;
  background: var(--card2);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 13px;
  color: var(--text2);
  font-family: 'Cairo', sans-serif;
  font-weight: 700;
  transition: all 0.2s;
}
.icon-btn:active { transform: scale(0.9); }

/* NAV */
nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  z-index: 1000;
  background: var(--card);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding: 8px 0 14px;
}
.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  color: var(--text3);
  font-size: 10px;
  font-weight: 700;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 12px;
  transition: all 0.2s;
  min-width: 50px;
}
.nav-icon { font-size: 20px; transition: transform 0.2s; }
.nav-item.active { color: var(--green); }
.nav-item.active .nav-icon { transform: translateY(-2px); }

/* PAGES */
.page {
  display: none;
  padding: 16px;
  max-width: 680px;
  margin: 0 auto;
}
.page.active { display: block; }

/* CARDS */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 18px;
  margin-bottom: 12px;
  position: relative;
  overflow: hidden;
}
.card-title {
  font-size: 12px;
  color: var(--text2);
  font-weight: 700;
  letter-spacing: 1px;
  margin-bottom: 10px;
}
.section-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--text3);
  letter-spacing: 2px;
  margin: 20px 0 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* BUTTONS */
.btn {
  width: 100%;
  padding: 15px;
  border-radius: 14px;
  border: none;
  font-weight: 900;
  font-size: 15px;
  cursor: pointer;
  font-family: 'Cairo', sans-serif;
  transition: all 0.2s;
  margin-top: 10px;
}
.btn:active { transform: scale(0.97); }
.btn-green { background: var(--green2); color: #000; }
.btn-gold { background: var(--gold2); color: #000; }
.btn-red { background: var(--red); color: #fff; }
.btn-ghost {
  background: var(--card2);
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-sm {
  padding: 10px 16px;
  font-size: 13px;
  width: auto;
  margin: 0;
}

/* INPUTS */
input, select, textarea {
  width: 100%;
  padding: 14px 16px;
  border-radius: 13px;
  border: 1px solid var(--border2);
  background: var(--bg2);
  color: var(--text);
  font-size: 15px;
  font-family: 'Cairo', sans-serif;
  margin-top: 10px;
  outline: none;
  transition: border 0.2s;
}
input:focus, select:focus, textarea:focus { border-color: var(--green); }
textarea { resize: none; min-height: 80px; }
select option { background: var(--card); }
label {
  font-size: 13px;
  color: var(--text2);
  font-weight: 600;
  display: block;
  margin-top: 14px;
}

/* BADGES */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 8px;
  font-size: 11px;
  font-weight: 700;
}
.badge-green { background: rgba(74,222,128,0.15); color: var(--green); }
.badge-gold { background: rgba(251,191,36,0.15); color: var(--gold); }
.badge-red { background: rgba(244,63,94,0.15); color: var(--red); }
.badge-blue { background: rgba(96,165,250,0.15); color: var(--blue); }
.badge-purple { background: rgba(167,139,250,0.15); color: var(--purple); }
.dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  display: inline-block;
}
.dot-green { background: var(--green); box-shadow: 0 0 8px var(--green); }
.dot-red { background: var(--red); box-shadow: 0 0 8px var(--red); }
.hidden { display: none !important; }

/* HOME */
.pts-card {
  text-align: center;
  padding: 28px 20px;
  background: linear-gradient(135deg, var(--card) 0%, var(--card2) 100%);
}
.pts-num {
  font-size: 60px;
  font-weight: 900;
  color: var(--gold);
  line-height: 1;
}
.pts-label {
  font-size: 11px;
  color: var(--text3);
  margin-top: 4px;
  letter-spacing: 2px;
}
.ann-item {
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 12px;
}
.ann-item:last-child { border-bottom: none; }
.ann-text { font-size: 14px; line-height: 1.5; }
.ann-time { font-size: 11px; color: var(--text3); margin-top: 4px; }
.ann-author { font-size: 11px; color: var(--green); font-weight: 700; }
.badges-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 4px;
}
.badge-item {
  background: var(--card2);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 8px 14px;
  font-size: 12px;
  font-weight: 700;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 6px;
}
.badge-item.earned {
  color: var(--gold);
  border-color: rgba(251,191,36,0.3);
  background: rgba(251,191,36,0.08);
}

/* TASK */
.task-item {
  padding: 14px;
  border-radius: 14px;
  background: var(--card2);
  border: 1px solid var(--border);
  margin-bottom: 8px;
}
.task-title { font-size: 14px; font-weight: 700; }
.task-desc {
  font-size: 12px;
  color: var(--text2);
  margin-top: 4px;
  line-height: 1.4;
}
.task-footer {
  display: flex;
  gap: 8px;
  margin-top: 10px;
  align-items: center;
  flex-wrap: wrap;
}
.task-pts { font-size: 12px; color: var(--gold); font-weight: 700; }

/* FIELD */
.team-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 0 8px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}
.team-color {
  width: 4px;
  height: 36px;
  border-radius: 4px;
  flex-shrink: 0;
}
.team-name { font-size: 16px; font-weight: 900; }
.team-count { font-size: 12px; color: var(--text3); }
.team-pts-total {
  font-size: 14px;
  color: var(--gold);
  font-weight: 700;
  margin-right: auto;
}
.member-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  border-radius: 14px;
  background: var(--card2);
  border: 1px solid var(--border);
  margin-bottom: 6px;
  cursor: pointer;
  transition: all 0.2s;
}
.member-row:active { transform: scale(0.98); }
.member-avatar {
  width: 38px;
  height: 38px;
  border-radius: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 900;
  flex-shrink: 0;
}
.member-name { font-size: 14px; font-weight: 700; }
.member-rank {
  font-size: 11px;
  color: var(--text2);
  margin-top: 2px;
}
.member-pts {
  font-size: 15px;
  font-weight: 900;
  color: var(--gold);
}

/* LEADERBOARD */
.lb-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  border-radius: 14px;
  background: var(--card2);
  border: 1px solid var(--border);
  margin-bottom: 6px;
}
.lb-rank {
  font-size: 20px;
  font-weight: 900;
  width: 32px;
  text-align: center;
}
.lb-rank.gold { color: var(--gold); }
.lb-rank.silver { color: #94a3b8; }
.lb-rank.bronze { color: #cd7f32; }
.lb-info { flex: 1; min-width: 0; }
.lb-name { font-size: 14px; font-weight: 700; }
.lb-team { font-size: 11px; color: var(--text2); }
.lb-pts {
  font-size: 18px;
  font-weight: 900;
  color: var(--gold);
}
.lb-bar-wrap {
  height: 3px;
  background: var(--border);
  border-radius: 3px;
  margin-top: 4px;
}
.lb-bar { height: 3px; border-radius: 3px; }
.lb-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}
.lb-tab {
  flex: 1;
  text-align: center;
  padding: 10px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 700;
  background: var(--card2);
  border: 1px solid var(--border);
  cursor: pointer;
  color: var(--text2);
  transition: all 0.2s;
  font-family: 'Cairo', sans-serif;
}
.lb-tab.active {
  background: rgba(74,222,128,0.15);
  color: var(--green);
  border-color: rgba(74,222,128,0.3);
}

/* DASHBOARD */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
}
.stat-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px 14px;
  text-align: center;
}
.stat-num { font-size: 28px; font-weight: 900; line-height: 1; }
.stat-lbl {
  font-size: 11px;
  color: var(--text3);
  margin-top: 4px;
}
.chart-wrap { position: relative; height: 200px; }
.log-item {
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 10px;
}
.log-time {
  font-size: 11px;
  color: var(--green);
  font-weight: 700;
  white-space: nowrap;
  margin-top: 2px;
}
.log-txt {
  font-size: 12px;
  color: var(--text2);
  line-height: 1.4;
}

/* ATTENDANCE */
.att-session-card {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px;
  margin-bottom: 8px;
}
.att-session-title { font-size: 14px; font-weight: 700; }
.att-session-date {
  font-size: 12px;
  color: var(--text3);
  margin-top: 2px;
}
.att-member-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-top: 1px solid var(--border);
  font-size: 13px;
}
.gps-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: linear-gradient(135deg, #065f46, #047857);
  border: 1px solid #059669;
  border-radius: 16px;
  padding: 16px;
  cursor: pointer;
  margin-bottom: 12px;
  transition: all 0.2s;
  color: var(--green3);
  font-weight: 700;
  font-size: 15px;
  font-family: 'Cairo', sans-serif;
  width: 100%;
}
.gps-btn:active { transform: scale(0.97); }
.gps-pulse {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 1.5s infinite;
  flex-shrink: 0;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(74,222,128,0.4); }
  50% { box-shadow: 0 0 0 8px rgba(74,222,128,0); }
}
.att-toggle { display: flex; gap: 8px; margin-top: 8px; }
.att-btn {
  flex: 1;
  padding: 10px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--card2);
  color: var(--text2);
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  font-family: 'Cairo', sans-serif;
  transition: all 0.2s;
}
.att-btn.present-active {
  background: rgba(74,222,128,0.2);
  color: var(--green);
  border-color: rgba(74,222,128,0.4);
}
.att-btn.absent-active {
  background: rgba(244,63,94,0.15);
  color: var(--red);
  border-color: rgba(244,63,94,0.3);
}

/* MODAL */
#modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 20000;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(6px);
  padding: 20px;
  align-items: flex-end;
  justify-content: center;
}
#modal-overlay.open { display: flex; }
#modal-box {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 24px 24px 20px 20px;
  padding: 24px;
  width: 100%;
  max-width: 500px;
  max-height: 90vh;
  overflow-y: auto;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp {
  from { transform: translateY(100px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.modal-title {
  font-size: 18px;
  font-weight: 900;
  margin-bottom: 16px;
}
.modal-close {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 20px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text2);
  font-family: 'Cairo', sans-serif;
  font-weight: 700;
  margin-top: 14px;
  width: 100%;
}
.manage-section {
  margin-top: 18px;
  padding-top: 18px;
  border-top: 1px solid var(--border);
}
.manage-section-title {
  font-size: 11px;
  color: var(--text3);
  font-weight: 700;
  letter-spacing: 1.5px;
  margin-bottom: 8px;
}

/* CONFIRM */
#confirm-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 25000;
  background: rgba(0,0,0,0.85);
  align-items: center;
  justify-content: center;
  padding: 20px;
}
#confirm-overlay.open { display: flex; }
#confirm-box {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 24px;
  width: 100%;
  max-width: 340px;
  text-align: center;
}
.confirm-title { font-size: 17px; font-weight: 900; margin-bottom: 8px; }
.confirm-msg {
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 20px;
  line-height: 1.5;
}
.confirm-btns { display: flex; gap: 10px; }
.confirm-btns .btn { margin: 0; }

/* TOAST */
#toast {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--card2);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 12px 20px;
  font-size: 14px;
  font-weight: 700;
  z-index: 30000;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  white-space: nowrap;
}
#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
#toast.success { border-color: rgba(74,222,128,0.4); color: var(--green); }
#toast.error { border-color: rgba(244,63,94,0.4); color: var(--red); }

/* ARCHIVE */
.archive-item {
  padding: 12px 14px;
  border-radius: 14px;
  background: var(--card2);
  border: 1px solid var(--border);
  margin-bottom: 6px;
  opacity: 0.75;
  display: flex;
  align-items: center;
  gap: 12px;
}
.archive-name { font-size: 14px; font-weight: 700; }
.archive-meta {
  font-size: 11px;
  color: var(--text3);
  margin-top: 2px;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-wrap">
    <div class="login-logo">أوتاد</div>
    <div class="login-sub">نظام إدارة الفرقة الكشفية</div>
    <div class="login-box">
      <div class="pin-display" id="pin-dots">
        <div class="pin-dot"></div><div class="pin-dot"></div>
        <div class="pin-dot"></div><div class="pin-dot"></div>
      </div>
      <div class="numpad">
        <button class="num-btn" onclick="PIN.press('1')">١</button>

const TC = ['#4ade80','#60a5fa','#f59e0b','#a78bfa','#f43f5e','#34d399','#fb923c','#e879f9'];
function teamColor(name){ 
  if(!name) return TC[0]; 
  let h=0; 
  for(let c of name) h=(h*31+c.charCodeAt(0))%TC.length; 
  return TC[h]; 
}
function initials(name){ 
  if(!name) return '؟'; 
  const p = name.trim().split(' '); 
  return p[0][0] + (p[1] ? p[1][0] : ''); 
}

  return `${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)}`;

    document.getElementById('login-err').textContent = '';
