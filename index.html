<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام كشافة آمن</title>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

<style>
body{margin:0;background:#0b1220;color:#e6eefc;font-family:Cairo}
.box{background:#111c33;margin:10px;padding:12px;border-radius:10px}
button,input{padding:8px;border-radius:8px;border:none}
button{cursor:pointer}
.hidden{display:none}
</style>
</head>

<body>

<div id="login" class="box">
<h2>دخول النظام</h2>
<input id="pin" placeholder="PIN">
<button onclick="login()" id="loginBtn" disabled>دخول</button>
<div id="err"></div>
<div id="status">جاري تحميل النظام...</div>
</div>

<div id="app" class="hidden">
<h3 id="me"></h3>
<div id="controls"></div>
<div id="content"></div>
</div>

<script>

// 🔥 Firebase
firebase.initializeApp({
apiKey:"YOUR_KEY",
databaseURL:"YOUR_DB"
});

const db = firebase.database().ref("safe_system");

// 🧠 بيانات آمنة دائمًا
let data = {users:{},logs:[],alerts:[]};
let user = null;
let ready = false;

// 👑 قيادة عليا
const SUPER = {
"1111":"عبدالله العرفه",
"2222":"سلمان الصويلح",
"3333":"معاذ الشنقيطي"
};

// 🔢 PIN آمن
function genPin(){
let used = new Set(Object.values(data.users||{}).map(u=>u.pin));
let p;
do{
p = Math.floor(1000 + Math.random()*9000).toString();
}while(used.has(p));
return p;
}

// 🚀 بناء أولي آمن
function seed(){
if(Object.keys(data.users||{}).length>0) return;

const groups = {
"طليعة 1":["صالح","حسن","عزام","يحي","فهد","زياد","يزيد","غازي","ريان"],
"طليعة 2":["ياسر","محمد","علي","فواز","اصيل","صالح2","غازي2","ابراهيم","رياض"],
"طليعة 3":["بسام","بدر","حسام","عبدالله","عيسى","عبدالعزيز","راشد","زايد","علي2"],
"طليعة 4":["مشعل","ناصر","مبارك","عبدالله2","راكان","رائد","فارس","محمد2","مشاري"]
};

Object.entries(groups).forEach(([team,members])=>{
members.forEach(name=>{
let id="U"+Math.random();

data.users[id]={
name,
team,
role:"member",
pts:0,
badges:[],
pin:genPin()
};
});
});

save();
}

// 🔐 تسجيل دخول آمن 100%
function login(){

if(!ready){
document.getElementById("err").innerText="انتظر تحميل النظام";
return;
}

let pin=document.getElementById("pin").value.trim();

let found=null;

// 👑 قيادة
if(SUPER[pin]){
found={name:SUPER[pin],role:"super"};
}

// 👥 مستخدمين
for(let u of Object.values(data.users||{})){
if(u.pin===pin){
found=u;
break;
}
}

if(!found){
document.getElementById("err").innerText="PIN خطأ";
return;
}

user=found;

log("login",user.name);

document.getElementById("login").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");

render();
}

// 🧾 لوق
function log(action,name){
data.logs.unshift({
action,name,
time:new Date().toLocaleString("ar-SA")
});
save();
}

// 💾 حفظ آمن
function save(){
db.set(data);
}

// ➕ نقاط
function addPts(id){

if(!data.users[id]) return;

let v=parseInt(prompt("كم نقطة؟"));
if(!v || v<=0) return;

data.users[id].pts = (data.users[id].pts||0) + v;

// أوسمة تلقائية
if(data.users[id].pts>=50 && !data.users[id].badges.includes("التميز"))
data.users[id].badges.push("التميز");

if(data.users[id].pts>=100 && !data.users[id].badges.includes("الأسطورة"))
data.users[id].badges.push("الأسطورة");

// تنبيه
if(v>=30){
data.alerts.unshift({
msg:"نشاط عالي: "+data.users[id].name,
time:new Date().toLocaleString("ar-SA")
});
}

save();
}

// 🎨 عرض آمن 100%
function render(){

document.getElementById("me").innerText =
(user?.name||"") + " - " + (user?.role||"");

// مستخدمين
let html="";

for(let [id,u] of Object.entries(data.users||{})){
html+=`
<div class="box">
<b>${u.name}</b><br>
${u.team||""}<br>
نقاط: ${u.pts||0}<br>
PIN: ${user.role==="super"?u.pin:"****"}<br>
${(u.badges||[]).join(", ")}<br>

<button onclick="addPts('${id}')">إضافة نقاط</button>
</div>
`;
}

document.getElementById("content").innerHTML=html;

// تحكم
if(user.role==="super"){
document.getElementById("controls").innerHTML=`
<button onclick="seed()">إعادة بناء النظام</button>
<button onclick="data.users={};save()">تصفير كامل</button>
`;
}else{
document.getElementById("controls").innerHTML="";
}

}

// 🔄 تحميل Firebase (آمن جدًا)
db.on("value",snap=>{

try{
data = snap.val() || {users:{},logs:[],alerts:[]};

if(!data.users) data.users={};

seed();

ready = true;

document.getElementById("status").innerText="جاهز";

document.getElementById("loginBtn").disabled=false;

render();

}catch(e){

document.getElementById("err").innerText="خطأ تحميل، حاول تحديث الصفحة";

console.log(e);

}

});

</script>

</body>
</html>
