<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام أوتاد - الإصدار القيادي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --primary: #3b82f6; --success: #22c55e; --danger: #ef4444; --bg: #0f172a; --card: #1e293b; }
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: #f8fafc; direction: rtl; padding: 10px; }
        .container { max-width: 600px; margin: auto; }
        .header-box { background: var(--card); padding: 20px; border-radius: 15px; border-bottom: 4px solid var(--primary); text-align: center; margin-bottom: 15px; }
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .stat-item { background: var(--card); padding: 10px; border-radius: 10px; text-align: center; font-size: 12px; border: 1px solid #334155; }
        .card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #334155; }
        .platoon-title { color: var(--primary); font-weight: bold; border-right: 4px solid var(--primary); padding-right: 10px; margin-bottom: 15px; font-size: 16px; }
        .member-row { display: flex; align-items: center; justify-content: space-between; background: #ffffff05; padding: 12px; border-radius: 10px; margin-bottom: 8px; }
        .badge-tag { font-size: 9px; background: var(--primary); padding: 1px 5px; border-radius: 4px; margin-left: 3px; }
        .controls { display: flex; gap: 5px; }
        select { background: #334155; color: white; border: none; padding: 5px; border-radius: 5px; font-size: 12px; }
        .btn-tool { background: #475569; border: none; color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
        .modal-content { background: var(--card); width: 100%; max-width: 450px; padding: 20px; border-radius: 15px; max-height: 85vh; overflow-y: auto; }
        input { width: 100%; padding: 10px; background: #334155; border: 1px solid #475569; color: white; border-radius: 8px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const CONFIG = {
            admins: { "333": "عبدالله العرفه", "202021": "سلمان الصويلح", "202030": "معاذ الشنقيطي" },
            platoons: [
                { id: 1, name: "طليعة 1", members: ["صالح حبتور", "حسن الشهري", "ريان جعام", "غازي العجمي", "يزيد خال", "زياد العجلاني", "فهد المهيني", "يحي شراحيلي", "عزام خبراني"] },
                { id: 2, name: "طليعة 2", members: ["ياسر ابو حيه", "محمد عسيري", "رياض الزهراني", "ابراهيم التليدي", "غازي العنزي", "صالح الخثعمي", "اصيل العتيبي", "فواز الشهراني", "علي الغامدي"] },
                { id: 3, name: "طليعة 3", members: ["بسام قرادي", "علي الشهراني", "زايد القحطاني", "راشد الراشدي", "عبدالعزيز القحطاني", "عيسى الرشيدي", "بدر كعبي", "عبدالله قشاش", "حسام الشهراني"] },
                { id: 4, name: "طليعة 4", members: ["مشعل القحطاني", "مشاري القحطاني", "محمد فقيه", "فارس العمري", "رائد حوباني", "راكان حوباني", "عبدالله القرني", "ناصر المطيري", "مبارك خميس"] }
            ],
            leaders: ["الوليد الحازمي (ق1)", "حاتم خريزي (ق2)", "راكان شراحيلي (ق3)", "وضاح الصويلح (ق4)"],
            badges: ["وسام الخدمة", "وسام الهواية", "وسام الرياضي", "وسام المسامر"]
        };

        function App() {
            const [user, setUser] = useState(null);
            const [pin, setPin] = useState("");
            const [data, setData] = useState({});
            const [editId, setEditId] = useState(null);

            useEffect(() => {
                const saved = localStorage.getItem("awtad_v17");
                if (saved) setData(JSON.parse(saved));
            }, []);

            const save = (id, field, val) => {
                const updated = { ...data, [id]: { ...(data[id] || { badges: [] }), [field]: val } };
                setData(updated);
                localStorage.setItem("awtad_v17", JSON.stringify(updated));
            };

            if (!user) return (
                <div className="container" style={{paddingTop: '80px'}}>
                    <div className="header-box"><h2>نظام أوتاد الكشفي</h2><p>الدخول للقيادة العليا</p></div>
                    <input type="password" placeholder="رمز الدخول" value={pin} onChange={e=>setPin(e.target.value)} />
                    <button style={{width:'100%', padding:'12px', background:var(--primary), border:'none', color:'white', borderRadius:'10px'}} onClick={() => CONFIG.admins[pin] ? setUser({id: pin, name: CONFIG.admins[pin]}) : alert("خطأ")}>دخول</button>
                </div>
            );

            return (
                <div className="container">
                    <div className="header-box">
                        <h3>{user.name}</h3>
                        <p>عريف أول الوحدة - مدرسة القاسم</p>
                    </div>

                    <div className="stats-row">
                        <div className="stat-item"><b>40</b><br/>كشاف</div>
                        <div className="stat-item"><b>4</b><br/>طلايع</div>
                        <div className="stat-item"><b>نشط</b><br/>الحالة</div>
                    </div>

                    <div className="card" style={{borderColor: var(--danger)}}>
                        <div className="platoon-title" style={{color: var(--danger), borderColor: var(--danger)}}>قادة الطلايع</div>
                        {CONFIG.leaders.map(l => (
                            <div key={l} className="member-row">
                                <span>{data[l]?.name || l}</span>
                                <button className="btn-tool" onClick={() => setEditId(l)}>ℹ️</button>
                            </div>
                        ))}
                    </div>

                    {CONFIG.platoons.map(p => (
                        <div key={p.id} className="card">
                            <div className="platoon-title">{p.name}</div>
                            {p.members.map(m => (
                                <div key={m} className="member-row">
                                    <div style={{flex: 1}}>
                                        <div>{data[m]?.name || m}</div>
                                        <div>{(data[m]?.badges || []).map(b => <span key={b} className="badge-tag">{b}</span>)}</div>
                                    </div>
                                    <div className="controls">
                                        <select onChange={e => save(m, "status", e.target.value)} value={data[m]?.status || "حاضر"}>
                                            <option>حاضر</option><option>غائب</option><option>متأخر</option>
                                        </select>
                                        <button className="btn-tool" onClick={() => setEditId(m)}>ℹ️</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    ))}

                    {editId && (
                        <div className="modal">
                            <div className="modal-content">
                                <h3>ملف: {data[editId]?.name || editId}</h3>
                                <label>الاسم الرسمي</label>
                                <input value={data[editId]?.name || editId} onChange={e => save(editId, "name", e.target.value)} />
                                <label>رقم الهوية</label>
                                <input placeholder="10 أرقام" value={data[editId]?.idNum || ""} onChange={e => save(editId, "idNum", e.target.value)} />
                                <label>رقم الجوال</label>
                                <input placeholder="05xxxx" value={data[editId]?.phone || ""} onChange={e => save(editId, "phone", e.target.value)} />
                                
                                <h4>الأوسمة</h4>
                                <div style={{display:'flex', flexWrap:'wrap', gap:'5px'}}>
                                    {CONFIG.badges.map(b => (
                                        <button key={b} style={{fontSize:'10px', padding:'5px', background: data[editId]?.badges?.includes(b) ? var(--success) : '#334155', color:'white', border:'none', borderRadius:'5px'}}
                                                onClick={() => {
                                                    let bgs = data[editId]?.badges || [];
                                                    bgs = bgs.includes(b) ? bgs.filter(x => x !== b) : [...bgs, b];
                                                    save(editId, "badges", bgs);
                                                }}>{b}</button>
                                    ))}
                                </div>
                                <button onClick={() => setEditId(null)} style={{marginTop:'20px', width:'100%', padding:'10px', background:var(--success), border:'none', color:'white', borderRadius:'10px'}}>حفظ وإغلاق</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
