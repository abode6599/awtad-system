<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الإدارة المدرسية - مدرسة القاسم بن محمد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; }
        body { margin: 0; background: #0f172a; color: white; min-height: 100vh; }
        .container { padding: 20px; max-width: 800px; margin: auto; }
        .header { background: #1e293b; padding: 20px; border-radius: 15px; margin-bottom: 20px; border-bottom: 4px solid #3b82f6; }
        .card { background: #1e293b; padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        input, select { background: #334155; color: white; border: 1px solid #475569; padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 10px; }
        button { background: #3b82f6; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        .member-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #334155; }
        .member-name { flex: 1; font-size: 14px; }
        .status-select { width: 85px; margin-bottom: 0; padding: 5px; font-size: 12px; }
        .score-input { width: 55px; margin-bottom: 0; padding: 5px; text-align: center; }
        .label { color: #94a3b8; font-size: 13px; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const DATA = {
            unit: "مدرسة القاسم بن محمد",
            users: [
                { name: "عبدالله العرفه", id: "333", role: "admin" },
                { name: "سلمان الصويلح", id: "202021", role: "admin" },
                { name: "معاذ الشنقيطي", id: "202030", role: "admin" },
                { name: "الوليد فيصل الحازمي", id: "619425", role: "leader" },
                { name: "حاتم هشام خريزي", id: "442971", role: "leader" },
                { name: "راكان سلمان شراحيلي", id: "992041", role: "leader" },
                { name: "وضاح ماجد الصويلح", id: "883102", role: "leader" }
            ],
            platoons: [
                { id: 1, name: "طليعة 1", leaderId: "619425", members: [
                    {n:"صالح سعيد حبتور", id:"1-1"}, {n:"حسن محمد الشهري", id:"1-2"}, {n:"ريان محمد جعام", id:"1-3"}, {n:"غازي ابراهيم العجمي", id:"1-4"},
                    {n:"يزيد يحي خال", id:"1-5"}, {n:"زياد آل احمد العجلاني", id:"1-6"}, {n:"فهد فيصل المهيني", id:"1-7"}, {n:"يحي علي شراحيلي", id:"1-8"}, {n:"عزام حيدر خبراني", id:"1-9"}
                ]},
                { id: 2, name: "طليعة 2", leaderId: "442971", members: [
                    {n:"ياسر موسى ابو حيه", id:"2-1"}, {n:"محمد جابر عسيري", id:"2-2"}, {n:"رياض محمد الزهراني", id:"2-3"}, {n:"ابراهيم فرحان التليدي", id:"2-4"},
                    {n:"غازي باني العنزي", id:"2-5"}, {n:"صالح عبدالله الخثعمي", id:"2-6"}, {n:"اصيل متعب العتيبي", id:"2-7"}, {n:"فواز سعيد الشهراني", id:"2-8"}, {n:"علي مرضي الغامدي", id:"2-9"}
                ]},
                { id: 3, name: "طليعة 3", leaderId: "992041", members: [
                    {n:"بسام علي قرادي", id:"3-1"}, {n:"علي بندر الشهراني", id:"3-2"}, {n:"زايد محمد القحطاني", id:"3-3"}, {n:"راشد سعيدان الراشدي", id:"3-4"},
                    {n:"عبدالعزيز محمد القحطاني", id:"3-5"}, {n:"عيسى غازي الرشيدي", id:"3-6"}, {n:"بدر عبدالله كعبي", id:"3-7"}, {n:"عبدالله عادل قشاش", id:"3-8"}, {n:"حسام سعد الشهراني", id:"3-9"}
                ]},
                { id: 4, name: "طليعة 4", leaderId: "883102", members: [
                    {n:"مشعل محمد القحطاني", id:"4-1"}, {n:"مشاري محمد القحطاني", id:"4-2"}, {n:"محمد حسين فقيه", id:"4-3"}, {n:"فارس بريحي العمري", id:"4-4"},
                    {n:"رائد حسين حوباني", id:"4-5"}, {n:"راكان حسين حوباني", id:"4-6"}, {n:"عبدالله سعيد القرني", id:"4-7"}, {n:"ناصر مفلح المطيري", id:"4-8"}, {n:"مبارك مرزوق خميس", id:"4-9"}
                ]}
            ]
        };

        function App() {
            const [user, setUser] = useState(null);
            const [pass, setPass] = useState("");
            const [date, setDate] = useState(new Date().toISOString().split("T")[0]);
            const [db, setDb] = useState({});

            useEffect(() => {
                const saved = localStorage.getItem("awtad_final_v12");
                if (saved) setDb(JSON.parse(saved));
            }, []);

            const login = () => {
                const found = DATA.users.find(u => u.id === pass.trim());
                if (found) setUser(found);
                else alert("الرمز غير صحيح");
            };

            const update = (pId, mId, field, val) => {
                const key = `${pId}:${mId}`;
                const newDb = { ...db, [date]: { ...db[date], [key]: { ...(db[date]?.[key] || { status: "", score: 5 }), [field]: val, editor: user.name } } };
                setDb(newDb);
                localStorage.setItem("awtad_final_v12", JSON.stringify(newDb));
            };

            if (!user) return (
                <div className="container" style={{textAlign: "center", marginTop: "20vh"}}>
                    <div className="header">
                        <h2 style={{margin: 0}}>نظام الإدارة - مدرسة القاسم</h2>
                    </div>
                    <div className="card">
                        <input type="password" value={pass} onChange={e => setPass(e.target.value)} placeholder="رمز الدخول" />
                        <button onClick={login}>دخول</button>
                    </div>
                </div>
            );

            return (
                <div className="container">
                    <div className="header">
                        <div style={{display: "flex", justifyContent: "space-between"}}>
                            <span>{user.name}</span>
                            <button onClick={() => setUser(null)} style={{width: "auto", background: "none", color: "#ef4444", padding: 0}}>خروج</button>
                        </div>
                    </div>
                    <div className="card"><input type="date" value={date} onChange={e => setDate(e.target.value)} /></div>
                    {DATA.platoons.map(p => (
                        (user.role === "admin" || p.leaderId === user.id) && (
                            <div key={p.id} className="card">
                                <h4 style={{color: "#3b82f6", margin: "0 0 10px"}}>{p.name}</h4>
                                {p.members.map(m => {
                                    const entry = db[date]?.[`${p.id}:${m.id}`] || { status: "", score: 5 };
                                    return (
                                        <div key={m.id} className="member-row">
                                            <span className="member-name">{m.n}</span>
                                            <select className="status-select" value={entry.status} onChange={e => update(p.id, m.id, "status", e.target.value)}>
                                                <option value="">حالة</option>
                                                <option value="حاضر">حاضر</option>
                                                <option value="غائب">غائب</option>
                                            </select>
                                            <input type="number" className="score-input" value={entry.score} onChange={e => update(p.id, m.id, "score", e.target.value)} />
                                        </div>
                                    );
                                })}
                            </div>
                        )
                    ))}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
