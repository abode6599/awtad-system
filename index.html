<script>

// 🔥 تطوير البيانات
let data = {
  users:{},
  logs:[],
  access:[],
  alerts:[]
};

// 🧠 مستويات
function getLevel(pts){
  if(pts>=100) return "أسطورة";
  if(pts>=50) return "محترف";
  if(pts>=20) return "متقدم";
  return "مبتدئ";
}

// 🏅 أوسمة تلقائية
function autoBadges(user){
  if(user.pts>=50 && !user.badges.includes("التميز"))
    user.badges.push("التميز");

  if(user.pts>=100 && !user.badges.includes("الأسطورة"))
    user.badges.push("الأسطورة");
}

// 🚨 كشف التلاعب
function detectAbuse(val,target){
  if(val>=30){
    data.alerts.unshift({
      msg:`نشاط مشبوه على ${target}`,
      time:new Date().toLocaleString("ar-SA")
    });
  }
}

// ➕ نقاط
function addPts(id){
  let v = parseInt(prompt("كم؟"));
  if(isNaN(v) || v<=0) return;

  data.users[id].pts += v;

  autoBadges(data.users[id]);
  detectAbuse(v,data.users[id].name);

  log(user.name,"نقاط",data.users[id].name,v);
  save();
}

// 📊 تحليل
function getStats(){
  let users = Object.values(data.users);

  let top = users.sort((a,b)=>b.pts-a.pts)[0];
  return {
    best: top?.name || "-",
    pts: top?.pts || 0
  };
}

// 🎨 عرض متطور
function renderAdvanced(){

let html="";

Object.entries(data.users).forEach(([id,u])=>{
html+=`
<div class="box">
<b>${u.name}</b><br>
المستوى: ${getLevel(u.pts)}<br>
النقاط: ${u.pts}<br>
الأوسمة: ${u.badges.join(", ")}<br>

<button onclick="addPts('${id}')">إضافة نقاط</button>
${user.role==="super"?`<button onclick="changePin('${id}')">PIN</button>`:""}
</div>
`;
});

document.getElementById("users").innerHTML=html;

// 🚨 عرض التنبيهات
if(user.role==="super"){
document.getElementById("alerts").innerHTML =
data.alerts.map(a=>a.msg+" - "+a.time).join("<br>");
}

// 📊 احصائيات
let s = getStats();
document.getElementById("stats").innerHTML =
`أفضل لاعب: ${s.best} (${s.pts})`;

}

</script>
