<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام أوتاد الكشفي الآمن</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0b1220; --card: #111c33; --gold: #fbbf24; --blue: #3b82f6; --text: #e6eefc; }
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: var(--text); direction: rtl; padding: 10px; }
        .box { background: var(--card); margin-bottom: 10px; padding: 15px; border-radius: 12px; border: 1px solid #1e293b; }
        button, input { padding: 10px; border-radius: 8px; border: none; font-size: 16px; }
        button { background: var(--blue); color: white; cursor: pointer; font-weight: bold; }
        input { width: 100%; background: #0b1220; color: white; border: 1px solid #1e293b; text-align: center; margin-bottom: 10px; }
        .hidden { display: none; }
        .student-item { border-bottom: 1px solid #1e293b; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .badge-tag { background: rgba(251, 191, 36, 0.2); color: var(--gold); padding: 2px 8px; border-radius: 5px; font-size: 11px; margin-right: 5px; }
    </style>
</head>
<body>

<div id="login" class="box" style="max-width:400px; margin: 15vh auto; text-align: center;">
    <h2 style="color:var(--gold)">دخول نظام أوتاد</h2>
    <input id="pin" type="password" placeholder="أدخل PIN (مثلاً 1111)">
    <button onclick="login()" id="loginBtn" style="width:100%" disabled>جاري التحميل...</button>
    <div id="err" style="color:#ef4444; margin-top:10px;"></div>
</div>

<div id="app" class="hidden" style="max-width:600px; margin:auto;">
    <div class="box" style="display:flex; justify-content:space-between; align-items:center;">
        <h3 id="me" style="margin:0"></h3>
        <button onclick="location.reload()" style="background:#ef4444; padding:5px 10px;">خروج</button>
    </div>
    <div id="controls" class="box hidden"></div>
    <div class="box">
        <h3>قائمة الطلاب والطلايع</h3>
        <div id="content"></div>
    </div>
</div>

<script>
// 🔥 الربط المباشر مع Firebase الخاص بك
const firebaseConfig = {
    apiKey: "AIzaSyA6P2gbckRDtKUqb8mVZcibXR4soZezFxE",
    databaseURL: "https://awtad-system-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref("safe_system_v3");

let data = {users:{}};
let currentUser = null;
let ready = false;

// 👑 القيادة العليا
const SUPER = {
    "1111": {name: "عبدالله العرفه", role: "Super Admin"},
    "2222": {name: "سلمان الصويلح", role: "Super Admin"},
    "3333": {name: "معاذ الشنقيطي", role: "Super Admin"}
};

// 🛡️ الهيكلة الرسمية (قادة وأعضاء)
const STRUCTURE = [
    {team: "طليعة 1", leader: "الوليد الحازمي", members: ["صالح حبتور", "حسن الشهري", "عزام خبراني", "يحي شراحيلي", "فهد المهيني", "زياد العجلاني", "يزيد خال", "غازي العجمي", "ريان جعام"]},
    {team: "طليعة 2", leader: "حاتم خريزي", members: ["ياسر ابو حيه", "محمد عسيري", "علي الغامدي", "فواز الشهراني", "اصيل العتيبي", "صالح الخثعمي", "غازي العنزي", "ابراهيم التليدي", "رياض الزهراني"]},
    {team: "طليعة 3", leader: "راكان شراحيلي", members: ["بسام قرادي", "بدر كعبي", "حسام الشهراني", "عبدالله قشاش", "عيسى الرشيدي", "عبدالعزيز القحطاني", "راشد الراشدي", "زايد القحطاني", "علي الشهراني"]},
    {team: "طليعة 4", leader: "وضاح الصويلح", members: ["مشعل القحطاني", "ناصر المطيري", "مبارك خميس", "عبدالله القرني", "راكان حوباني", "رائد حوباني", "فارس العمري", "محمد فقيه", "مشاري القحطاني"]}
];

function seed() {
    if(Object.keys(data.users || {}).length > 0) return;
    let newUsers = {};
    STRUCTURE.forEach(group => {
        // إضافة القائد أولاً
        let leaderId = "L_" + group.leader.replace(/\s/g, '');
        newUsers[leaderId] = { name: group.leader, team: group.team, role: "قائد طليعة", pts: 0, pin: Math.floor(1000 + Math.random()*9000).toString(), badges: [] };
        
        // إضافة الأعضاء
        group.members.forEach(m => {
            let mid = "U_" + m.replace(/\s/g, '');
            newUsers[mid] = { name: m, team: group.team, role: "عضو", pts: 0, pin: Math.floor(1000 + Math.random()*9000).toString(), badges: [] };
        });
    });
    db.child("users").set(newUsers);
}

function login() {
    let pin = document.getElementById("pin").value.trim();
    let found = null;

    if(SUPER[pin]) found = SUPER[pin];
    else {
        Object.values(data.users || {}).forEach(u => { if(u.pin === pin) found = u; });
    }

    if(!found) { document.getElementById("err").innerText = "PIN خطأ!"; return; }

    currentUser = found;
    document.getElementById("login").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    if(currentUser.role === "Super Admin") document.getElementById("controls").classList.remove("hidden");
    render();
}

function addPts(id) {
    let v = parseInt(prompt("كم نقطة لـ " + data.users[id].name + "؟"));
    if(!v || v <= 0) return;
    let current = data.users[id].pts || 0;
    db.child("users").child(id).update({ pts: current + v });
}

function render() {
    document.getElementById("me").innerText = currentUser.name + " (" + currentUser.role + ")";
    let html = "";
    Object.entries(data.users || {}).forEach(([id, u]) => {
        html += `<div class="student-item">
            <div>
                <b>${u.name}</b> <small style="opacity:0.6">${u.team}</small><br>
                ${currentUser.role === 'Super Admin' ? `<span style="color:var(--gold); font-size:12px">PIN: ${u.pin}</span>` : ''}
            </div>
            <div>
                <b style="color:var(--gold)">${u.pts} ن</b>
                ${currentUser.role !== 'عضو' ? `<button onclick="addPts('${id}')" style="margin-right:10px; padding:2px 8px">+</button>` : ''}
            </div>
        </div>`;
    });
    document.getElementById("content").innerHTML = html;

    if(currentUser.role === "Super Admin") {
        document.getElementById("controls").innerHTML = `<button onclick="seed()">🔄 استيراد الأسماء</button> <button onclick="db.set({users:{}})" style="background:#ef4444">⚠️ تصفير كامل</button>`;
    }
}

db.on("value", snap => {
    data = snap.val() || {users:{}};
    ready = true;
    document.getElementById("loginBtn").innerText = "دخول";
    document.getElementById("loginBtn").disabled = false;
    if(currentUser) render();
});
</script>
</body>
</html>
