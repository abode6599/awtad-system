<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أوتاد V4.0 | نظام القيادة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #030712; --card: #111827; --accent: #2563eb; --gold: #fbbf24; --text: #f3f4f6; --border: #1f2937; }
        .light-mode { --bg: #f3f4f6; --card: #ffffff; --text: #111827; --border: #d1d5db; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; transition: background 0.3s; }
        body { background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        
        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { width: 90%; max-width: 380px; text-align: center; padding: 40px; background: var(--card); border-radius: 30px; border: 2px solid var(--accent); box-shadow: 0 10px 50px rgba(0,0,0,0.5); }
        
        nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { color: #6b7280; font-size: 12px; cursor: pointer; font-weight: 700; text-align: center; }
        .nav-item.active { color: var(--accent); }

        .container { padding: 15px; max-width: 600px; margin: auto; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); position: relative; }
        .m-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .badge-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; }
        .b-pill { background: rgba(37,99,235,0.1); color: var(--accent); padding: 5px; border-radius: 10px; font-size: 10px; text-align: center; border: 1px solid var(--border); }
        
        input, select, textarea { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text); margin-top: 10px; }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; margin-top: 10px; }
        .btn-p { background: var(--accent); color: white; }
        .btn-g { background: var(--gold); color: black; }
        .hidden { display: none !important; }
        .alert-box { background: var(--gold); color: black; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-weight: 700; font-size: 13px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h1 style="color:var(--accent); margin:0;">AWTAD V4</h1>
        <p style="color:#6b7280; margin-bottom:20px;">نظام إدارة فرقة أوتاد الكشفية</p>
        <input type="password" id="pin-in" placeholder="رمز الدخول" style="text-align:center; letter-spacing:8px; font-size:24px;">
        <button class="btn btn-p" onclick="Sys.login()">دخول للمقر</button>
        <div onclick="Sys.hardReset()" style="margin-top:40px; color:#1f2937; font-size:9px; cursor:pointer;">HARD RESET</div>
    </div>
</div>

<div id="app" class="hidden">
    <div style="padding: 30px 20px; text-align: center;">
        <button onclick="Sys.toggleTheme()" style="float:left; border:none; background:none; font-size:20px; cursor:pointer;">🌓</button>
        <h2 id="u-name" style="margin:0;">---</h2>
        <p id="u-role" style="color:var(--gold); font-size:14px; margin:5px 0;"></p>
    </div>

    <div class="container" id="content"></div>

    <nav>
        <div class="nav-item active" onclick="Sys.tab('home', this)">🏠 الرئيسية</div>
        <div class="nav-item" onclick="Sys.tab('field', this)">🛡️ الميدان</div>
        <div class="nav-item" onclick="Sys.tab('vote', this)">🗳️ التصويت</div>
        <div id="adm-nav" class="nav-item hidden" onclick="Sys.tab('admin', this)">⚙️ التحكم</div>
    </nav>
</div>

<div id="modal" class="hidden" style="position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:5000; display:flex; align-items:center; justify-content:center; padding:20px;">
    <div id="modal-body" class="card" style="width:100%; max-width:450px;"></div>
</div>

<script>
const Sys = (() => {
    const config = { apiKey: "AIzaSyA6P2gbckRDtKUqb8mVZcibXR4soZezFxE", databaseURL: "https://awtad-system-default-rtdb.firebaseio.com" };
    firebase.initializeApp(config);
    const db = firebase.database().ref("awtad_final_prod");

    const ALL_BADGES = Array.from({length: 75}, (_, i) => [
        "وسام المسعف","وسام المؤذن","وسام المصور","وسام التقني","وسام الفلكي","وسام المنقذ","وسام السباح","وسام الطباخ",
        "وسام القارئ","وسام صديق البيئة","وسام الرياضي","وسام الملحن","وسام الخطاط","وسام الحاسب","وسام الدفاع المدني"
    ][i % 15] + " " + (Math.floor(i/15) + 1));

    let state = { user: null, members: {}, tab: 'home', logs: [], votes: {}, requests: {} };

    return {
        hardReset: async () => {
            const k = prompt("رمز المالك:"); if(k !== "7777") return;
            let m = {};
            const raw = [
                {t: "طليعة 1", l: "الوليد فيصل الحازمي", n: "يحي علي شراحيلي", m: ["صالح سعيد حبتور", "حسن محمد الشهري", "ريان محمد جعام", "غازي ابراهيم العجمي", "يزيد يحي خال", "زياد سعيد العجلاني", "فهد فيصل المهيني", "عزام حيدر خبراني"]},
                {t: "طليعة 2", l: "حاتم هشام خريزي", n: "غازي باني العنزي", m: ["ياسر موسى ابو حيه", "محمد جابر عسيري", "رياض محمد الزهراني", "ابراهيم فرحان التليدي", "صالح عبدالله الخثعمي", "اصيل متعب العتيبي", "فواز سعيد الشهراني", "علي مرضي الغامدي"]},
                {t: "طليعة 3", l: "راكان سلمان شراحيلي", n: "بسام علي قرادي", m: ["علي بندر الشهراني", "زايد محمد القحطاني", "راشد سعيدان الراشدي", "عبدالعزيز محمد القحطاني", "عيسى غازي الرشيدي", "بدر عبدالله كعبي", "عبدالله عادل قشاش", "حسام سعد الشهراني"]},
                {t: "طليعة 4", l: "وضاح ماجد الصويلح", n: "مشاري محمد القحطاني", m: ["مشعل محمد القحطاني", "محمد حسين فقيه", "فارس بريحي العمري", "رائد حسين حوباني", "راكان حسين حوباني", "عبدالله سعيد القرني", "ناصر مفلح المطيري", "مبارك مرزوق خميس"]}
            ];
            
            // إضافة القيادة العليا
            const admins = [
                {n: "سلمان الصويلح", r: "قائد الوحدة", p: "1111"},
                {n: "معاذ الشنقيطي", r: "نائب قائد الوحدة", p: "2222"},
                {n: "عبدالله العرفه", r: "عريف أول الوحدة", p: "1000"}
            ];

            admins.forEach(a => { m[a.p] = { name: a.n, role: 'ROOT', rank: a.r, team: "القيادة", pts: 0, pin: a.p, badges: ["وسام القيادة"], alerts: [] }; });
            
            raw.forEach((group, gi) => {
                [group.l, group.n, ...group.m].forEach((name, ni) => {
                    const pin = (2000 + (gi * 10) + ni).toString();
                    m[pin] = {
                        name: name,
                        team: group.t,
                        role: 'USER',
                        rank: ni === 0 ? 'قائد طليعة' : (ni === 1 ? 'نائب قائد' : 'كشاف'),
                        pts: 0,
                        pin: pin,
                        badges: ["عضو جديد"],
                        alerts: []
                    };
                });
            });

            await db.set({ members: m, vote_q: "ما هو رأيك في تجهيزات المخيم؟", requests: {}, logs: {init: "نظام أوتاد جاهز"} });
            alert("تمت التهيئة! عبدالله: 1000، سلمان: 1111، معاذ: 2222. البقية يبدأ من 2000.");
        },

        login: async () => {
            const p = document.getElementById("pin-in").value;
            const s = await db.child("members").once("value");
            const m = s.val() || {};
            if(m[p]) {
                state.user = { ...m[p], id: p };
                document.getElementById("login-screen").classList.add("hidden");
                document.getElementById("app").classList.remove("hidden");
                if(state.user.role === 'ROOT') document.getElementById("adm-nav").classList.remove("hidden");
                Sys.sync();
            } else alert("الرمز غير مسجل");
        },

        sync: () => {
            db.on("value", s => {
                const d = s.val() || {};
                state.members = d.members || {};
                state.logs = Object.values(d.logs || {}).reverse();
                state.voteQ = d.vote_q;
                state.votes = d.votes || {};
                state.requests = d.requests || {};
                Sys.render();
            });
        },

        tab: (t, el) => {
            state.tab = t;
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            Sys.render();
        },

        render: () => {
            const root = document.getElementById("content");
            const me = state.members[state.user.id];
            document.getElementById("u-name").innerText = me.name;
            document.getElementById("u-role").innerText = `${me.rank} | ${me.team}`;
            root.innerHTML = "";

            if(me.alerts && me.alerts.length > 0) {
                me.alerts.forEach((a, i) => {
                    root.innerHTML += `<div class="alert-box">🔔 تنبيه: ${a} <span style="float:left; cursor:pointer" onclick="Sys.clearAlert(${i})">✕</span></div>`;
                });
            }

            if(state.tab === 'home') {
                root.innerHTML += `<h3>نقاطي: <span style="color:var(--gold)">${me.pts}</span></h3>
                <div class="card"><h4>أوسمتي (${me.badges.length})</h4><div class="badge-grid">${me.badges.map(b=>`<div class="b-pill">${b}</div>`).join('')}</div></div>
                <div class="card"><h4>ارسال طلب للقيادة</h4><textarea id="req-txt" placeholder="اكتب طلبك هنا..."></textarea><button class="btn btn-p" onclick="Sys.sendReq()">ارسال الطلب</button></div>`;
            }

            if(state.tab === 'field') {
                ["طليعة 1", "طليعة 2", "طليعة 3", "طليعة 4"].forEach(t => {
                    const group = Object.entries(state.members).filter(m => m[1].team === t).sort((a,b)=>b[1].pts - a[1].pts);
                    root.innerHTML += `<h3>${t}</h3>`;
                    group.forEach(([id, m]) => {
                        root.innerHTML += `<div class="card m-row" onclick="Sys.manage('${id}')">
                            <span>${m.name} <small style="display:block; color:#6b7280">${m.rank}</small></span>
                            <b style="color:var(--gold)">${m.pts}</b>
                        </div>`;
                    });
                });
            }

            if(state.tab === 'vote') {
                root.innerHTML = `<div class="card" style="text-align:center"><h2>${state.voteQ}</h2>
                <button class="btn btn-p" onclick="Sys.cast('نعم')">نعم</button>
                <button class="btn btn-g" style="margin-top:10px" onclick="Sys.cast('لا')">لا</button></div>`;
            }

            if(state.tab === 'admin' && state.user.role === 'ROOT') {
                root.innerHTML = `<h3>لوحة التحكم (للثلاثي)</h3>
                <div class="card"><h4>طلبات الأعضاء</h4>${Object.entries(state.requests).map(([rid, r])=>`<div class="m-row">${r.from}: ${r.txt} <button onclick="Sys.delReq('${rid}')">✕</button></div>`).join('')}</div>
                <div class="card"><h4>تغيير التصويت</h4><input id="new-q" placeholder="السؤال الجديد"><button class="btn btn-p" onclick="Sys.updateQ()">تحديث</button></div>
                <div class="card"><h4>اللوقات (سرية)</h4><div style="max-height:150px; overflow:auto; font-size:10px;">${state.logs.map(l=>`<div>• ${l.txt}</div>`).join('')}</div></div>`;
            }
        },

        manage: (id) => {
            if(state.user.role !== 'ROOT') return;
            const m = state.members[id];
            document.getElementById("modal-body").innerHTML = `
                <h3>تحكم: ${m.name}</h3>
                <input type="number" id="amt" placeholder="المقدار">
                <input type="text" id="rsn" placeholder="السبب">
                <div style="display:flex; gap:10px">
                    <button class="btn btn-p" onclick="Sys.modPts('${id}', 1)">إضافة</button>
                    <button class="btn" style="background:var(--danger); color:white" onclick="Sys.modPts('${id}', -1)">خصم</button>
                </div>
                <select id="bg-sel">${ALL_BADGES.map(b=>`<option>${b}</option>`).join('')}</select>
                <button class="btn btn-g" onclick="Sys.giveB('${id}')">منح الوسام</button>
                <input type="text" id="new-pin" placeholder="تغيير الرمز السري" value="${m.pin}">
                <button class="btn btn-p" onclick="Sys.changePin('${id}')">تحديث الرمز</button>
                <button class="btn" onclick="Sys.close()">إغلاق</button>
            `;
            document.getElementById("modal").classList.remove("hidden");
        },

        modPts: (id, d) => {
            const v = parseInt(document.getElementById("amt").value);
            const r = document.getElementById("rsn").value;
            if(!v || !r) return alert("أكمل البيانات");
            const newPts = (state.members[id].pts || 0) + (v * d);
            const msg = d > 0 ? `تم إضافة ${v} نقطة لـ ${r}` : `تم خصم ${v} نقطة لـ ${r}`;
            let al = state.members[id].alerts || []; al.push(msg);
            db.child("members").child(id).update({ pts: newPts, alerts: al });
            db.child("logs").push({ txt: `${state.user.name} قام بـ ${msg} لـ ${state.members[id].name}` });
            Sys.close();
        },

        giveB: (id) => {
            const b = document.getElementById("bg-sel").value;
            let cur = state.members[id].badges || [];
            if(!cur.includes(b)) cur.push(b);
            let al = state.members[id].alerts || []; al.push(`مبروك! حصلت على ${b}`);
            db.child("members").child(id).update({ badges: cur, alerts: al });
            db.child("logs").push({ txt: `منح ${state.user.name} وسام ${b} لـ ${state.members[id].name}` });
            Sys.close();
        },

        changePin: (id) => {
            const p = document.getElementById("new-pin").value;
            db.child("members").child(id).update({ pin: p });
            alert("تم تغيير الرمز");
            Sys.close();
        },

        sendReq: () => {
            const txt = document.getElementById("req-txt").value;
            if(!txt) return;
            db.child("requests").push({ from: state.user.name, txt: txt });
            alert("تم الارسال");
            document.getElementById("req-txt").value = "";
        },

        clearAlert: (i) => {
            let al = state.members[state.user.id].alerts;
            al.splice(i, 1);
            db.child("members").child(state.user.id).update({ alerts: al });
        },

        toggleTheme: () => document.body.classList.toggle("light-mode"),
        cast: (v) => { db.child("votes").child(state.user.id).set(v); alert("تم التصويت"); },
        updateQ: () => { db.child("vote_q").set(document.getElementById("new-q").value); db.child("votes").remove(); },
        delReq: (rid) => db.child("requests").child(rid).remove(),
        close: () => document.getElementById("modal").classList.add("hidden")
    };
})();
</script>
</body>
</html>
