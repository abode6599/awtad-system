<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام أوتاد - الرقابة والتحقيق</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --success: #22c55e; --danger: #ef4444; --bg: #0f172a; --card: #1e293b; --gold: #fbbf24; }
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: #f8fafc; direction: rtl; padding: 10px; }
        .container { max-width: 600px; margin: auto; }
        .header-box { background: var(--card); padding: 20px; border-radius: 15px; border-bottom: 4px solid var(--primary); text-align: center; margin-bottom: 15px; }
        .card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #334155; }
        .member-row { display: flex; align-items: center; justify-content: space-between; background: #ffffff05; padding: 12px; border-radius: 10px; margin-bottom: 8px; border: 1px solid #334155; }
        .points-badge { background: var(--gold); color: #000; padding: 2px 8px; border-radius: 20px; font-weight: bold; font-size: 11px; }
        input, select, textarea { background: #334155; color: white; border: 1px solid #475569; padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 10px; }
        .btn { background: var(--primary); border: none; color: white; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 100; padding: 10px; }
        .modal-content { background: var(--card); width: 100%; max-width: 500px; padding: 20px; border-radius: 15px; max-height: 90vh; overflow-y: auto; }
        .history-item { font-size: 11px; padding: 8px; border-bottom: 1px solid #334155; color: #94a3b8; }
        .admin-tag { color: var(--gold); font-weight: bold; font-size: 10px; }
    </style>
</head>
<body>

<div id="login-screen" class="container" style="padding-top: 50px;">
    <div class="header-box"><h2>نظام أوتاد الكشفي</h2><p>بصمة القائد مفعلة 🔐</p></div>
    <input type="password" id="pin-input" placeholder="****">
    <button class="btn" onclick="login()">دخول</button>
</div>

<div id="main-screen" class="container" style="display:none;">
    <div class="header-box"><h3 id="user-display"></h3><p id="user-role"></p></div>
    <div id="platoons-area"></div>
    <button class="btn" style="background:var(--danger); margin-top:10px;" onclick="location.reload()">خروج</button>
</div>

<div id="info-modal" class="modal">
    <div class="modal-content">
        <h3 id="modal-title" style="margin:0 0 10px;"></h3>
        <div id="personal-info">
            <input type="text" id="edit-idnum" placeholder="رقم الهوية">
            <input type="text" id="edit-phone" placeholder="رقم الجوال">
            <textarea id="edit-notes" placeholder="ملاحظات سرية..."></textarea>
        </div>
        
        <div style="background:#0f172a; padding:10px; border-radius:10px; text-align:center; border:1px solid var(--gold);">
            النقاط: <span id="current-points" style="color:var(--gold); font-weight:bold;">0</span>
        </div>

        <div style="margin-top:15px; border-top:1px solid #334155; padding-top:10px;">
            <label style="font-size:12px; color:var(--primary)">إضافة إجراء جديد:</label>
            <div style="display:flex; gap:5px; margin-top:5px;">
                <input type="text" id="log-text" placeholder="السبب" style="margin:0;">
                <input type="number" id="log-pts" placeholder="نقط" style="width:70px; margin:0;">
                <button onclick="addLog()" style="background:var(--success); border:none; color:white; border-radius:8px; padding:0 15px;">+</button>
            </div>
        </div>

        <div id="admin-tools" style="margin-top:10px;"></div>

        <h4 style="color:var(--gold); border-bottom:1px solid #334155; padding-bottom:5px; margin-top:20px;">سجل التتبع (Action Log)</h4>
        <div id="log-history" style="background:#0f172a; border-radius:10px; max-height:150px; overflow-y:auto; padding:5px;"></div>
        
        <button class="btn" style="margin-top:20px;" onclick="closeModal()">حفظ وإغلاق</button>
    </div>
</div>

<script>
    const CONFIG = {
        users: {
            "8429": { name: "عبدالله العرفه", target: "ALL", isAdmin: true },
            "5173": { name: "سلمان الصويلح", target: "ALL", isAdmin: true },
            "9264": { name: "معاذ الشنقيطي", target: "ALL", isAdmin: true },
            "3058": { name: "الوليد الحازمي", target: 1 },
            "6712": { name: "حاتم خريزي", target: 2 },
            "4891": { name: "راكان شراحيلي", target: 3 },
            "2537": { name: "وضاح الصويلح", target: 4 }
        },
        platoons: [
            { id: 0, name: "قادة الطلائع", members: ["الوليد الحازمي", "حاتم خريزي", "راكان شراحيلي", "وضاح الصويلح"], adminOnly: true },
            { id: 1, name: "طليعة 1", members: ["صالح حبتور", "حسن الشهري", "ريان جعام", "غازي العجمي", "يزيد خال", "زياد العجلاني", "فهد المهيني", "يحي شراحيلي", "عزام خبراني"] },
            { id: 2, name: "طليعة 2", members: ["ياسر ابو حيه", "محمد عسيري", "رياض الزهراني", "ابراهيم التليدي", "غازي العنزي", "صالح الخثعمي", "اصيل العتيبي", "فواز الشهراني", "علي الغامدي"] },
            { id: 3, name: "طليعة 3", members: ["بسام قرادي", "علي الشهراني", "زايد القحطاني", "راشد الراشدي", "عبدالعزيز القحطاني", "عيسى الرشيدي", "بدر كعبي", "عبدالله قشاش", "حسام الشهراني"] },
            { id: 4, name: "طليعة 4", members: ["مشعل القحطاني", "مشاري القحطاني", "محمد فقيه", "فارس العمري", "رائد حوباني", "راكان حوباني", "عبدالله القرني", "ناصر المطيري", "مبارك خميس"] }
        ]
    };

    let db = JSON.parse(localStorage.getItem('awtad_v26')) || {};
    let currentUser = null, currentEditing = null;

    function login() {
        const pin = document.getElementById('pin-input').value;
        if (CONFIG.users[pin]) {
            currentUser = CONFIG.users[pin];
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-screen').style.display = 'block';
            document.getElementById('user-display').innerText = currentUser.name;
            document.getElementById('user-role').innerText = currentUser.isAdmin ? "القيادة العليا" : "قائد طليعة";
            renderPlatoons();
        } else { alert("الشيفرة خاطئة"); }
    }

    function renderPlatoons() {
        const area = document.getElementById('platoons-area');
        area.innerHTML = '';
        CONFIG.platoons.forEach(p => {
            if (p.adminOnly && !currentUser.isAdmin) return;
            if (!currentUser.isAdmin && currentUser.target !== p.id) return;
            let card = `<div class="card"><div style="color:var(--primary); font-weight:bold; margin-bottom:10px;">${p.name}</div>`;
            p.members.forEach(m => {
                if(!db[m]) db[m] = { status:'غائب', points:0, logs:[] };
                card += `<div class="member-row">
                    <span><span style="width:8px;height:8px;border-radius:50%;display:inline-block;margin-left:5px;background:${db[m].status==='حاضر'?'var(--success)':'var(--danger)'}"></span>${m}</span>
                    <div style="display:flex;gap:5px;align-items:center;">
                        <span class="points-badge">${db[m].points} ن</span>
                        <select style="width:60px;padding:2px;font-size:10px;" onchange="updateStatus('${m}', this.value)">
                            <option value="غائب" ${db[m].status==='غائب'?'selected':''}>غ</option>
                            <option value="حاضر" ${db[m].status==='حاضر'?'selected':''}>ح</option>
                        </select>
                        <button style="background:#475569; border:none; color:white; padding:5px; border-radius:5px;" onclick="openModal('${m}')">ℹ️</button>
                    </div></div>`;
            });
            area.innerHTML += card + `</div>`;
        });
    }

    function updateStatus(m, s) {
        const pts = (s === 'حاضر' ? 10 : -5);
        db[m].status = s;
        db[m].points += pts;
        db[m].logs.unshift({ d: new Date().toLocaleDateString(), t: `حالة: ${s}`, p: pts, by: currentUser.name });
        save(); renderPlatoons();
    }

    function openModal(m) {
        currentEditing = m;
        const d = db[m];
        document.getElementById('modal-title').innerText = m;
        document.getElementById('edit-idnum').value = d.idnum || '';
        document.getElementById('edit-phone').value = d.phone || '';
        document.getElementById('edit-notes').value = d.notes || '';
        document.getElementById('current-points').innerText = d.points;
        
        const adminTools = document.getElementById('admin-tools');
        adminTools.innerHTML = currentUser.isAdmin ? 
            `<button class="btn" style="background:var(--danger); margin-top:10px;" onclick="resetAll('${m}')">⚠️ تصفير السجل والتبعات</button>` : '';
        
        renderLogs();
        document.getElementById('info-modal').style.display = 'flex';
    }

    function addLog() {
        const txt = document.getElementById('log-text').value, pts = parseInt(document.getElementById('log-pts').value);
        if(txt && !isNaN(pts)) {
            db[currentEditing].points += pts;
            db[currentEditing].logs.unshift({ d: new Date().toLocaleDateString(), t: txt, p: pts, by: currentUser.name });
            document.getElementById('log-text').value = ''; document.getElementById('log-pts').value = '';
            document.getElementById('current-points').innerText = db[currentEditing].points;
            renderLogs(); save();
        }
    }

    function resetAll(m) {
        if(confirm("سيتم مسح كافة السجل والنقاط، هل أنت متأكد؟")) {
            db[m] = { status:'غائب', points:0, idnum:'', phone:'', notes:'', logs:[{d:new Date().toLocaleDateString(), t:'تصفير شامل', p:0, by:currentUser.name}] };
            save(); closeModal(); renderPlatoons();
        }
    }

    function renderLogs() {
        document.getElementById('log-history').innerHTML = db[currentEditing].logs.map(l => `
            <div class="history-item">
                <div style="display:flex; justify-content:space-between;">
                    <span>${l.d} - ${l.t}</span>
                    <span style="color:${l.p>=0?'var(--success)':'var(--danger)'}">${l.p>=0?'+':''}${l.p}</span>
                </div>
                <div class="admin-tag">بواسطة: ${l.by || 'النظام'}</div>
            </div>
        `).join('');
    }

    function closeModal() {
        db[currentEditing].idnum = document.getElementById('edit-idnum').value;
        db[currentEditing].phone = document.getElementById('edit-phone').value;
        db[currentEditing].notes = document.getElementById('edit-notes').value;
        save(); document.getElementById('info-modal').style.display = 'none'; renderPlatoons();
    }

    function save() { localStorage.setItem('awtad_v26', JSON.stringify(db)); }
</script>
</body>
</html>
